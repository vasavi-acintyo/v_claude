<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Event</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  .statusbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  /* player */
  .player{position:relative;flex:0 0 auto;height:220px;background:#000;}
  .player iframe{width:100%;height:100%;border:0;display:block;}
  .player .face{position:absolute;inset:0;background-size:cover;background-position:center;display:grid;place-items:center;cursor:pointer;}
  .player .face::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.34);}
  .player .face>*{position:relative;z-index:1;}
  .player .bigplay{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:var(--brand);box-shadow:0 10px 26px -8px rgba(0,0,0,.5);}
  .player .bigplay svg{width:26px;height:26px;margin-left:4px;}
  .player .pbadge{position:absolute;left:12px;top:12px;z-index:3;display:inline-flex;align-items:center;gap:5px;background:#e0392b;color:#fff;font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:5px 10px;border-radius:7px;}
  .player .pbadge .bd{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.3s infinite;}
  .player .pback{position:absolute;left:12px;bottom:12px;z-index:3;width:38px;height:38px;border-radius:11px;background:rgba(0,0,0,.5);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;} .player .pback svg{width:19px;height:19px;}
  .player .pfs{position:absolute;right:12px;bottom:12px;z-index:3;width:38px;height:38px;border-radius:11px;background:rgba(0,0,0,.5);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;} .player .pfs svg{width:18px;height:18px;}
  .player .fnote{position:relative;z-index:2;max-width:290px;margin:0 auto;text-align:center;color:#fff;padding:0 18px;display:flex;flex-direction:column;align-items:center;gap:9px;}
  .player .fnote svg{width:34px;height:34px;opacity:.92;}
  .player .fnote b{font-size:13px;font-weight:800;}
  .player .fnote span{font-size:10.5px;line-height:1.55;opacity:.85;}
  .player .fnote code{background:rgba(255,255,255,.18);padding:1px 6px;border-radius:5px;font-size:10px;}
  .phone.fs .player{position:absolute;inset:0;height:100%;z-index:40;}
  .phone.fs .scroll,.phone.fs .home-ind{display:none;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:15px 18px 22px;}
  .scroll::-webkit-scrollbar{width:0;}

  .h1{font-size:17px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;line-height:1.28;}
  .livestat{display:flex;align-items:center;gap:8px;margin:9px 0 0;font-size:11px;color:var(--muted);font-weight:600;}
  .livestat .ld{width:7px;height:7px;border-radius:50%;background:#e0392b;box-shadow:0 0 0 3px rgba(224,57,43,.2);animation:pulse 1.4s infinite;}

  .chan{display:flex;align-items:center;gap:11px;margin:15px 0;padding:13px;border:1px solid var(--line);border-radius:14px;background:var(--card);}
  .chan img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .chan .cx{flex:1;min-width:0;} .chan .cn{font-size:13px;font-weight:800;letter-spacing:-.01em;} .chan .cs{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .chan .sub{flex:0 0 auto;border:none;background:var(--brand);color:#fff;font-family:inherit;font-size:11px;font-weight:800;padding:9px 14px;border-radius:20px;cursor:pointer;transition:transform .16s, background .16s;}
  .chan .sub:active{transform:scale(.94);} .chan .sub.on{background:var(--green);}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .mchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--slate-700);background:var(--soft1);border:1px solid var(--line);padding:7px 11px;border-radius:20px;}
  .mchip svg{width:12px;height:12px;color:var(--muted);}
  .mchip.live{color:#c0392b;background:rgba(224,57,43,.1);border-color:transparent;}

  .sec-h{font-size:13px;font-weight:800;margin:4px 0 8px;}
  .desc{font-size:12.5px;line-height:1.68;color:var(--slate-700);}
  .ytlink{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-size:11.5px;font-weight:800;color:var(--brand);text-decoration:none;}
  .ytlink svg{width:15px;height:15px;}

  .toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;max-width:82%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}
</style>
  <link rel="stylesheet" href="global.css?v=27">
</head>
<body>
<div class="phone" id="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="player" id="player"></div>

  <div class="scroll" id="scroll"></div>
  <div class="home-ind"></div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  try{ const t=localStorage.getItem('cmeTheme')||'blue'; if(t&&t!=='classical') document.documentElement.setAttribute('data-theme',t); }catch(e){}
  function toast(m){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.querySelector('.phone').appendChild(t); } t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1500); }
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  const IC={
    play:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>',
    back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
    fs:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>',
    eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
    clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>',
    globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>',
    pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.5 7-11a7 7 0 0 0-14 0c0 5.5 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>',
    tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12V5a2 2 0 0 1 2-2h7l9 9-9 9z"/><circle cx="8" cy="8" r="1.4" fill="currentColor" stroke="none"/></svg>',
    ext:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>'
  };

  let ev; try{ ev=JSON.parse(sessionStorage.getItem('liveEvent')||'null'); }catch(e){}
  if(!ev) ev={provider:'youtube', streamId:'zQGOcOUBi6s', status:'live', title:'Live Medical Event', channel:'DocSynapse Live', ch_av:'https://randomuser.me/api/portraits/men/52.jpg', specialty:'General', language:'English', country:'India', viewers:0, startsAt:'Live now', duration:'', desc:'A public medical live stream.'};
  const watchUrl='https://www.youtube.com/watch?v='+encodeURIComponent(ev.streamId);
  const fmtV=n=> n>=1000 ? (n/1000).toFixed(1).replace('.0','')+'k' : ''+n;

  function embed(){
    const host=document.getElementById('player');
    // YouTube can't play from a file:// page (Error 153). Show an in-app notice instead of the error.
    if(location.protocol==='file:'){
      host.insertAdjacentHTML('afterbegin',
        `<div class="face" style="background-image:url('https://i.ytimg.com/vi/${esc(ev.streamId)}/hqdefault.jpg')"><div class="fnote">${IC.play}<b>Open over http to watch inline</b><span>YouTube blocks playback from a local file. Run <code>python -m http.server</code> and open <code>http://localhost:8000</code> (or the live site) — it then plays right here, no redirect.</span></div></div>`);
      return;
    }
    // Play inside the app. `origin` is only valid on http(s).
    host.insertAdjacentHTML('afterbegin',
      `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(ev.streamId)}?autoplay=1&playsinline=1&rel=0&modestbranding=1&origin=${encodeURIComponent(location.origin)}" title="${esc(ev.title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`);
  }

  function renderPlayer(){
    const p=document.getElementById('player');
    p.innerHTML = `
      <span class="pbadge"><span class="bd"></span>Live</span>
      <button class="pback" id="pback">${IC.back}</button>
      <button class="pfs" id="pfs">${IC.fs}</button>`;
    embed();   // stay in-app — embed the player inline
    document.getElementById('pback').addEventListener('click', ()=>{ history.length>1?history.back():location.href='live-events.html'; });
    document.getElementById('pfs').addEventListener('click', ()=>{ document.getElementById('phone').classList.toggle('fs'); });
  }

  function renderInfo(){
    const chips=[
      `<span class="mchip live">${IC.eye}${ev.viewers?fmtV(ev.viewers)+' watching':'Live'}</span>`,
      `<span class="mchip">${IC.tag}${esc(ev.specialty)}</span>`,
      `<span class="mchip">${IC.globe}${esc(ev.language)}</span>`,
      `<span class="mchip">${IC.pin}${esc(ev.country)}</span>`,
      ev.duration?`<span class="mchip">${IC.clock}${esc(ev.duration)}</span>`:''
    ].join('');
    document.getElementById('scroll').innerHTML = `
      <div class="h1">${esc(ev.title)}</div>
      <div class="livestat"><span class="ld"></span>${esc(ev.startsAt||'Live now')}${ev.viewers?(' · '+fmtV(ev.viewers)+' watching'):''}</div>
      <div class="chan">
        <img src="${esc(ev.ch_av)}" alt="" onerror="this.style.visibility='hidden'">
        <div class="cx"><div class="cn">${esc(ev.channel)}</div><div class="cs">${esc(ev.specialty)} · via ${esc(ev.provider||'youtube')}</div></div>
        <button class="sub" id="subBtn">Follow</button>
      </div>
      <div class="chips">${chips}</div>
      <div class="sec-h">About this stream</div>
      <div class="desc">${esc(ev.desc||'')}</div>
      <a class="ytlink" href="${watchUrl}" target="_blank" rel="noopener">${IC.ext}Open on YouTube</a>
    `;
    const s=document.getElementById('subBtn'); s.addEventListener('click', ()=>{ s.classList.toggle('on'); const on=s.classList.contains('on'); s.textContent=on?'✓ Following':'Follow'; toast(on?('Following '+ev.channel):'Unfollowed'); });
  }

  renderPlayer(); renderInfo();

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
