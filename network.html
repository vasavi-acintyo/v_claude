<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network — MedHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>

  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} .scroll{padding-top:max(10px,env(safe-area-inset-top));} }

  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}
  .scroll{flex:1 1 auto;overflow-y:auto;padding:6px 18px 20px;}
  .scroll::-webkit-scrollbar{width:0;}

  .ptop{display:flex;align-items:center;justify-content:space-between;padding:8px 0 2px;}
  .ptop h1{font-size:20px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;}
  .ptop .sub{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .feedbar .ptop{flex:1 1 auto;min-width:0;padding:0;flex-direction:column;align-items:flex-start;justify-content:center;}
  .feedbar .ptop h1{font-size:18px;line-height:1.15;}
  .icon-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);}

  .search{position:relative;margin-top:14px;}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--muted);}
  .search input{width:100%;min-height:34px;height:34px;background:var(--chip);border:1px solid transparent;border-radius:17px;padding:0 12px 0 33px;font-size:11px;font-family:inherit;color:var(--ink);}
  .search input::placeholder{color:var(--muted);}
  .search input:focus{outline:none;border-color:var(--brand);}

  .stats{display:flex;gap:9px;margin-top:14px;}
  .stat{flex:1;background:var(--soft1);border:1px solid transparent;border-radius:14px;padding:11px 6px;text-align:center;display:flex;flex-direction:column;gap:2px;transition:border-color .18s;}
  .stat:nth-child(2n){background:var(--soft2);}
  .stat:hover{border-color:var(--brand);}
  .stat b{font-size:17px;font-weight:800;font-family:var(--display);color:var(--brand);}
  .stat span{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}

  .sec{display:flex;align-items:baseline;justify-content:space-between;margin:24px 0 12px;}
  .sec h2{font-size:15px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;}
  .sec .cnt{font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:3px 8px;border-radius:20px;}
  .sec a{font-size:10px;font-weight:700;color:var(--brand);cursor:pointer;text-decoration:none;}

  /* request cards */
  .reqs{display:flex;flex-direction:column;gap:8px;}
  .req{display:flex;align-items:center;gap:10px;background:var(--soft1);border:1px solid transparent;border-radius:14px;padding:9px 10px;animation:fadeIn .4s ease both;transition:border-color .18s, transform .18s cubic-bezier(.22,1,.36,1);}
  .req:hover{border-color:var(--brand);}
  .req img{width:38px;height:38px;border-radius:50%;object-fit:cover;flex:0 0 auto;background:var(--chip);border:2px solid rgba(255,255,255,.6);}
  .req .m{flex:1;min-width:0;}
  .req .nm{font-size:11.5px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .req .sp{font-size:9px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .req .sp .dot{margin:0 4px;opacity:.6;}
  .req .sp .mut{color:var(--brand);font-weight:700;}
  .req .acts{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .req .acc,.req .ign{border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;}
  .req .acc svg,.req .ign svg{width:15px;height:15px;}
  .req .acc{background:var(--brand);color:#fff;}
  .req .acc:hover{background:var(--brand-dark);}
  .req .ign{background:var(--chip);color:var(--muted);}
  .req .ign:hover{color:var(--ink);background:var(--line);}
  .req.gone{opacity:0;transform:translateX(30px);transition:all .3s ease;}

  /* suggested horizontal */
  .sugg{display:flex;gap:11px;overflow-x:auto;scrollbar-width:none;padding:2px 2px 6px;margin:0 -2px;}
  .sugg::-webkit-scrollbar{display:none;}
  .scard{flex:0 0 132px;background:var(--soft1);border:1px solid transparent;border-radius:16px;padding:14px 12px;text-align:center;transition:border-color .18s, transform .18s cubic-bezier(.22,1,.36,1);}
  .scard:hover{border-color:var(--brand);}
  .scard img{width:56px;height:56px;border-radius:50%;object-fit:cover;margin:0 auto 9px;background:var(--chip);display:block;border:2px solid rgba(255,255,255,.6);}
  .scard .nm{font-size:11px;font-weight:800;font-family:var(--display);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .scard .sp{font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .scard .mut{font-size:9px;color:var(--muted);margin-top:4px;}
  .scard button{margin-top:10px;width:100%;background:var(--brand);color:#fff;border:none;font-family:inherit;font-size:10.5px;font-weight:800;padding:7px 0;min-height:30px;border-radius:20px;cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1), background .16s;}
  .scard button:hover{background:var(--brand-dark);}
  .scard button.done{background:var(--gold);color:#fff;}

  /* groups */
  .groups{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .grp{display:flex;align-items:center;gap:11px;background:var(--soft1);border:1px solid transparent;border-radius:15px;padding:11px;cursor:pointer;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s, opacity .15s;}
  .grp:hover{transform:translateY(-2px);border-color:var(--brand);}
  .grp .go.joined{background:var(--green);color:#fff;}
  .grp .gi{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;color:var(--brand);flex:0 0 auto;background:var(--brand-soft);}
  .grp .gi svg{width:22px;height:22px;stroke:var(--brand);}
  .grp .m{flex:1;min-width:0;}
  .grp .nm{font-size:12px;font-weight:800;font-family:var(--display);}
  .grp .sp{font-size:9.5px;color:var(--muted);margin-top:2px;}
  .grp .go{font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:5px 11px;border-radius:20px;flex:0 0 auto;}
  .grp .go.pending{color:var(--gold);background:rgba(176,137,79,.16);}
  .grp .grp-req{font-size:9px;font-weight:800;color:#fff;background:var(--brand);padding:5px 10px;border-radius:20px;flex:0 0 auto;white-space:nowrap;}
  .grp .dots{width:32px;height:32px;border-radius:50%;border:none;background:none;color:var(--muted);display:grid;place-items:center;flex:0 0 auto;cursor:pointer;}
  .grp .dots:hover{background:var(--chip);color:var(--brand);}
  .grp .dots svg{width:17px;height:17px;}
  .grp-empty{text-align:center;color:var(--muted);font-size:11px;padding:24px 0;}

  /* groups sub-tabs */
  .grp-top{display:flex;align-items:center;gap:8px;}
  .grp-seg{flex:1;min-width:0;display:flex;background:var(--chip);border-radius:12px;padding:4px;}
  .grp-seg button{flex:1;border:none;background:none;font-family:inherit;font-size:11.5px;font-weight:800;color:var(--muted);padding:9px 4px;min-height:38px;border-radius:9px;cursor:pointer;transition:background .16s,color .16s;white-space:nowrap;}
  .grp-seg button.on{background:var(--card);color:var(--brand);box-shadow:0 4px 12px -6px rgba(0,0,0,.2);}
  .add-circle{width:38px;height:38px;min-height:38px;flex:0 0 auto;padding:0;border:none;border-radius:50%;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
  .add-circle svg{width:16px;height:16px;}
  .add-circle:active{transform:scale(.9);}

  /* feed */
  .feed{display:flex;flex-direction:column;gap:12px;}
  .post{background:var(--soft1);border:1px solid transparent;border-radius:16px;padding:13px;transition:border-color .18s;}
  .post:hover{border-color:var(--brand);}
  .post-h{display:flex;align-items:center;gap:10px;}
  .post-h img{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .post-h .nm{font-size:11.5px;font-weight:800;}
  .post-h .sp{font-size:9px;color:var(--muted);margin-top:1px;}
  .post-h .t{margin-left:auto;font-size:8.5px;color:var(--muted);font-weight:600;}
  .post-b{font-size:11px;line-height:1.6;color:var(--slate-700);margin-top:10px;}
  .post-tag{display:inline-block;font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:2px 8px;border-radius:20px;margin-top:8px;}
  .post-f{display:flex;justify-content:space-between;gap:4px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line);}
  .post-f button{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:none;border:none;font-family:inherit;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;padding:5px 6px;min-height:44px;border-radius:8px;}
  .post-f button:hover{background:var(--chip);}
  .post-f>button svg,.reactbtn svg{width:15px;height:15px;flex:0 0 auto;}
  .post-f button:hover{color:var(--brand);}
  .post-f button.liked{color:var(--brand);}
  .post-f svg{width:14px;height:14px;}

  .req img,.scard img{cursor:pointer;}

  /* ---- LinkedIn-style top bar + start-a-post ---- */
  .feedbar{display:flex;align-items:center;gap:10px;padding:6px 0 2px;}
  .tb-av{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--chip);border:1px solid var(--line);flex:0 0 auto;}
  .tb-prof{display:inline-flex;align-items:center;flex:0 0 auto;text-decoration:none;transition:transform .18s cubic-bezier(.22,1,.36,1);} .tb-prof:active{transform:scale(.94);}
  .tb-search{flex:1;min-width:0;position:relative;}
  .tb-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--muted);}
  .tb-search input{width:100%;min-height:34px;height:34px;background:var(--chip);border:1px solid transparent;border-radius:17px;padding:0 12px 0 33px;font-size:11px;font-family:inherit;color:var(--ink);}
  .tb-search input::placeholder{color:var(--muted);} .tb-search input:focus{outline:none;border-color:var(--brand);}
  .tb-ic{width:44px;height:44px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;}
  .tb-ic svg{width:19px;height:19px;}
  .startpost{margin-top:14px;background:var(--soft1);border:1px solid transparent;border-radius:16px;padding:13px 14px;transition:border-color .18s;}
  .startpost:hover{border-color:var(--brand);}
  .sp-top{display:flex;align-items:center;gap:11px;}
  .sp-top img{width:40px;height:40px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .sp-box{flex:1;text-align:left;background:none;border:1px solid var(--line);border-radius:22px;padding:11px 16px;min-height:44px;color:var(--muted);font-family:inherit;font-size:11.5px;cursor:pointer;transition:background .15s, transform .13s, opacity .13s;}
  .sp-box:hover{background:var(--chip);}
  .sp-acts{display:flex;justify-content:space-around;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
  .sp-act{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:none;border:none;font-family:inherit;font-size:10.5px;font-weight:700;color:var(--slate-700);cursor:pointer;padding:5px 9px;min-height:44px;border-radius:9px;transition:background .15s, transform .13s, opacity .13s;}
  .sp-act:hover{background:var(--chip);} .sp-act svg{width:17px;height:17px;color:var(--brand);}
  .sec2{font-size:13px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;margin:22px 0 12px;display:flex;align-items:center;gap:8px;}
  .panel-head{display:flex;align-items:center;gap:10px;margin-top:16px;}
  .panel-head h2{font-size:17px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;}
  .back-ic{width:32px;height:32px;border-radius:50%;background:var(--chip);border:none;display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;transition:transform .16s;}
  .back-ic:active{transform:scale(.92);}
  .sec2 b{font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:2px 8px;border-radius:20px;}

  /* ---- sub-tabs ---- */
  .ntabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-top:14px;border-bottom:1px solid var(--line);}
  .ntabs::-webkit-scrollbar{display:none;}
  .ntab{flex:1;text-align:center;background:none;border:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);padding:11px 10px;min-height:44px;position:relative;cursor:pointer;white-space:nowrap;}
  .ntab.active{color:var(--brand);}
  .ntab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2.5px;background:var(--brand);border-radius:3px;}

  /* ---- messages ---- */
  .mrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .mrow img{width:48px;height:48px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;border:2px solid rgba(255,255,255,.5);}
  .mrow .m{flex:1;min-width:0;}
  .mrow .nm{font-size:12px;font-weight:700;}
  .mrow .lm{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mrow.unread .lm{color:var(--ink);font-weight:600;}
  .mrow .rt{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:0 0 auto;}
  .mrow .tm{font-size:8.5px;color:var(--muted);}
  .mrow .ud{width:8px;height:8px;border-radius:50%;background:var(--brand);}

  /* ---- alerts ---- */
  .arow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .arow .ai{width:40px;height:40px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:0 0 auto;}
  .arow .ai svg{width:19px;height:19px;}
  .arow .m{flex:1;min-width:0;}
  .arow .at{font-size:11px;line-height:1.45;color:var(--slate-700);}
  .arow .at b{color:var(--ink);font-weight:800;}
  .arow .aw{font-size:8.5px;color:var(--muted);margin-top:3px;}

  /* ---- Feed composer + posts ---- */
  .composer{display:flex;align-items:center;gap:11px;background:var(--soft1);border:1px solid transparent;border-radius:16px;padding:11px 13px;cursor:pointer;transition:border-color .18s, transform .13s, opacity .13s;}
  .composer:hover{border-color:var(--brand);}
  .composer .cav{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .composer .cbox{flex:1;font-size:11px;color:var(--muted);}
  .composer .cico{color:var(--brand);flex:0 0 auto;} .composer .cico svg{width:20px;height:20px;}
  .post-tag{cursor:default;}
  .post-f button{transition:color .15s,transform .12s;}
  .post-f button:active{transform:scale(.92);}
  .post-f button.liked svg{fill:var(--brand);}
  .post-h .nm{display:inline-flex;align-items:center;gap:4px;}
  .vchk{width:12px;height:12px;color:var(--brand);flex:0 0 auto;}
  .pmore{background:none;border:none;color:var(--muted);cursor:pointer;width:44px;height:44px;display:grid;place-items:center;flex:0 0 auto;align-self:flex-start;border-radius:10px;}
  .pmore svg{width:18px;height:18px;} .pmore:hover{background:var(--chip);}
  /* post options sheet */
  .opt-item{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink);padding:14px 4px;cursor:pointer;border-bottom:1px solid var(--line);text-align:left;}
  .opt-item:last-child{border-bottom:none;}
  .opt-item svg{width:19px;height:19px;color:var(--muted);flex:0 0 auto;}
  .opt-item.danger{color:#ef4444;} .opt-item.danger svg{color:#ef4444;}
  .opt-done{text-align:center;padding:22px 10px;}
  .opt-done .ok{width:52px;height:52px;border-radius:50%;background:rgba(63,125,78,.15);color:var(--green);display:grid;place-items:center;margin:0 auto 12px;}
  .opt-done .ok svg{width:26px;height:26px;} .opt-done b{font-size:14px;font-family:var(--display);} .opt-done p{font-size:10.5px;color:var(--muted);margin-top:5px;line-height:1.5;}
  /* reactions */
  .react-sum{display:flex;align-items:center;gap:6px;font-size:9.5px;color:var(--muted);margin-top:11px;}
  .react-sum .emos{display:inline-flex;}
  .react-sum .emos span{width:16px;height:16px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-size:9px;margin-left:-4px;}
  .react-sum .emos span:first-child{margin-left:0;}
  .react-sum .dot{margin:0 3px;}
  .react-wrap{position:relative;flex:0 0 auto;}
  .react-pop{position:absolute;bottom:36px;left:-4px;display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:5px 8px;box-shadow:0 12px 26px -8px rgba(0,0,0,.4);opacity:0;visibility:hidden;transform:translateY(8px) scale(.9);transform-origin:bottom left;transition:.18s;z-index:6;}
  .react-pop.open,.react-wrap:hover .react-pop{opacity:1;visibility:visible;transform:none;}
  .react-pop button{font-size:21px;line-height:1;background:none;border:none;cursor:pointer;padding:2px;transition:transform .12s;}
  .react-pop button:hover{transform:scale(1.4) translateY(-4px);}
  .reactbtn.reacted{font-weight:800;}
  /* inline comments */
  .cmts{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .cmt-add-inline{display:flex;align-items:center;gap:8px;}
  .cmt-add-inline img{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .cmt-add-inline input{flex:1;background:var(--chip);border:none;border-radius:20px;padding:9px 13px;font-family:inherit;font-size:10.5px;color:var(--ink);outline:none;}
  .cmt-add-inline button{background:var(--brand);color:#fff;border:none;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .cmt-add-inline button svg{width:14px;height:14px;}
  .cmt-list-inline{display:flex;flex-direction:column;gap:12px;margin-top:14px;}
  .ci{display:flex;gap:9px;}
  .ci img{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .ci .cbx{flex:1;min-width:0;}
  .ci .bub{background:var(--chip);border-radius:12px;padding:8px 11px;}
  .ci .nm{font-size:10.5px;font-weight:800;}
  .ci .tx{font-size:10px;color:var(--slate-700);margin-top:2px;line-height:1.45;}
  .ci .cact{display:flex;align-items:center;gap:14px;margin:5px 0 0 4px;}
  .ci .cact button{background:none;border:none;font-family:inherit;font-size:8.5px;font-weight:700;color:var(--muted);cursor:pointer;padding:0;}
  .ci .cact button.liked{color:var(--brand);}
  .ci .cact span{font-size:8.5px;color:var(--muted);}
  .ci.me .bub{background:var(--brand-soft);}
  .youtag{font-size:9px;font-weight:800;color:#fff;background:var(--brand);padding:1px 6px;border-radius:20px;vertical-align:middle;}
  /* collapsed comment preview */
  .cmt-peek{margin-top:11px;cursor:pointer;}
  .cmt-peek .pk{display:flex;gap:8px;align-items:flex-start;}
  .cmt-peek img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .cmt-peek .pkb{flex:1;min-width:0;background:var(--chip);border-radius:12px;padding:7px 11px;}
  .cmt-peek .nm{font-size:10px;font-weight:800;}
  .cmt-peek .tx{font-size:9.5px;color:var(--slate-700);margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cmt-peek .viewall{font-size:9px;font-weight:700;color:var(--muted);margin-top:8px;}
  .post-h [data-author]{cursor:pointer;}
  /* author profile activity */
  .pa-tabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin:16px 0 12px;}
  .pa-tabs button{background:none;border:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);padding:9px 8px;min-height:44px;position:relative;cursor:pointer;}
  .pa-tabs button.active{color:var(--brand);}
  .pa-tabs button.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2.5px;background:var(--brand);border-radius:3px;}

  .pa-post .pm{font-size:9px;color:var(--muted);margin-top:9px;display:flex;gap:12px;}
  .pa-cmt{border-left:2px solid var(--line);padding:2px 0 2px 12px;margin-bottom:13px;}

  .pa-cmt .cm{font-size:9px;color:var(--muted);margin-top:4px;}
  .pa-empty{text-align:center;font-size:10.5px;color:var(--muted);padding:24px;}
  /* post media (image / video / pdf) */
  .pm-img{width:100%;border-radius:12px;margin-top:11px;display:block;max-height:280px;object-fit:cover;cursor:zoom-in;background:var(--chip);}
  .pm-video{width:100%;border-radius:12px;margin-top:11px;display:block;background:#000;max-height:300px;}
  .pm-audio{width:100%;margin-top:11px;display:block;}
  .pm-pdf{display:flex;align-items:center;gap:11px;margin-top:11px;background:var(--chip);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;}
  .pm-pdf .pdi{width:38px;height:38px;border-radius:10px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:0 0 auto;}
  .pm-pdf .pdi svg{width:20px;height:20px;}
  .pm-pdf .pn{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pm-pdf .ps{font-size:9px;color:var(--muted);margin-top:2px;}
  .pm-pdf .pv{margin-left:auto;font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:5px 11px;border-radius:20px;flex:0 0 auto;}
  /* composer media preview */
  .cm-prev{position:relative;margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
  .cm-prev img,.cm-prev video{width:100%;max-height:180px;object-fit:cover;display:block;background:#000;}
  .cm-prev .pdfp{display:flex;align-items:center;gap:10px;padding:12px;background:var(--chip);}
  .cm-prev .pdfp svg{width:22px;height:22px;color:var(--brand);flex:0 0 auto;}
  .cm-prev .pdfp span{font-size:10.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cm-prev .rm{position:absolute;top:8px;right:8px;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;font-size:16px;cursor:pointer;}
  .comp-foot .tool{background:none;border:none;cursor:pointer;padding:4px;border-radius:8px;}
  .comp-foot .tool:hover{background:var(--chip);}
  /* media viewer modal */
  .media-modal{position:absolute;inset:0;background:rgba(0,0,0,.9);z-index:45;display:none;flex-direction:column;padding:16px;}
  .media-modal.open{display:flex;}
  .mm-bar{display:flex;align-items:center;gap:10px;color:#fff;margin-bottom:12px;}
  .mm-bar .t{flex:1;font-size:12px;font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mm-bar button{width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:16px;cursor:pointer;flex:0 0 auto;}
  .mm-body{flex:1;display:grid;place-items:center;overflow:auto;}
  .mm-body img{max-width:100%;max-height:100%;border-radius:8px;}
  .mm-body iframe{width:100%;height:100%;border:none;background:#fff;border-radius:8px;}
  .mm-body video{max-width:100%;max-height:100%;border-radius:8px;}

  /* composer sheet */
  .comp-head{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
  .comp-head img{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--chip);}
  .comp-head b{font-size:12.5px;font-weight:800;font-family:var(--display);}
  .comp-head span{font-size:9.5px;color:var(--muted);display:block;margin-top:1px;}
  .comp-head .x{margin-left:auto;width:44px;height:44px;border-radius:50%;border:none;background:var(--chip);color:var(--ink);font-size:15px;cursor:pointer;}
  .comp-text{width:100%;min-height:110px;border:none;background:none;font-family:inherit;font-size:13px;color:var(--ink);resize:none;outline:none;line-height:1.6;}
  .comp-text::placeholder{color:var(--muted);}
  .comp-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
  .ctag{display:inline-flex;align-items:center;font-size:9.5px;font-weight:700;color:var(--brand);background:var(--brand-soft);padding:6px 13px;min-height:44px;border-radius:22px;cursor:pointer;border:1px solid transparent;}
  .ctag.on{background:var(--brand);color:#fff;}
  .comp-foot{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:16px;padding-top:13px;border-top:1px solid var(--line);}
  .comp-foot .tool{color:var(--muted);cursor:pointer;width:44px;height:44px;display:grid;place-items:center;} .comp-foot .tool svg{width:20px;height:20px;}
  .comp-post{margin-left:auto;background:var(--brand);color:#fff;border:none;font-family:inherit;font-size:12.5px;font-weight:700;padding:11px 22px;min-height:44px;border-radius:12px;cursor:pointer;}
  .comp-post:disabled{opacity:.45;cursor:default;}

  /* comment sheet */
  .cmt-h{font-size:15px;font-weight:800;font-family:var(--display);margin-bottom:4px;}
  .cmt-list{display:flex;flex-direction:column;}
  .cmt{display:flex;gap:10px;padding:11px 0;}
  .cmt img{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .cmt .cb{flex:1;background:var(--chip);border-radius:13px;padding:9px 12px;}
  .cmt .nm{font-size:11px;font-weight:800;}
  .cmt .tx{font-size:10.5px;color:var(--slate-700);margin-top:3px;line-height:1.5;}
  .cmt .tm{font-size:8.5px;color:var(--muted);margin-top:4px;}
  .cmt-empty{text-align:center;font-size:10.5px;color:var(--muted);padding:20px;}
  .cmt-add{display:flex;align-items:center;gap:9px;margin-top:8px;padding-top:12px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--card);}
  .cmt-add img{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .cmt-add input{flex:1;background:var(--chip);border:none;border-radius:20px;padding:10px 14px;font-family:inherit;font-size:11px;color:var(--ink);outline:none;}
  .cmt-add button{background:var(--brand);color:#fff;border:none;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .cmt-add button svg{width:16px;height:16px;}

  /* ---- Profile bottom-sheet ---- */
  .backdrop{position:absolute;inset:0;background:rgba(15,15,35,.45);opacity:0;visibility:hidden;transition:opacity .3s, visibility .3s;z-index:30;}
  .backdrop.open{opacity:1;visibility:visible;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:31;background:var(--card);border-radius:22px 22px 0 0;
    transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.3,.5,1);box-shadow:0 -12px 40px -12px rgba(0,0,0,.4);max-height:90%;overflow-y:auto;}

  .sheet.open{transform:translateY(0);}
  .ps-body{padding:0 18px calc(20px + env(safe-area-inset-bottom));}
  .grab{width:38px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 4px;position:sticky;top:0;}
  .p-hero{height:84px;border-radius:16px;margin-top:6px;position:relative;background:linear-gradient(120deg,var(--d1),var(--d2) 58%,var(--d3));overflow:hidden;}

  .p-av{width:74px;height:74px;border-radius:50%;border:3px solid var(--card);object-fit:cover;position:absolute;left:4px;top:48px;background:var(--chip);z-index:2;}

  .p-loc{font-size:9.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px;}
  .p-stats{display:flex;margin:16px 0;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .p-stats div{flex:1;text-align:center;padding:11px 4px;border-right:1px solid var(--line);}
  .p-stats div:last-child{border-right:none;}
  .p-stats b{font-size:15px;font-weight:800;font-family:var(--display);color:var(--brand);display:block;}
  .p-stats span{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .p-actions{display:flex;gap:10px;}
  .p-actions button{border:none;font-family:inherit;font-size:12.5px;font-weight:700;padding:12px;border-radius:12px;cursor:pointer;}
  .p-pri{flex:1;background:var(--brand);color:#fff;box-shadow:0 10px 22px -8px var(--brand);}
  .p-pri:hover{background:var(--brand-dark);}

  .p-sec{flex:0 0 auto;background:var(--chip);color:var(--ink);padding-left:18px;padding-right:18px;display:inline-flex;align-items:center;gap:6px;}
  .p-sec svg{width:15px;height:15px;}
  .p-h{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;}
  .p-bio{font-size:11.5px;line-height:1.65;color:var(--slate-700);}
  .p-tags{display:flex;flex-wrap:wrap;gap:7px;}
  .p-tag{font-size:9.5px;font-weight:700;color:var(--brand);background:var(--brand-soft);padding:6px 11px;border-radius:20px;}
  .p-list{display:flex;flex-direction:column;gap:12px;}
  .p-li{display:flex;gap:11px;}
  .p-li .pi{width:36px;height:36px;border-radius:11px;background:var(--chip);display:grid;place-items:center;color:var(--brand);flex:0 0 auto;}
  .p-li .pi svg{width:18px;height:18px;}
  .p-li .pt{font-size:11.5px;font-weight:700;}
  .p-li .psub{font-size:9.5px;color:var(--muted);margin-top:2px;}

  .navitem{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:48px;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:none;}
  .navitem.active{color:var(--brand);font-weight:600;}

  /* ===== PASS-A: touch feedback + press states ===== */
  .icon-btn,.tb-ic,.tb-av,.pmore,.cmt-add-inline button,.cmt-add button,.comp-head .x,.cm-prev .rm,.mm-bar button,
  .req .acc,.req .ign,.ntab,.ctag,.comp-post,.comp-foot .tool,.opt-item,.pa-tabs button,.p-actions button,
  .react-pop button,.ci .cact button,.sec a,.grp .go,.req,.scard,.mrow,.pm-pdf,.cmt-peek,.navitem
  { transition:transform .13s ease, opacity .13s ease; }
  /* buttons / chips / tabs / icon-buttons */
  .icon-btn:active,.tb-ic:active,.pmore:active,.cmt-add-inline button:active,.cmt-add button:active,.comp-head .x:active,
  .cm-prev .rm:active,.mm-bar button:active,.req .acc:active,.req .ign:active,.scard button:active,.sp-act:active,
  .ntab:active,.ctag:active,.comp-post:active,.comp-foot .tool:active,.opt-item:active,.pa-tabs button:active,
  .p-actions button:active,.react-pop button:active,.ci .cact button:active,.sec a:active,.grp .go:active
  { transform:scale(.94); }
  /* large cards / rows */
  .req:active,.grp:active,.scard:active,.mrow:active,.composer:active,.sp-box:active,.pm-pdf:active,.cmt-peek:active
  { transform:scale(.985); }
  /* nav */
  .navitem:active{ transform:scale(.9); opacity:.7; }

  /* toast pill */
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(12px);background:var(--ink);color:var(--surface);font-family:inherit;font-size:11.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Doxy mascot badge — V Theme only; other themes keep a plain line icon like the rest of the nav */
  .doxy-classic{display:block;}
  .doxy-badge{display:none;}
  [data-theme="vibrant"] .doxy-classic{display:none;}
  [data-theme="vibrant"] .navitem.doxy-tab{position:relative;overflow:visible;z-index:2;}
  [data-theme="vibrant"] .doxy-badge{display:inline-flex;width:44px;height:44px;border-radius:50%;box-shadow:0 0 0 5px rgba(90,209,230,.6), 0 3px 8px -3px rgba(0,0,0,.35);animation:doxyBob 2.4s ease-in-out infinite;margin-top:-18px;}
  .doxy-badge svg{width:44px;height:44px;display:block;}
  @keyframes doxyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .doxy-badge .antenna-tip{animation:doxyGlow 1.8s ease-in-out infinite;}

  @keyframes doxyLook{0%,12%{transform:translateX(0)}35%,48%{transform:translateX(-1.4px)}65%,78%{transform:translateX(1.4px)}100%{transform:translateX(0)}}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}
</style>

<script>
  // ---- Native device font: pick platform font at startup (APK / TestFlight webview) ----
  (function(){
    const ua = navigator.userAgent || '';
    const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isAndroid = /Android/.test(ua);
    document.documentElement.setAttribute('data-os', isIOS ? 'ios' : isAndroid ? 'android' : 'other');
  })();

  // ---- Theme: apply saved choice on load ----
  function applyTheme(t){
    if(!t || t==='classical') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', t);
  }
  try{ applyTheme(localStorage.getItem('cmeTheme') || 'blue'); }catch(e){}

  // ---- Toast (bottom-center pill) ----
  let toastT=null;
  function toast(msg){
    let el=document.getElementById('toast');
    if(!el){ el=document.createElement('div'); el.id='toast'; el.className='toast'; (document.querySelector('.phone')||document.body).appendChild(el); }
    el.textContent=msg; void el.offsetWidth; el.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'), 1400);
  }
  const grpIco = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20v-1.5A4.5 4.5 0 0 1 7.5 14h3A4.5 4.5 0 0 1 15 18.5V20"/><circle cx="17.5" cy="8.5" r="2.5"/><path d="M21 20v-1a4 4 0 0 0-3-3.8"/></svg>';

  // ---- Requests ----

    { name:'Dr. Kavya Reddy', spec:'Endocrinologist · Apollo', mutual:'12 mutual', img:'https://randomuser.me/api/portraits/women/65.jpg',
      role:'Endocrinologist', hospital:'Apollo Hospitals', city:'Chennai', exp:'14 yrs', connections:'980',
      bio:'Endocrinologist focused on diabetes, thyroid and metabolic disorders. Special interest in obesity, insulin resistance and PCOS management.',
      tags:['Type 2 Diabetes','Thyroid','Obesity','PCOS'],
      edu:[{t:'DM Endocrinology',s:'PGIMER, Chandigarh · 2012'},{t:'MD General Medicine',s:'AIIMS, New Delhi · 2008'}] },
    { name:'Dr. Sameer Shah', spec:'Cardiologist · Fortis', mutual:'8 mutual', img:'https://randomuser.me/api/portraits/men/52.jpg',
      role:'Interventional Cardiologist', hospital:'Fortis Hospital', city:'Mumbai', exp:'18 yrs', connections:'2.1k',
      bio:'Interventional cardiologist with 18 years in angioplasty and structural heart disease. Passionate about preventive cardiology.',
      tags:['Angioplasty','Heart Failure','Preventive Cardiology'],
      edu:[{t:'DM Cardiology',s:'KEM Hospital, Mumbai · 2009'},{t:'MD Medicine',s:'Grant Medical College · 2005'}] },
    { name:'Dr. Imran Khan', spec:'Physician · Max', mutual:'5 mutual', img:'https://randomuser.me/api/portraits/men/61.jpg',
      role:'Consultant Physician', hospital:'Max Healthcare', city:'New Delhi', exp:'9 yrs', connections:'640',
      bio:'Consultant physician managing complex internal medicine, hypertension and cardiometabolic cases.',
      tags:['Internal Medicine','Hypertension','Diabetes'],
      edu:[{t:'MD General Medicine',s:'MAMC, New Delhi · 2015'},{t:'MBBS',s:'JN Medical College · 2011'}] }
  ];
  function renderReqs(){
    document.getElementById('reqs').innerHTML = requests.map((r,i)=>`
      <div class="req" data-i="${i}">
        <img src="${r.img}" alt="">
        <div class="m"><div class="nm">${r.name}</div><div class="sp">${r.spec}<span class="dot">·</span><span class="mut">${r.mutual}</span></div></div>
        <div class="acts">
          <button class="acc" data-acc="${i}" aria-label="Accept"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
          <button class="ign" data-ign="${i}" aria-label="Ignore"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg></button>
        </div>

  }
  function acceptRequest(idx){
    const card = document.querySelector(`.req[data-i="${idx}"]`);
    if(card){ card.classList.add('gone'); setTimeout(()=>{ requests.splice(idx,1); renderReqs(); }, 280); }
    else { requests.splice(idx,1); renderReqs(); }
  }
  document.getElementById('reqs').addEventListener('click', e=>{
    const acc=e.target.closest('[data-acc]'), ign=e.target.closest('[data-ign]');
    if(acc){ const i=+acc.dataset.acc; toast('Connected with '+requests[i].name.replace('Dr. ','')); acceptRequest(i); return; }

    // avatar or row → open full profile
    const row=e.target.closest('.req'); if(row) openProfile(requests[+row.dataset.i], 'request', +row.dataset.i);
  });

  // ---- Suggested ----
  const suggested = [
    { name:'Dr. Neha Gupta', spec:'Nephrologist', mutual:'9 mutual', img:'https://randomuser.me/api/portraits/women/12.jpg',
      role:'Nephrologist', hospital:'Medanta', city:'Gurugram', exp:'11 yrs', connections:'1.3k',
      bio:'Nephrologist managing CKD, dialysis and transplant care with a focus on cardio-renal syndrome.',
      tags:['CKD','Dialysis','Transplant','Cardio-Renal'], edu:[{t:'DM Nephrology',s:'SGPGI, Lucknow · 2013'},{t:'MD Medicine',s:'KGMU · 2009'}] },
    { name:'Dr. Rahul Verma', spec:'Diabetologist', mutual:'6 mutual', img:'https://randomuser.me/api/portraits/men/22.jpg',
      role:'Diabetologist', hospital:'Manipal Hospitals', city:'Bengaluru', exp:'8 yrs', connections:'720',
      bio:'Diabetologist specialising in technology-driven diabetes care, CGM and insulin pump therapy.',
      tags:['Type 1 & 2 Diabetes','CGM','Insulin Pumps'], edu:[{t:'DNB Endocrinology',s:'Manipal · 2016'},{t:'MBBS',s:'BMCRI · 2011'}] },
    { name:'Dr. Anjali Desai', spec:'Endocrinology', mutual:'4 mutual', img:'https://randomuser.me/api/portraits/women/32.jpg',
      role:'Endocrinologist', hospital:'Sterling Hospital', city:'Ahmedabad', exp:'10 yrs', connections:'890',
      bio:'Endocrinologist with interest in reproductive endocrinology, thyroid and bone metabolism.',
      tags:['Thyroid','Reproductive Endo','Osteoporosis'], edu:[{t:'DM Endocrinology',s:'PGIMER · 2014'}] },
    { name:'Dr. Arjun Rao', spec:'Cardiology', mutual:'3 mutual', img:'https://randomuser.me/api/portraits/men/41.jpg',
      role:'Cardiologist', hospital:'Narayana Health', city:'Bengaluru', exp:'13 yrs', connections:'1.6k',
      bio:'Clinical cardiologist focused on heart failure, arrhythmia and preventive cardiology.',
      tags:['Heart Failure','Arrhythmia','Echocardiography'], edu:[{t:'DM Cardiology',s:'JIPMER · 2011'}] }
  ];
  document.getElementById('sugg').innerHTML = suggested.map((s,i)=>`
    <div class="scard" data-si="${i}">
      <img src="${s.img}" alt="">
      <div class="nm">${s.name}</div><div class="sp">${s.role}</div><div class="mut">${s.mutual}</div>
      <button data-connect="${i}">+ Connect</button>
    </div>`).join('');
  document.getElementById('sugg').addEventListener('click', e=>{
    const b=e.target.closest('[data-connect]');
    if(b){ if(b.classList.contains('done')){ b.textContent='+ Connect'; b.classList.remove('done'); toast('Request withdrawn'); } else { b.textContent='Requested'; b.classList.add('done'); toast('Connection requested'); } return; }
    const card=e.target.closest('.scard');
    if(card) openProfile(suggested[+card.dataset.si], 'suggest', +card.dataset.si);
  });

  // ---- Groups ----
  let myCreatedGroups=[]; try{ myCreatedGroups=JSON.parse(localStorage.getItem('myGroups')||'[]'); }catch(e){}
  const groups = myCreatedGroups.map(g=>({ name:g.name, members:g.members, ico:grpIco, avatar:g.avatar, reqCount:(g.joinRequests||[]).length })).concat([
    { name:'Indian Diabetes Forum',   members:'12.4k members', ico:grpIco },
    { name:'City Cardiology Society', members:'3.2k members',  ico:grpIco },
    { name:'Young Physicians Network', members:'8.7k members', ico:grpIco }
  ]);
  const dotsIco='<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>';
  function renderMyGroups(){
    document.getElementById('groups').innerHTML = groups.length ? groups.map((g,i)=>`
      <div class="grp" data-gi="${i}"><span class="gi">${g.avatar?`<img src="${g.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:14px">`:g.ico}</span><div class="m"><div class="nm">${g.name}</div><div class="sp">${g.members}</div></div>${g.reqCount?`<span class="grp-req">${g.reqCount} request${g.reqCount>1?'s':''}</span>`:''}<button type="button" class="dots" data-gdots="${i}" aria-label="Group options">${dotsIco}</button></div>`).join('')
      : `<div class="grp-empty">You haven't joined any groups yet.</div>`;
  }
  renderMyGroups();

  // discover groups
  const discover = [
    { name:'Endocrine Society of India', members:'22.1k members' },
    { name:'Clinical Cardiology Hub',    members:'15.8k members' },
    { name:'Nephrology Connect',         members:'6.4k members' }
  ];
  document.getElementById('discoverGroups').innerHTML = discover.map(g=>`
    <div class="grp"><span class="gi">${grpIco}</span><div class="m"><div class="nm">${g.name}</div><div class="sp">${g.members}</div></div><span class="go">Join</span></div>`).join('');

  // your groups → dots opens leave/share sheet, row opens the group screen
  const grpOptBackdrop=document.getElementById('grpOptBackdrop'), grpOptSheet=document.getElementById('grpOptSheet'), grpOptBody=document.getElementById('grpOptBody');
  let grpOptIdx=-1;
  const leaveIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>';
  const shareIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><line x1="8.3" y1="10.7" x2="15.7" y2="6.3"/><line x1="8.3" y1="13.3" x2="15.7" y2="17.7"/></svg>';
  function openGroupOpts(i){
    grpOptIdx=i;
    grpOptBody.innerHTML = `<div class="grab"></div>
      <button class="opt-item danger" data-gopt="leave">${leaveIco}Leave this group</button>

  }
  function closeGroupOpts(){ grpOptBackdrop.classList.remove('open'); grpOptSheet.classList.remove('open'); }
  grpOptBackdrop.addEventListener('click', closeGroupOpts);
  grpOptBody.addEventListener('click', e=>{
    const b=e.target.closest('[data-gopt]'); if(!b) return;

      closeGroupOpts();

  document.getElementById('groups').addEventListener('click', e=>{
    const dots=e.target.closest('[data-gdots]');
    if(dots){ openGroupOpts(+dots.dataset.gdots); return; }
    const row=e.target.closest('.grp'); if(!row) return;
    location.href='group.html?name='+encodeURIComponent(groups[+row.dataset.gi].name);
  });
  document.getElementById('discoverGroups').addEventListener('click', e=>{
    const row=e.target.closest('.grp'); if(!row) return;
    const go=row.querySelector('.go'), name=row.querySelector('.nm').textContent;
    const joined=go.classList.toggle('joined');
    go.textContent = joined ? 'Joined' : 'Join';
    toast(joined ? 'Joined '+name : 'Left '+name);
  });

  // requested groups (pending approval)
  const requested = [
    { name:'Interventional Cardiology India', members:'9.1k members' },
    { name:'Women in Medicine Network',       members:'14.3k members' }
  ];
  function renderRequested(){
    document.getElementById('requestedGroups').innerHTML = requested.length ? requested.map(g=>`
      <div class="grp"><span class="gi">${grpIco}</span><div class="m"><div class="nm">${g.name}</div><div class="sp">${g.members}</div></div><span class="go pending" data-cancel>Pending</span></div>`).join('')
      : `<div class="grp-empty">No pending requests.</div>`;
  }
  renderRequested();
  document.getElementById('requestedGroups').addEventListener('click', e=>{
    const btn=e.target.closest('[data-cancel]'); if(!btn) return;
    const row=btn.closest('.grp'), name=row.querySelector('.nm').textContent;
    requested.splice(requested.findIndex(g=>g.name===name),1);
    renderRequested();
    toast('Request withdrawn for '+name);
  });

  // groups sub-tabs
  document.getElementById('grpSeg').addEventListener('click', e=>{
    const b=e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#grpSeg button').forEach(x=>x.classList.toggle('on', x===b));
    const gt=b.dataset.gt;
    document.getElementById('groups').hidden = gt!=='mine';
    document.getElementById('requestedGroups').hidden = gt!=='requested';
    document.getElementById('discoverGroups').hidden = gt!=='discover';

  const messages = [
    { name:'Dr. Meera Iyer', img:'https://randomuser.me/api/portraits/women/68.jpg', last:'Sure, I’ll send the CGM deck over.', tm:'2m', unread:true },

    const dv=e.target.closest('[data-doc]'); if(dv){ const m=postFromEl(dv).media; const w=window.open(); if(w) w.location=m.data; return; }
    const rx=e.target.closest('[data-react]'); if(rx){ react(postFromEl(rx), rx.dataset.react); closePops(); return; }
    const lb=e.target.closest('.reactbtn'); if(lb){ if(lpFired){ lpFired=false; return; } react(postFromEl(lb),'like'); return; }
    const clk=e.target.closest('[data-clike]'); if(clk){ const p=postFromEl(clk); const c=p.comments[+clk.dataset.clike]; c.liked=!c.liked; c.likes=(c.likes||0)+(c.liked?1:-1); saveFeed(); renderFeed(); return; }
    const rpl=e.target.closest('[data-creply]'); if(rpl){ const p=postFromEl(rpl); p._open=true; focusId=p.id; renderFeed(); const inp=feedEl.querySelector(`.post[data-id="${p.id}"] [data-cin]`); if(inp){ inp.value='@'+p.comments[+rpl.dataset.creply].name.replace('Dr. ','')+' '; inp.focus(); } return; }
    const cs=e.target.closest('[data-csend]'); if(cs){ addInline(cs.parentElement.querySelector('[data-cin]')); return; }
    const btn=e.target.closest('[data-act]'); if(!btn) return;
    const p=postFromEl(btn), act=btn.dataset.act;
    if(act==='comment'){ p._open=!p._open; if(p._open) focusId=p.id; renderFeed(); }
    else if(act==='repost'){ p.shares++; saveFeed(); renderFeed(); }
    else if(act==='send'){ btn.innerHTML = sendI+'Sent'; }
  });
  feedEl.addEventListener('keydown', e=>{ if(e.key==='Enter' && e.target.matches('[data-cin]')){ e.preventDefault(); addInline(e.target); } });
  document.addEventListener('click', e=>{ if(!e.target.closest('.react-wrap')) closePops(); });

  // ---- Post options (⋯) with Report ----
  const optBackdrop=document.getElementById('optBackdrop'), optSheet=document.getElementById('optSheet'), optBody=document.getElementById('optBody');
  let optPost=null;
  const menuIco={
    save:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v17l-6-4-6 4z"/></svg>',
    link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg>',
    mute:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12h8"/></svg>',
    report:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>'
  };
  const okIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg>';
  function optMenu(){
    optBody.innerHTML = `<div class="grab"></div>
      <button class="opt-item" data-opt="save">${menuIco.save}Save post</button>
      <button class="opt-item" data-opt="link">${menuIco.link}Copy link</button>
      <button class="opt-item" data-opt="mute">${menuIco.mute}Not interested</button>
      <button class="opt-item danger" data-opt="report">${menuIco.report}Report post</button>`;
  }
  function openOpts(p){ optPost=p; optMenu(); optBackdrop.classList.add('open'); optSheet.classList.add('open'); }
  function closeOpts(){ optBackdrop.classList.remove('open'); optSheet.classList.remove('open'); }
  optBackdrop.addEventListener('click', closeOpts);
  optBody.addEventListener('click', e=>{
    const b=e.target.closest('[data-opt]'); if(!b) return;
    const opt=b.dataset.opt;
    if(opt==='report'){
      optBody.innerHTML = `<div class="grab"></div><div class="opt-done"><div class="ok">${okIco}</div><b>Thanks for reporting</b><p>Our team will review this post against community &amp; medical-content guidelines.</p></div>`;
      setTimeout(closeOpts, 1600);
    } else {
      const msg = opt==='save'?'Post saved':opt==='link'?'Link copied':'You’ll see fewer posts like this';
      optBody.innerHTML = `<div class="grab"></div><div class="opt-done"><div class="ok">${okIco}</div><b>${msg}</b></div>`;
      setTimeout(closeOpts, 1100);
    }
  });

  // ---- Media viewer (image lightbox / video / pdf) ----
  const mediaModal=document.getElementById('mediaModal'), mmBody=document.getElementById('mmBody');
  function openMedia(m){
    if(!m) return;
    document.getElementById('mmTitle').textContent = m.name || m.type.toUpperCase();
    mmBody.innerHTML = m.type==='image' ? `<img src="${m.data}" alt="">`
      : m.type==='video' ? `<video src="${m.data}" controls autoplay></video>`
      : `<iframe src="${m.data}" title="${m.name||'PDF'}"></iframe>`;
    mediaModal.classList.add('open');
  }
  function closeMedia(){ mediaModal.classList.remove('open'); mmBody.innerHTML=''; }
  document.getElementById('mmClose').addEventListener('click', closeMedia);
  mediaModal.addEventListener('click', e=>{ if(e.target===mediaModal) closeMedia(); });

  // ---- Composer attachments (image / video / pdf) ----
  let pendingMedia=null;
  const compFile=document.getElementById('compFile'), compPrev=document.getElementById('compPrev');
  const ACCEPT = { image:'image/*', video:'video/*', audio:'audio/*', pdf:'application/pdf', doc:'.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.csv' };
  document.querySelectorAll('#compSheet .tool[data-media]').forEach(b=>b.addEventListener('click',()=>{
    const t=b.dataset.media;
    compFile.accept = ACCEPT[t] || '*/*';
    compFile.dataset.type=t; compFile.value=''; compFile.click();
  }));
  compFile.addEventListener('change', e=>{
    const f=e.target.files[0]; if(!f) return;
    const t=compFile.dataset.type, r=new FileReader();
    r.onload=()=>{ pendingMedia={type:t, data:r.result, name:f.name}; renderPrev(); compPost.disabled=!(compText.value.trim()||pendingMedia); };
    r.readAsDataURL(f);
  });
  function renderPrev(){
    if(!pendingMedia){ compPrev.innerHTML=''; return; }
    const m=pendingMedia;
    const inner = m.type==='image'?`<img src="${m.data}" alt="">`
      : m.type==='video'?`<video src="${m.data}" controls></video>`
      : m.type==='audio'?`<div class="pdfp"><audio src="${m.data}" controls style="width:100%"></audio></div>`
      : `<div class="pdfp">${m.type==='pdf'?pdfIco:docIco}<span>${m.name}</span></div>`;
    compPrev.innerHTML = `<div class="cm-prev">${inner}<button class="rm" id="rmMedia">✕</button></div>`;
    document.getElementById('rmMedia').onclick=()=>{ pendingMedia=null; renderPrev(); compPost.disabled=!compText.value.trim(); };
  }

  // ---- Composer ----
  const compBackdrop=document.getElementById('compBackdrop'), compSheet=document.getElementById('compSheet');
  const compText=document.getElementById('compText'), compPost=document.getElementById('compPost');
  const compTagList=['Case','Article','Question','Advisory','CME'];
  let compTag=null;
  document.getElementById('compTags').innerHTML = compTagList.map(t=>`<span class="ctag" data-t="${t}">${t}</span>`).join('');
  function openComp(){ compText.value=''; compTag=null; pendingMedia=null; compPrev.innerHTML=''; compPost.disabled=true; document.querySelectorAll('.ctag').forEach(x=>x.classList.remove('on')); compBackdrop.classList.add('open'); compSheet.classList.add('open'); setTimeout(()=>compText.focus(),300); }
  function closeComp(){ compBackdrop.classList.remove('open'); compSheet.classList.remove('open'); }
  document.getElementById('composer').addEventListener('click', openComp);
  document.querySelectorAll('.sp-act').forEach(b=>b.addEventListener('click', openComp));
  document.getElementById('compClose').addEventListener('click', closeComp);
  compBackdrop.addEventListener('click', closeComp);
  compText.addEventListener('input', ()=>{ compPost.disabled = !(compText.value.trim()||pendingMedia); });
  document.getElementById('compTags').addEventListener('click', e=>{
    const t=e.target.closest('.ctag'); if(!t) return;
    if(t.classList.contains('on')){ t.classList.remove('on'); compTag=null; }
    else { document.querySelectorAll('.ctag').forEach(x=>x.classList.remove('on')); t.classList.add('on'); compTag=t.dataset.t; }
  });
  compPost.addEventListener('click', ()=>{
    const body=compText.value.trim(); if(!body && !pendingMedia) return;
    posts.unshift({ id:Date.now(), name:ME.name, spec:ME.spec, img:ME.img, time:'now', body, tag:compTag||'', media:pendingMedia||null, rc:{}, my:null, shares:0, comments:[], _open:false });
    pendingMedia=null;
    saveFeed(); renderFeed(); closeComp();
  });

  // ---- Comments ----
  const cmtBackdrop=document.getElementById('cmtBackdrop'), cmtSheet=document.getElementById('cmtSheet');
  const cmtList=document.getElementById('cmtList'), cmtInput=document.getElementById('cmtInput');
  let activePost=null;
  function renderComments(){
    cmtList.innerHTML = activePost.comments.length
      ? activePost.comments.map(c=>`<div class="cmt"><img src="${c.img}" alt=""><div class="cb"><div class="nm">${c.name}</div><div class="tx">${c.text}</div><div class="tm">${c.time}</div></div></div>`).join('')
      : `<div class="cmt-empty">No comments yet — be the first to reply.</div>`;
  }
  function openComments(post){ activePost=post; renderComments(); cmtInput.value=''; cmtBackdrop.classList.add('open'); cmtSheet.classList.add('open'); }
  function closeComments(){ cmtBackdrop.classList.remove('open'); cmtSheet.classList.remove('open'); }
  cmtBackdrop.addEventListener('click', closeComments);
  function sendComment(){
    const text=cmtInput.value.trim(); if(!text||!activePost) return;
    activePost.comments.push({ name:ME.name, img:ME.img, text, time:'now' });
    saveFeed(); renderComments(); renderFeed(); cmtInput.value='';
  }
  document.getElementById('cmtSend').addEventListener('click', sendComment);
  cmtInput.addEventListener('keydown', e=>{ if(e.key==='Enter') sendComment(); });

  // ---- Profile sheet ----
  const profBackdrop = document.getElementById('profBackdrop');
  const profSheet = document.getElementById('profSheet');
  const profBody = document.getElementById('profBody');
  const vfIco = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="m12 2 2.4 1.8 3 .1 1 2.8 2.4 1.8-1 2.8 1 2.8-2.4 1.8-1 2.8-3 .1L12 22l-2.4-1.8-3-.1-1-2.8L3.2 15.4l1-2.8-1-2.8 2.4-1.8 1-2.8 3-.1z"/><path d="m8.5 12 2.5 2.5 4.5-5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const pinIco = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-12a7 7 0 0 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.5"/></svg>';
  const chatIco = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>';
  const capIco = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>';

  function openProfile(p, ctx, idx){
    const primary = ctx==='request' ? 'Accept request' : 'Connect';
    const _people='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20v-1.5A4.5 4.5 0 0 1 7.5 14h3A4.5 4.5 0 0 1 15 18.5V20"/><circle cx="17.5" cy="8.5" r="2.5"/></svg>';
    profBody.innerHTML = `
      <div class="pv-hero">
        <div class="pv-bar">
          <button class="pv-ic" id="pvBack" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="pv-ic" id="pvMenu" aria-label="More"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="5" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="12" cy="19" r="1.7"/></svg></button>
        </div>
        <div class="pv-id">
          <div class="pv-avw"><img class="pv-av" src="${p.img}" alt=""><span class="pv-chk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
          <div class="pv-idt">
            <div class="pv-name">${p.name}<svg class="vf" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#3d8bfd"/><path d="m8 12 2.5 2.5 5.5-5.5" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="pv-role">${p.role}</div>
            <div class="pv-loc">${pinIco}${p.hospital}, ${p.city}</div>
          </div>
        </div>
      </div>
      <div class="pv-stats">
        <div class="pv-stat"><span class="pv-sic b">${_people}</span><div class="pv-sm"><b>${p.connections}</b><span>Connections</span></div></div>
        <div class="pv-vdiv"></div>
        <div class="pv-stat"><span class="pv-sic g">${_people}</span><div class="pv-sm"><b>${p.mutual.replace(' mutual','')}</b><span>Mutual</span></div></div>
        <div class="pv-vdiv"></div>
        <div class="pv-stat"><span class="pv-sic p"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="5"/><path d="M8.5 13 7 22l5-3 5 3-1.5-9"/></svg></span><div class="pv-sm"><b>${p.exp}</b><span>Experience</span></div></div>
      </div>
      <div class="pv-card2">
        <div class="pv-col"><span class="pv-cic b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg></span><div class="pv-ct">Specialization</div><div class="pv-cd">${p.tags.join(', ')}</div></div>
        <div class="pv-vdiv"></div>
        <div class="pv-col"><span class="pv-cic g"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V5a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v16"/><path d="M15 21V9h3a1 1 0 0 1 1 1v11"/><path d="M9 8h2M9 12h2M9 16h2"/></svg></span><div class="pv-ct">Affiliation</div><div class="pv-cd">${p.hospital}, ${p.city}</div></div>
      </div>
      <div class="pv-quote"><span class="pv-q">&ldquo;</span><p>${p.bio}</p></div>
      <div class="pv-actions">
        <button class="pv-btn ghost" id="pvMsg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg>Message</button>
        <button class="pv-btn primary" id="pvBook"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Book</button>
        <button class="pv-btn ghost" id="pPri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3 20v-1.5A4.5 4.5 0 0 1 7.5 14H10"/><path d="M17 8v6M14 11h6"/></svg>Connect</button>
      </div>
    `;
    { const bk=document.getElementById('pvBack'); if(bk) bk.onclick=closeProfile; }
    { const mn=document.getElementById('pvMenu'); if(mn) mn.onclick=()=>toast('More options'); }
    { const mg=document.getElementById('pvMsg'); if(mg) mg.onclick=()=>toast('Messaging coming soon'); }
    { const bkk=document.getElementById('pvBook'); if(bkk) bkk.onclick=()=>toast('Booking — coming soon'); }
    document.getElementById('pPri').onclick = ()=>{
      const b=document.getElementById('pPri');
      if(b.classList.contains('done')) return;
      b.textContent = ctx==='request' ? '✓ Connected' : '✓ Requested'; b.classList.add('done');
      if(ctx==='request') setTimeout(()=>{ closeProfile(); acceptRequest(idx); }, 700);
    };
    profBackdrop.classList.add('open'); profSheet.classList.add('open');
    profSheet.scrollTop = 0;
  }
  function closeProfile(){ profBackdrop.classList.remove('open'); profSheet.classList.remove('open'); }
  profBackdrop.addEventListener('click', closeProfile);

  // profile of a post author — shows their posts & comments
  function openAuthor(name){
    const src = posts.find(p=>p.name===name);
    const img = src?src.img:'', spec = src?src.spec:'', ver = spec!=='Group';
    const myPosts = posts.filter(p=>p.name===name);
    const myComments = []; posts.forEach(p=>p.comments.forEach(c=>{ if(c.name===name) myComments.push({c,p}); }));
    const reactSum = p => Object.values(p.rc||{}).reduce((s,v)=>s+v,0);
    const postsHTML = myPosts.length ? myPosts.map(p=>`
      <div class="pa-post">${p.tag?`<span class="post-tag">${p.tag}</span>`:''}
        <div class="pb"${p.tag?' style="margin-top:8px"':''}>${p.body}</div>
        ${p.media?`<div class="pa-media">📎 ${p.media.type} attachment</div>`:''}
        <div class="pm"><span>${reactSum(p)} reactions</span><span>${p.comments.length} comments</span><span>${p.time}</span></div>
      </div>`).join('') : `<div class="pa-empty">No posts yet.</div>`;
    const cmtsHTML = myComments.length ? myComments.map(({c,p})=>`
      <div class="pa-cmt"><div class="ct">${c.text}</div><div class="cm">on ${p.name}’s post · ${c.time}</div></div>`).join('') : `<div class="pa-empty">No comments yet.</div>`;
    profBody.innerHTML = `
      <div class="p-hero"><img class="p-av" src="${img}" alt=""></div>
      <div class="p-top"><div class="p-name">${name}${ver?' '+vfIco:''}</div><div class="p-role">${spec}</div></div>
      <div class="p-stats">
        <div><b>${myPosts.length}</b><span>Posts</span></div>
        <div><b>${myComments.length}</b><span>Comments</span></div>
        <div><b>${((name.length*137)%1900)+300}</b><span>Connections</span></div>
      </div>
      <div class="p-actions"><button class="p-pri" id="paConnect">Connect</button><button class="p-sec">${chatIco}Message</button></div>
      <div class="pa-tabs"><button data-pt="posts" class="active">Posts</button><button data-pt="comments">Comments</button></div>
      <div id="paPosts">${postsHTML}</div>
      <div id="paComments" hidden>${cmtsHTML}</div>`;
    profBody.querySelectorAll('.pa-tabs button').forEach(b=>b.addEventListener('click',()=>{
      profBody.querySelectorAll('.pa-tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
      document.getElementById('paPosts').hidden = b.dataset.pt!=='posts';
      document.getElementById('paComments').hidden = b.dataset.pt!=='comments';
    }));
    document.getElementById('paConnect').onclick = e=>{ e.target.textContent='✓ Requested'; e.target.classList.add('done'); };
    profBackdrop.classList.add('open'); profSheet.classList.add('open'); profSheet.scrollTop=0;
  }
  document.addEventListener('keydown', e=>{
    if(e.key!=='Escape') return;
    if(optSheet.classList.contains('open')){ closeOpts(); return; }
    if(grpOptSheet.classList.contains('open')){ closeGroupOpts(); return; }
    if(document.getElementById('mediaModal').classList.contains('open')){ closeMedia(); return; }
    if(document.getElementById('cmtSheet').classList.contains('open')){ document.getElementById('cmtSheet').classList.remove('open'); document.getElementById('cmtBackdrop').classList.remove('open'); return; }
    if(document.getElementById('compSheet').classList.contains('open')){ document.getElementById('compSheet').classList.remove('open'); document.getElementById('compBackdrop').classList.remove('open'); return; }
    closeProfile();
  });

  renderReqs();

  (function(){
    var p=document.querySelector('.phone'), BASE=390;
    function fit(){ if(window.innerWidth<=600){ var s=window.innerWidth/BASE; p.style.width=BASE+'px'; p.style.height=(window.innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } }
    fit(); window.addEventListener('resize',fit); window.addEventListener('orientationchange',fit);
  })();
</script>
</body>
</html>
