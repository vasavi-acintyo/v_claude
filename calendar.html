<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — CME Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @keyframes evIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes dayPop{0%{transform:scale(.8)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} .scroll{padding-top:max(10px,env(safe-area-inset-top));} }

  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:6px 18px 20px;}
  .scroll::-webkit-scrollbar{width:0;}

  .ptop{display:flex;align-items:center;justify-content:space-between;padding:8px 0 2px;}
  .ptop h1{font-size:20px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;}
  .ptop .sub{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .icon-btn{width:38px;height:38px;border-radius:50%;background:var(--chip);border:none;display:grid;place-items:center;cursor:pointer;color:var(--ink);transition:transform .16s, opacity .16s;}
  .icon-btn#addBtn{background:var(--brand);color:#fff;}
  .icon-btn:active{transform:scale(.94);}

  /* segmented control */
  .seg{display:flex;background:var(--chip);border-radius:11px;padding:3px;margin-top:12px;position:relative;}
  .seg button{flex:1;border:none;background:none;font-family:inherit;font-size:10.5px;font-weight:700;color:var(--muted);padding:8px 8px;border-radius:8px;cursor:pointer;z-index:1;transition:color .2s, transform .16s, opacity .16s;}
  .seg button.active{color:#fff;}
  .seg button:active{transform:scale(.94);}
  .seg .pill{position:absolute;top:3px;bottom:3px;left:3px;width:calc(50% - 3px);border-radius:10px;background:var(--brand);transition:transform .3s cubic-bezier(.34,1.3,.5,1);box-shadow:0 6px 14px -6px var(--brand);}
  .seg.agenda .pill{transform:translateX(100%);}

  /* Next-up card — light, brand-tinted (matches the rest of the app instead of a heavy dark hero) */
  .nextup{margin-top:12px;border-radius:15px;padding:11px 13px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,var(--brand-soft),var(--soft1) 75%);border:1px solid var(--line);}
  .nu-badge{display:inline-flex;align-items:center;gap:5px;font-size:8px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--brand);padding:4px 9px;border-radius:20px;}
  .nu-badge .d{width:4px;height:4px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite;}
  .nu-t{font-size:14px;font-weight:800;font-family:var(--display);margin:8px 0 4px;line-height:1.25;color:var(--ink);letter-spacing:-.01em;}
  .nu-m{font-size:9.5px;color:var(--slate-700);display:flex;gap:12px;flex-wrap:wrap;font-weight:600;}
  .nu-m span{display:inline-flex;align-items:center;gap:4px;}
  .nu-m svg{color:var(--brand);}
  .nu-cd{display:flex;gap:5px;margin-top:9px;}
  .nu-cd .b{flex:1;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:5px 4px;text-align:center;}
  .nu-cd .b b{display:block;font-size:13px;font-weight:800;font-family:var(--display);color:var(--brand);}
  .nu-cd .b span{font-size:6.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;}

  /* month card */
  .calx{margin-top:10px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:11px 10px;box-shadow:0 12px 28px -18px rgba(0,0,0,.22);}
  .cx-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .cx-head .mo{font-size:12.5px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;}
  .cx-head .mo small{font-size:9px;color:var(--muted);font-weight:600;font-family:var(--ui);}
  .cx-nav{display:flex;gap:5px;}
  .cx-nav button{width:26px;height:26px;border-radius:50%;border:none;background:var(--chip);color:var(--ink);display:grid;place-items:center;cursor:pointer;transition:background .15s, color .15s, transform .16s, opacity .16s;}
  .cx-nav button:hover{background:var(--brand-soft);color:var(--brand);}
  .cx-nav button:active{transform:scale(.9);}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
  .dow span{text-align:center;font-size:7.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .day{aspect-ratio:1;min-height:0;border:none;background:none;border-radius:50%;font-family:inherit;font-size:10px;font-weight:700;color:var(--ink);
    cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:background .18s, color .18s, transform .16s, opacity .16s;}
  .day:not(.other):active{transform:scale(.9);}
  .day.other{opacity:0;pointer-events:none;}
  .day:hover:not(.sel){background:var(--chip);}
  .day.today{color:var(--brand);box-shadow:inset 0 0 0 1.5px var(--brand);}
  .day.sel{color:#fff;background:linear-gradient(135deg,var(--g1),var(--g2));box-shadow:0 8px 18px -6px var(--brand);animation:dayPop .35s cubic-bezier(.34,1.5,.5,1);}
  .day .dots{display:flex;gap:2px;height:3px;align-items:center;}
  .day .dots i{width:3px;height:3px;border-radius:50%;}
  .day.sel .dots i{background:#fff !important;}

  /* month stats — reuses the app's standard tile pattern */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px;}
  .tile{background:var(--soft1);border:1px solid transparent;border-radius:12px;padding:9px 6px;text-align:center;}
  .tile:nth-child(2){background:var(--soft2);}
  .tile b{display:block;font-size:15px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;color:var(--brand);}
  .tile span{font-size:7px;font-weight:700;color:var(--muted);margin-top:2px;display:block;text-transform:uppercase;letter-spacing:.03em;}

  /* selected-day / agenda list */
  .sel-h{display:flex;align-items:center;justify-content:space-between;margin:20px 0 12px;}
  .sel-h h2{font-size:15px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;}
  .sel-h .cnt{font-size:9.5px;font-weight:700;color:var(--brand);background:var(--brand-soft);padding:4px 9px;border-radius:20px;}
  .events{display:flex;flex-direction:column;gap:10px;}
  .ev{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;cursor:pointer;
    transition:transform .16s, box-shadow .16s, border-color .16s;animation:evIn .4s ease both;position:relative;overflow:hidden;}
  .ev::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cc,var(--brand));}
  .ev:hover{transform:translateY(-2px);box-shadow:0 14px 26px -16px rgba(0,0,0,.3);border-color:var(--brand);}
  .ev:active{transform:scale(.985);}
  .ev .tm{flex:0 0 auto;text-align:center;min-width:50px;display:flex;flex-direction:column;justify-content:center;padding-left:6px;}
  .ev .tm .h{font-size:14px;font-weight:800;font-family:var(--display);color:var(--ink);}
  .ev .tm .ap{font-size:8px;font-weight:700;color:var(--muted);}
  .ev .ei{flex:1;min-width:0;border-left:1px solid var(--line);padding-left:12px;}
  .ev .cat{font-size:7.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--cc,var(--brand));}
  .ev .et{font-size:12.5px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;margin-top:3px;line-height:1.25;}
  .ev .em{font-size:9.5px;color:var(--muted);margin-top:5px;display:flex;gap:9px;flex-wrap:wrap;}
  .ev .em span{display:inline-flex;align-items:center;gap:4px;}
  .ev .lv{font-size:8px;font-weight:800;color:#fff;background:#ef4444;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;}
  .ev .lv .d{width:4px;height:4px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .ag-date{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.03em;margin:16px 0 9px;text-transform:uppercase;}
  .ag-date:first-child{margin-top:0;}
  .empty{text-align:center;color:var(--muted);font-size:11px;padding:26px 10px;}

  .navitem{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:48px;font-size:10.5px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:none;transition:transform .16s, opacity .16s;}
  .navitem.active{color:var(--brand);font-weight:600;}
  .navitem:active{transform:scale(.9);opacity:.7;}
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-family:var(--ui);font-size:12px;font-weight:600;padding:11px 18px;border-radius:22px;box-shadow:0 12px 28px -10px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .22s, transform .22s;z-index:50;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Doxy mascot badge — V Theme only; other themes keep a plain line icon like the rest of the nav */
  .doxy-classic{display:block;}
  .doxy-badge{display:none;}
  [data-theme="vibrant"] .doxy-classic{display:none;}
  [data-theme="vibrant"] .navitem.doxy-tab{position:relative;overflow:visible;z-index:2;}
  [data-theme="vibrant"] .doxy-badge{display:inline-flex;width:44px;height:44px;border-radius:50%;box-shadow:0 0 0 5px rgba(90,209,230,.6), 0 3px 8px -3px rgba(0,0,0,.35);animation:doxyBob 2.4s ease-in-out infinite;margin-top:-18px;}
  .doxy-badge svg{width:44px;height:44px;display:block;}
  @keyframes doxyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .doxy-badge .antenna-tip{animation:doxyGlow 1.8s ease-in-out infinite;}
  @keyframes doxyGlow{0%,100%{opacity:1}50%{opacity:.45}}
  .doxy-badge .eyes{animation:doxyLook 3.2s ease-in-out infinite;}
  @keyframes doxyLook{0%,12%{transform:translateX(0)}35%,48%{transform:translateX(-1.4px)}65%,78%{transform:translateX(1.4px)}100%{transform:translateX(0)}}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}

  /* =============================================================
     V Theme — trendy card style + colorful accents, matching the
     home-page redesign. Classic/Ocean/Forest keep the original look;
     this only applies when [data-theme="vibrant"].
     ============================================================= */
  [data-theme="vibrant"] .tile{background:var(--card);border:1px solid var(--line);box-shadow:0 6px 16px -14px rgba(30,20,60,.16);}
  [data-theme="vibrant"] .tile:nth-child(2){background:var(--card);}
  [data-theme="vibrant"] .tile:nth-child(1) b{color:#2563eb;}
  [data-theme="vibrant"] .tile:nth-child(2) b{color:#7c3aed;}
  [data-theme="vibrant"] .tile:nth-child(3) b{color:#d97706;}
</style>

</head>

<script>
  try{ const t = localStorage.getItem('cmeTheme') || 'blue'; if(t!=='classical') document.documentElement.setAttribute('data-theme', t); }catch(e){}

  const clock = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>';
  const award = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/></svg>';

  const CAT = {
    cardio:{c:'#ef4444', n:'Cardiology'},
    endo:  {c:'#1e5fbf', n:'Endocrinology'},
    diab:  {c:'#0f9d58', n:'Diabetes'},
    nephro:{c:'#0ea5e9', n:'Nephrology'},
    lipid: {c:'#f59e0b', n:'Lipidology'}
  };

  // The seeded events + "today" live in May 2025. The grid navigates freely; dots/today/selection
  // only render on the month that actually owns them.
  const EVENT_MONTH = 4, EVENT_YEAR = 2025;   // May 2025 (0-indexed month)
  const TODAY_MONTH = 4, TODAY_YEAR = 2025, today = 21;
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let curMonth = EVENT_MONTH, curYear = EVENT_YEAR;   // currently displayed month
  const events = {
    8:  [{h:'11',ap:'AM',t:'Thyroid Disorders Review',by:'Dr. Priya Nair',cr:'1 CME',cat:'endo'}],
    14: [{h:'06',ap:'PM',t:'GLP-1 Agonists Deep Dive',by:'Dr. Meera Iyer',cr:'1.5 CME',cat:'diab'}],
    21: [{h:'05',ap:'PM',t:'Heart Failure Grand Round',by:'Dr. Arvind Kumar',cr:'1 CME',cat:'cardio'}],
    24: [
      {h:'09',ap:'AM',t:'Cardiometabolic Update 2025',by:'12 speakers',cr:'2 CME',cat:'cardio',live:true},
      {h:'02',ap:'PM',t:'CGM in Clinical Practice',by:'Dr. Vijay Menon',cr:'1 CME',cat:'diab'}
    ],
    28: [{h:'07',ap:'PM',t:'Dyslipidemia Masterclass',by:'Dr. Priya Nair',cr:'1.5 CME',cat:'lipid'}]
  };
  const dowNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // selection is a full date so it survives month navigation
  let selDay = 24, selMonth = EVENT_MONTH, selYear = EVENT_YEAR;

  function isEventMonth(){ return curMonth===EVENT_MONTH && curYear===EVENT_YEAR; }

  function buildDays(){
    const firstDow = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    const eventMonth = isEventMonth();
    const cells = [];
    for(let i=0;i<firstDow;i++) cells.push({other:true});
    for(let d=1; d<=daysInMonth; d++) cells.push({d});
    document.getElementById('days').innerHTML = cells.map(c=>{
      if(c.other) return `<button class="day other" disabled></button>`;
      const evs = eventMonth ? (events[c.d]||[]) : [];
      const cats = [...new Set(evs.map(e=>e.cat))].slice(0,3);
      const dots = cats.map(k=>`<i style="background:${CAT[k].c}"></i>`).join('');
      const cls = ['day'];
      if(c.d===today && curMonth===TODAY_MONTH && curYear===TODAY_YEAR) cls.push('today');
      if(c.d===selDay && curMonth===selMonth && curYear===selYear) cls.push('sel');
      return `<button class="${cls.join(' ')}" data-d="${c.d}">${c.d}<span class="dots">${dots}</span></button>`;
    }).join('');
    document.getElementById('monthLabel').innerHTML = `${MONTHS[curMonth]} <small>${curYear}</small>`;
    document.querySelectorAll('.day[data-d]').forEach(b=>b.addEventListener('click',()=>{
      selDay=+b.dataset.d; selMonth=curMonth; selYear=curYear; buildDays(); renderEvents();
    }));
  }

  function gotoMonth(delta){
    curMonth += delta;
    if(curMonth<0){ curMonth=11; curYear--; }
    else if(curMonth>11){ curMonth=0; curYear++; }
    buildDays();
  }

  function evCard(e,i){
    const cc = CAT[e.cat].c;
    return `<div class="ev" style="--cc:${cc};animation-delay:${i*70}ms" onclick="location.href='speakers.html?type=event&title=${encodeURIComponent(e.t)}&sub=${encodeURIComponent(e.h+':00 '+e.ap)}'">
        <div class="tm"><span class="h">${e.h}</span><span class="ap">${e.ap}</span></div>
        <div class="ei">
          <div class="cat">${CAT[e.cat].n}</div>
          <div class="et">${e.t}</div>
          <div class="em"><span>${e.by}</span><span>${award}${e.cr}</span>${e.live?'<span class="lv"><span class="d"></span>LIVE</span>':''}</div>
        </div>
      </div>`;
  }

  function renderEvents(){
    const dow = dowNames[new Date(selYear, selMonth, selDay).getDay()];
    document.getElementById('selLabel').textContent = `${dow}, ${selDay} ${MONTHS[selMonth].slice(0,3)}`;
    const list = (selMonth===EVENT_MONTH && selYear===EVENT_YEAR) ? (events[selDay]||[]) : [];
    document.getElementById('selCnt').textContent = list.length ? `${list.length} session${list.length>1?'s':''}` : 'No sessions';
    const el = document.getElementById('events');
    el.innerHTML = list.length ? list.map(evCard).join('') : `<div class="empty">No CME sessions this day.<br>Explore CMEs to add some.</div>`;
  }

  function renderAgenda(){
    const days = Object.keys(events).map(Number).sort((a,b)=>a-b);
    let html='', i=0;
    days.forEach(d=>{
      const dow = dowNames[new Date(EVENT_YEAR, EVENT_MONTH, d).getDay()];
      html += `<div class="ag-date">${dow}, ${d} ${MONTHS[EVENT_MONTH]} ${EVENT_YEAR}</div>`;
      html += events[d].map(e=>evCard(e,i++)).join('');
    });
    document.getElementById('agendaList').innerHTML = html;
  }

  // toast helper — fixed bottom-center pill, auto-dismiss
  let toastTimer;
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 1400);
  }

  // view toggle
  const seg = document.getElementById('seg');
  seg.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    seg.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const agenda = b.dataset.v==='agenda';
    seg.classList.toggle('agenda', agenda);
    document.getElementById('monthView').hidden = agenda;
    document.getElementById('agendaView').hidden = !agenda;
    if(agenda) renderAgenda();
  }));

  buildDays(); renderEvents();
  document.getElementById('prevM').addEventListener('click',()=>gotoMonth(-1));
  document.getElementById('nextM').addEventListener('click',()=>gotoMonth(1));
  document.getElementById('addBtn').addEventListener('click',()=>toast('Add event — coming soon'));
</script>
<script>
  (function(){
    var p=document.querySelector('.phone'), BASE=390;
    function fit(){
      if(window.innerWidth<=600){
        var s=window.innerWidth/BASE;
        p.style.width=BASE+'px'; p.style.height=(window.innerHeight/s)+'px'; p.style.transform='scale('+s+')';
      } else { p.style.transform=''; p.style.width=''; p.style.height=''; }
    }
    fit(); window.addEventListener('resize',fit); window.addEventListener('orientationchange',fit);
  })();
</script>
</body>
</html>
