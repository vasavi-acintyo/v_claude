<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — DocSynapse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  [hidden]{display:none !important;}
  :root{
    --brand:#7d2c3b; --brand-dark:#5e2029; --brand-soft:#f4e7e9; --gold:#b0894f;
    --ink:#2a2320; --slate-700:#514842; --muted:#71665d;
    --line:#e7e0d4; --chip:#f4f0e8; --green:#3f7d4e;
    --surface:#faf6ee; --card:#ffffff; --page:#d8d0c2;
    --g1:#9c4453; --g2:#7d2c3b; --d1:#2b191c; --d2:#5e2029; --d3:#7d2c3b; --glow:rgba(176,137,79,.45);
    --soft1:#f7ede1; --soft2:#f4e7e9; --onGold:#e6cd93;
    --display:'Poppins', sans-serif;
    --ui:'Inter', sans-serif;
  }

  [data-theme="blue"]{--brand:#1e5fbf;--brand-dark:#164a99;--brand-soft:#e7effc;--gold:#b0894f;--ink:#0f2438;--slate-700:#31465e;--muted:#546a80;--line:#e1e9f3;--chip:#eef4fb;--green:#1f9d6b;--surface:#f7fafd;--card:#ffffff;--page:#cdd8e6;--g1:#4f8be8;--g2:#1e5fbf;--d1:#0b2545;--d2:#123a72;--d3:#1e5fbf;--glow:rgba(56,189,248,.42);--soft1:#e9f1ff;--soft2:#eaf3ff;--onGold:#9bdcfa;}
  [data-theme="green"]{--brand:#0f7a5a;--brand-dark:#0b5c44;--brand-soft:#e2f5ee;--gold:#b08631;--ink:#12271f;--slate-700:#33473f;--muted:#6f867d;--line:#dbe9e2;--chip:#eef6f2;--green:#0f7a5a;--surface:#f6fbf8;--card:#ffffff;--page:#cfe0d8;--g1:#2aa578;--g2:#0f7a5a;--d1:#0a2b20;--d2:#0e5540;--d3:#0f7a5a;--glow:rgba(201,162,39,.4);--soft1:#e6f5ee;--soft2:#e9f5e6;--onGold:#e6cf7a;}
  [data-theme="indigo"]{--brand:#5b3df5;--brand-dark:#4c2fe0;--brand-soft:#efeaff;--gold:#a97636;--ink:#181633;--slate-700:#3a3752;--muted:#787593;--line:#e9e7f3;--chip:#f1eefb;--green:#16a34a;--surface:#faf9ff;--card:#ffffff;--page:#d5d2e6;--g1:#7c6cf5;--g2:#5b3df5;--d1:#141233;--d2:#241a54;--d3:#3a2b8f;--glow:rgba(124,108,245,.45);--soft1:#efebff;--soft2:#e7edff;--onGold:#fbbf6b;}
  [data-theme="dark"]{--brand:#8b7bff;--brand-dark:#a99bff;--brand-soft:#241f3d;--gold:#e0b769;--ink:#eef0f6;--slate-700:#c3c7d4;--muted:#8b8fa3;--line:#2a2c3a;--chip:#22242f;--green:#4ade80;--surface:#14151d;--card:#1b1d27;--page:#0a0b0f;--g1:#8b7bff;--g2:#6d5cf0;--d1:#1b1d27;--d2:#23263a;--d3:#2e2b52;--glow:rgba(139,123,255,.4);--soft1:#20222e;--soft2:#242233;--onGold:#e0b769;}
  :root{color-scheme:light;} [data-theme="dark"]{color-scheme:dark;}

  html,body{background:var(--page);font-family:var(--ui);color:var(--ink);-webkit-font-smoothing:antialiased;}
  body{display:flex;justify-content:center;padding:18px;}
  svg{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}} .rise{animation:rise .5s cubic-bezier(.22,1,.36,1) both;}

  .phone{width:390px;height:844px;background:var(--surface);border-radius:44px;box-shadow:0 30px 70px -20px rgba(0,0,0,.45);overflow:hidden;position:relative;display:flex;flex-direction:column;}
  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} .topbar{padding-top:max(6px,env(safe-area-inset-top));} }

  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;}
  .topbar button{width:40px;height:40px;border-radius:50%;background:none;border:none;display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;transition:transform .18s cubic-bezier(.22,1,.36,1);}
  .topbar button:active{transform:scale(.9);}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:6px 18px 24px;}
  .scroll::-webkit-scrollbar{width:0;}

  .s-head{display:flex;align-items:center;gap:13px;margin:6px 2px 20px;}
  .s-head img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--chip);border:1px solid var(--line);}
  .s-head h1{font-size:30px;font-weight:800;font-family:var(--display);letter-spacing:-.03em;}

  .set-card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
  .srow{display:flex;align-items:center;gap:14px;width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:15px 15px;font-family:inherit;color:inherit;text-align:left;cursor:pointer;transition:background .15s;}
  .srow:last-child{border-bottom:none;}
  .srow:active{background:var(--soft1);}
  .srow .si{color:var(--slate-700);flex:0 0 auto;display:grid;place-items:center;}
  .srow .si svg{width:20px;height:20px;}
  .srow .sl{flex:1;min-width:0;font-size:13px;font-weight:700;letter-spacing:-.01em;}
  .srow .sc{color:var(--muted);flex:0 0 auto;}
  .srow .sc svg{width:17px;height:17px;}

  .links{display:flex;flex-direction:column;margin:22px 2px 0;}
  .slink{background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--slate-700);text-align:left;padding:10px 0;cursor:pointer;transition:opacity .15s;}
  .slink:active{opacity:.6;}
  .slink.out{color:var(--brand);font-weight:800;}

  .sfoot{margin:22px 2px 0;font-size:9.5px;line-height:1.7;color:var(--muted);}

  /* appearance sheet */
  .backdrop{position:absolute;inset:0;background:rgba(15,15,35,.45);backdrop-filter:blur(2px);opacity:0;visibility:hidden;transition:opacity .3s, visibility .3s;z-index:30;}
  .backdrop.open{opacity:1;visibility:visible;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:31;background:var(--card);border-radius:22px 22px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .45s cubic-bezier(.34,1.3,.5,1);box-shadow:0 -12px 40px -12px rgba(0,0,0,.4);}
  .sheet.open{transform:translateY(0);}
  .sheet .grab{width:38px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 14px;}
  .sheet h2{font-size:16px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;margin:0 2px 3px;}
  .sheet p{font-size:10px;color:var(--muted);margin:0 2px 6px;}
  .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0 6px;}
  .theme-opt{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 8px;border:1.5px solid var(--line);border-radius:16px;background:var(--card);cursor:pointer;color:inherit;font-family:inherit;transition:transform .16s cubic-bezier(.22,1,.36,1), border-color .16s;}
  .theme-opt:active{transform:scale(.96);} .theme-opt.active{border-color:var(--brand);}
  .theme-opt .sw{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.6);box-shadow:0 2px 6px rgba(0,0,0,.15);}
  .theme-opt .tn{font-size:10px;font-weight:700;}
  .theme-opt .tick{position:absolute;top:7px;right:7px;width:14px;height:14px;color:var(--brand);opacity:0;transition:opacity .16s;}
  .theme-opt.active .tick{opacity:1;}

  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;background:var(--ink);opacity:.85;border-radius:3px;}
  .toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;font-family:inherit;padding:10px 18px;border-radius:22px;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <button id="back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button id="help" aria-label="Help"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.5 1.5c0 1.7-2.5 2-2.5 3.5"/><circle cx="12" cy="17" r=".6" fill="currentColor" stroke="none"/></svg></button>
  </div>

  <div class="scroll">
    <div class="s-head rise">
      <img src="https://randomuser.me/api/portraits/men/52.jpg" alt="">
      <h1>Settings</h1>
    </div>

    <div class="set-card rise" id="setCard"></div>

    <div class="links rise" id="links"></div>

    <div class="sfoot rise">VERSION 1.0 (build 412)<br>DocSynapse · Mysaa Life Health Care © 2026</div>
  </div>

  <div class="home-ind"></div>

  <!-- Appearance sheet -->
  <div class="backdrop" id="apBackdrop"></div>
  <div class="sheet" id="apSheet">
    <div class="grab"></div>
    <h2>Appearance</h2><p>Pick a colour theme. Fonts adapt to your device.</p>
    <div class="theme-grid" id="themeGrid"></div>
  </div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  function applyTheme(t){ if(!t||t==='classical') document.documentElement.removeAttribute('data-theme'); else document.documentElement.setAttribute('data-theme',t); }
  try{ applyTheme(localStorage.getItem('cmeTheme')||'blue'); }catch(e){}
  function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; (document.querySelector('.phone')||document.body).appendChild(t); } t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1400); }

  const I={
    person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20v-1a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v1"/></svg>',
    lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',
    eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
    shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/></svg>',
    bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>',
    chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>'
  };

  const ROWS=[
    {i:'person', l:'Account preferences', act:'appearance'},
    {i:'lock',   l:'Sign in & security'},
    {i:'eye',    l:'Visibility'},
    {i:'shield', l:'Data privacy'},
    {i:'bell',   l:'Notifications'}
  ];
  document.getElementById('setCard').innerHTML = ROWS.map((r,idx)=>`<button class="srow" data-idx="${idx}"><span class="si">${I[r.i]}</span><span class="sl">${r.l}</span><span class="sc">${I.chev}</span></button>`).join('');
  document.getElementById('setCard').addEventListener('click', e=>{
    const b=e.target.closest('.srow'); if(!b) return;
    const r=ROWS[+b.dataset.idx];
    if(r.act==='appearance') openAppearance(); else toast(r.l+' — coming soon');
  });

  const LINKS=['Help Center','Professional Community Policies','Privacy Policy','Accessibility','Recommendation Transparency','User Agreement','End User License Agreement'];
  document.getElementById('links').innerHTML = LINKS.map(l=>`<button class="slink">${l}</button>`).join('') + `<button class="slink out" id="signout">Sign Out</button>`;
  document.querySelectorAll('.slink').forEach(b=>{ if(b.id==='signout') return; b.addEventListener('click',()=>toast(b.textContent+' — coming soon')); });
  document.getElementById('signout').addEventListener('click', ()=>{ try{ localStorage.removeItem('docAuth'); }catch(e){} toast('Signed out'); setTimeout(()=>location.replace('login.html'), 900); });

  document.getElementById('help').addEventListener('click', ()=>toast('Help Center — coming soon'));
  document.getElementById('back').addEventListener('click', ()=>{ if(history.length>1) history.back(); else location.href='profile.html'; });

  // appearance sheet
  const apSheet=document.getElementById('apSheet'), apBackdrop=document.getElementById('apBackdrop');
  function openAppearance(){ apBackdrop.classList.add('open'); apSheet.classList.add('open'); }
  apBackdrop.addEventListener('click', ()=>{ apBackdrop.classList.remove('open'); apSheet.classList.remove('open'); });
  (function(){
    const THEMES=[{id:'classical',name:'Classic',c:'#7d2c3b'},{id:'blue',name:'Ocean',c:'#1e5fbf'},{id:'green',name:'Forest',c:'#0f7a5a'},{id:'indigo',name:'Indigo',c:'#5b3df5'},{id:'dark',name:'Midnight',c:'#1b1d27'}];
    const grid=document.getElementById('themeGrid'); let cur='blue'; try{ cur=localStorage.getItem('cmeTheme')||'blue'; }catch(e){}
    const tick='<svg class="tick" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    grid.innerHTML=THEMES.map(t=>`<button class="theme-opt${t.id===cur?' active':''}" data-t="${t.id}">${tick}<span class="sw" style="background:${t.c}"></span><span class="tn">${t.name}</span></button>`).join('');
    grid.addEventListener('click',e=>{ const b=e.target.closest('.theme-opt'); if(!b) return; const t=b.dataset.t; applyTheme(t); try{ localStorage.setItem('cmeTheme',t); }catch(err){} grid.querySelectorAll('.theme-opt').forEach(x=>x.classList.toggle('active',x===b)); toast(THEMES.find(x=>x.id===t).name+' theme applied'); });
  })();

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
