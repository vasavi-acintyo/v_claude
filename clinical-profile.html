<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical profile — DocSynapse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  [hidden]{display:none !important;}
  :root{
    --brand:#7d2c3b; --brand-dark:#5e2029; --brand-soft:#f4e7e9; --gold:#b0894f;
    --ink:#2a2320; --slate-700:#514842; --muted:#71665d;
    --line:#e7e0d4; --chip:#f4f0e8; --green:#3f7d4e;
    --surface:#faf6ee; --card:#ffffff; --page:#d8d0c2;
    --g1:#9c4453; --g2:#7d2c3b; --d1:#2b191c; --d2:#5e2029; --d3:#7d2c3b; --glow:rgba(176,137,79,.45);
    --soft1:#f7ede1; --soft2:#f4e7e9; --onGold:#e6cd93;
    --display:'Poppins', sans-serif;
    --ui:'Inter', sans-serif;
  }

  [data-theme="blue"]{--brand:#1e5fbf;--brand-dark:#164a99;--brand-soft:#e7effc;--gold:#b0894f;--ink:#0f2438;--slate-700:#31465e;--muted:#546a80;--line:#e1e9f3;--chip:#eef4fb;--green:#1f9d6b;--surface:#f7fafd;--card:#ffffff;--page:#cdd8e6;--g1:#4f8be8;--g2:#1e5fbf;--d1:#0b2545;--d2:#123a72;--d3:#1e5fbf;--glow:rgba(56,189,248,.42);--soft1:#e9f1ff;--soft2:#eaf3ff;--onGold:#9bdcfa;}
  [data-theme="green"]{--brand:#0f7a5a;--brand-dark:#0b5c44;--brand-soft:#e2f5ee;--gold:#b08631;--ink:#12271f;--slate-700:#33473f;--muted:#6f867d;--line:#dbe9e2;--chip:#eef6f2;--green:#0f7a5a;--surface:#f6fbf8;--card:#ffffff;--page:#cfe0d8;--g1:#2aa578;--g2:#0f7a5a;--d1:#0a2b20;--d2:#0e5540;--d3:#0f7a5a;--glow:rgba(201,162,39,.4);--soft1:#e6f5ee;--soft2:#e9f5e6;--onGold:#e6cf7a;}
  [data-theme="indigo"]{--brand:#5b3df5;--brand-dark:#4c2fe0;--brand-soft:#efeaff;--gold:#a97636;--ink:#181633;--slate-700:#3a3752;--muted:#787593;--line:#e9e7f3;--chip:#f1eefb;--green:#16a34a;--surface:#faf9ff;--card:#ffffff;--page:#d5d2e6;--g1:#7c6cf5;--g2:#5b3df5;--d1:#141233;--d2:#241a54;--d3:#3a2b8f;--glow:rgba(124,108,245,.45);--soft1:#efebff;--soft2:#e7edff;--onGold:#fbbf6b;}
  [data-theme="dark"]{--brand:#8b7bff;--brand-dark:#a99bff;--brand-soft:#241f3d;--gold:#e0b769;--ink:#eef0f6;--slate-700:#c3c7d4;--muted:#8b8fa3;--line:#2a2c3a;--chip:#22242f;--green:#4ade80;--surface:#14151d;--card:#1b1d27;--page:#0a0b0f;--g1:#8b7bff;--g2:#6d5cf0;--d1:#1b1d27;--d2:#23263a;--d3:#2e2b52;--glow:rgba(139,123,255,.4);--soft1:#20222e;--soft2:#242233;--onGold:#e0b769;}
  :root{color-scheme:light;} [data-theme="dark"]{color-scheme:dark;}

  html,body{background:var(--page);font-family:var(--ui);color:var(--ink);-webkit-font-smoothing:antialiased;}
  body{display:flex;justify-content:center;padding:18px;}
  svg{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}} .rise{animation:rise .5s cubic-bezier(.22,1,.36,1) both;}

  .phone{width:390px;height:844px;background:var(--surface);border-radius:44px;box-shadow:0 30px 70px -20px rgba(0,0,0,.45);overflow:hidden;position:relative;display:flex;flex-direction:column;}
  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} .topbar{padding-top:max(6px,env(safe-area-inset-top));} }

  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--line);}
  .topbar .bk{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;transition:transform .18s cubic-bezier(.22,1,.36,1);}
  .topbar .bk:active{transform:scale(.94);}
  .topbar .tt{font-size:16px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;flex:1;min-width:0;}
  .topbar .save{background:none;border:none;font-family:inherit;font-size:13px;font-weight:800;color:var(--brand);cursor:pointer;padding:8px 4px;flex:0 0 auto;transition:transform .18s cubic-bezier(.22,1,.36,1), opacity .18s;}
  .topbar .save:active{transform:scale(.94);opacity:.7;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:18px 18px 24px;}
  .scroll::-webkit-scrollbar{width:0;}

  .sec{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px;}
  .sec:not(:first-child){margin-top:26px;}
  .sec h2{font-size:16px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;}
  .sec .add{background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:800;color:var(--brand);cursor:pointer;padding:4px;transition:transform .18s cubic-bezier(.22,1,.36,1), opacity .18s;}
  .sec .add:active{transform:scale(.92);opacity:.7;}

  /* primary specialty chips */
  .spec-chips{display:flex;flex-wrap:wrap;gap:9px;}
  .spec{display:inline-flex;align-items:center;min-height:38px;padding:8px 15px;border-radius:20px;background:var(--chip);border:1px solid transparent;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1), background .16s, color .16s, border-color .16s;}
  .spec:active{transform:scale(.95);}
  .spec.sel{background:var(--brand);color:#fff;}
  .spec.addchip{background:none;border:1.5px dashed var(--brand);color:var(--brand);gap:5px;}
  .spec.addchip svg{width:13px;height:13px;}

  /* sub-specialty rows */
  .sub-list{display:flex;flex-direction:column;gap:10px;}
  .sub-row{display:flex;align-items:center;gap:10px;background:var(--chip);border:1px solid transparent;border-radius:12px;padding:14px 12px 14px 15px;transition:border-color .16s;}
  .sub-row:hover{border-color:var(--brand);}
  .sub-row .st{flex:1;min-width:0;font-size:12.5px;font-weight:700;color:var(--slate-700);}
  .sub-row .rm{width:34px;height:34px;flex:0 0 auto;border:none;background:none;color:var(--muted);cursor:pointer;display:grid;place-items:center;border-radius:8px;transition:transform .16s cubic-bezier(.22,1,.36,1), color .16s;}
  .sub-row .rm:hover{color:var(--brand);} .sub-row .rm:active{transform:scale(.9);}
  .sub-row .rm svg{width:16px;height:16px;}
  .sub-empty{font-size:11px;color:var(--muted);padding:6px 2px;}

  /* languages */
  .lang-chips{display:flex;flex-wrap:wrap;gap:9px;}
  .lang{display:inline-flex;align-items:center;gap:6px;min-height:34px;padding:7px 13px;border-radius:20px;background:var(--brand-soft);color:var(--brand);font-size:11.5px;font-weight:800;cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1);}
  .lang:active{transform:scale(.95);}
  .lang .x{opacity:.6;font-weight:700;}

  /* about */
  .about-box{width:100%;min-height:120px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;font-family:inherit;font-size:12px;line-height:1.6;color:var(--slate-700);resize:vertical;}
  .about-box:focus{outline:none;border-color:var(--brand);}

  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;background:var(--ink);opacity:.85;border-radius:3px;}
  .toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;font-family:inherit;padding:10px 18px;border-radius:22px;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <button class="bk" id="back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="tt">Clinical profile</span>
    <button class="save" id="save">Save</button>
  </div>

  <div class="scroll">
    <div class="sec"><h2>Primary specialty</h2><button class="add" data-add="primary">Add</button></div>
    <div class="spec-chips" id="specChips"></div>

    <div class="sec"><h2>Sub-specialties</h2><button class="add" data-add="sub">Add</button></div>
    <div class="sub-list" id="subList"></div>

    <div class="sec"><h2>Languages</h2><button class="add" data-add="lang">Add</button></div>
    <div class="lang-chips" id="langChips"></div>

    <div class="sec"><h2>About</h2></div>
    <textarea class="about-box" id="about" placeholder="A short professional summary…"></textarea>
  </div>

  <div class="home-ind"></div>
</div>

<script>
  (function(){
    const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua);
    document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other');
  })();
  function applyTheme(t){ if(!t||t==='classical') document.documentElement.removeAttribute('data-theme'); else document.documentElement.setAttribute('data-theme',t); }
  try{ applyTheme(localStorage.getItem('cmeTheme')||'blue'); }catch(e){}
  function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; (document.querySelector('.phone')||document.body).appendChild(t); } t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1400); }
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const xIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  const plusIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

  // ---- state (seeded from screenshot, persisted to localStorage) ----
  const DEFAULT = {
    primary:['Internal medicine','Cardiology','Surgery','Pediatrics','Neurology','ENT'],
    selected:'Internal medicine',
    subs:['Diabetes','Hypertension','Lipidology'],
    langs:['English','Telugu','Hindi','Tamil'],
    about:"Internist with 12 years' clinical experience focused on diabetes and hypertension management. Special interest in cardio-metabolic risk in South Asian populations."
  };
  let S;
  try{ S = Object.assign({}, DEFAULT, JSON.parse(localStorage.getItem('clinicalProfile')||'{}')); }catch(e){ S = Object.assign({}, DEFAULT); }

  const specEl=document.getElementById('specChips'), subEl=document.getElementById('subList'), langEl=document.getElementById('langChips'), aboutEl=document.getElementById('about');

  function renderSpec(){
    specEl.innerHTML = S.primary.map(p=>`<button class="spec${p===S.selected?' sel':''}" data-p="${esc(p)}">${esc(p)}</button>`).join('')
      + `<button class="spec addchip" id="addSpec">${plusIco}Add</button>`;
  }
  function renderSubs(){
    subEl.innerHTML = S.subs.length ? S.subs.map((s,i)=>`<div class="sub-row"><span class="st">${esc(s)}</span><button class="rm" data-i="${i}" aria-label="Remove ${esc(s)}">${xIco}</button></div>`).join('')
      : `<div class="sub-empty">No sub-specialties yet — tap Add.</div>`;
  }
  function renderLangs(){
    langEl.innerHTML = S.langs.map((l,i)=>`<span class="lang" data-i="${i}">${esc(l)} <span class="x">${'×'}</span></span>`).join('');
  }
  aboutEl.value = S.about;
  renderSpec(); renderSubs(); renderLangs();

  // primary: single-select + add
  specEl.addEventListener('click', e=>{
    const add=e.target.closest('#addSpec');
    if(add){ const v=(prompt('Add a specialty')||'').trim(); if(v){ if(!S.primary.includes(v)) S.primary.push(v); S.selected=v; renderSpec(); } return; }
    const b=e.target.closest('.spec'); if(!b||b.id==='addSpec') return;
    S.selected=b.dataset.p; renderSpec();
  });

  // sub-specialties: remove
  subEl.addEventListener('click', e=>{
    const rm=e.target.closest('.rm'); if(!rm) return;
    S.subs.splice(+rm.dataset.i,1); renderSubs();
  });

  // languages: tap to remove
  langEl.addEventListener('click', e=>{
    const l=e.target.closest('.lang'); if(!l) return;
    S.langs.splice(+l.dataset.i,1); renderLangs();
  });

  // Add links
  document.querySelectorAll('.add[data-add]').forEach(btn=>btn.addEventListener('click',()=>{
    const kind=btn.dataset.add;
    if(kind==='primary'){ const v=(prompt('Add a specialty')||'').trim(); if(v){ if(!S.primary.includes(v)) S.primary.push(v); S.selected=v; renderSpec(); } }
    else if(kind==='sub'){ const v=(prompt('Add a sub-specialty')||'').trim(); if(v){ S.subs.push(v); renderSubs(); } }
    else if(kind==='lang'){ const v=(prompt('Add a language')||'').trim(); if(v){ S.langs.push(v); renderLangs(); } }
  }));

  // Save
  document.getElementById('save').addEventListener('click', ()=>{
    S.about = aboutEl.value;
    try{ localStorage.setItem('clinicalProfile', JSON.stringify(S)); }catch(e){}
    toast('Clinical profile saved');
    setTimeout(()=>{ if(history.length>1) history.back(); else location.href='profile.html'; }, 800);
  });
  document.getElementById('back').addEventListener('click', ()=>{ if(history.length>1) history.back(); else location.href='profile.html'; });

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
