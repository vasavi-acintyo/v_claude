<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Details — CME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  [hidden]{display:none !important;}
  :root{
    --brand:#7d2c3b; --brand-dark:#5e2029; --brand-soft:#f4e7e9; --gold:#b0894f;
    --ink:#2a2320; --slate-700:#514842; --muted:#71665d;
    --line:#e7e0d4; --chip:#f4f0e8; --green:#3f7d4e;
    --surface:#faf6ee; --card:#ffffff; --page:#d8d0c2;
    --g1:#9c4453; --g2:#7d2c3b; --d1:#2b191c; --d2:#5e2029; --d3:#7d2c3b; --glow:rgba(176,137,79,.45);
    --soft1:#f7ede1; --soft2:#f4e7e9; --onGold:#e6cd93;
    --display:'Poppins', sans-serif;
    --ui:'Inter', sans-serif;
  }
  [data-theme="blue"]{--brand:#1e5fbf;--brand-dark:#164a99;--brand-soft:#e7effc;--gold:#b0894f;--ink:#0f2438;--slate-700:#31465e;--muted:#546a80;--line:#e1e9f3;--chip:#eef4fb;--green:#1f9d6b;--surface:#f7fafd;--card:#ffffff;--page:#cdd8e6;--g1:#4f8be8;--g2:#1e5fbf;--d1:#0b2545;--d2:#123a72;--d3:#1e5fbf;--glow:rgba(56,189,248,.42);--soft1:#e9f1ff;--soft2:#eaf3ff;--onGold:#9bdcfa;}
  [data-theme="green"]{--brand:#0f7a5a;--brand-dark:#0b5c44;--brand-soft:#e2f5ee;--gold:#b08631;--ink:#12271f;--slate-700:#33473f;--muted:#6f867d;--line:#dbe9e2;--chip:#eef6f2;--green:#0f7a5a;--surface:#f6fbf8;--card:#ffffff;--page:#cfe0d8;--g1:#2aa578;--g2:#0f7a5a;--d1:#0a2b20;--d2:#0e5540;--d3:#0f7a5a;--glow:rgba(201,162,39,.4);--soft1:#e6f5ee;--soft2:#e9f5e6;--onGold:#e6cf7a;}
  [data-theme="indigo"]{--brand:#5b3df5;--brand-dark:#4c2fe0;--brand-soft:#efeaff;--gold:#a97636;--ink:#181633;--slate-700:#3a3752;--muted:#787593;--line:#e9e7f3;--chip:#f1eefb;--green:#16a34a;--surface:#faf9ff;--card:#ffffff;--page:#d5d2e6;--g1:#7c6cf5;--g2:#5b3df5;--d1:#141233;--d2:#241a54;--d3:#3a2b8f;--glow:rgba(124,108,245,.45);--soft1:#efebff;--soft2:#e7edff;--onGold:#fbbf6b;}
  [data-theme="dark"]{--brand:#8b7bff;--brand-dark:#a99bff;--brand-soft:#241f3d;--gold:#e0b769;--ink:#eef0f6;--slate-700:#c3c7d4;--muted:#8b8fa3;--line:#2a2c3a;--chip:#22242f;--green:#4ade80;--surface:#14151d;--card:#1b1d27;--page:#0a0b0f;--g1:#8b7bff;--g2:#6d5cf0;--d1:#1b1d27;--d2:#23263a;--d3:#2e2b52;--glow:rgba(139,123,255,.4);--soft1:#20222e;--soft2:#242233;--onGold:#e0b769;}
  :root{color-scheme:light;} [data-theme="dark"]{color-scheme:dark;}

  html,body{background:var(--page);font-family:var(--ui);color:var(--ink);-webkit-font-smoothing:antialiased;}
  body{display:flex;justify-content:center;padding:18px;}
  svg{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .rise{animation:rise .45s cubic-bezier(.22,1,.36,1) both;}

  .phone{width:390px;height:844px;background:var(--surface);border-radius:44px;box-shadow:0 30px 70px -20px rgba(0,0,0,.45);overflow:hidden;position:relative;display:flex;flex-direction:column;}
  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} }

  .statusbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .appbar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:8px 18px 4px;}
  .icon-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;transition:transform .16s cubic-bezier(.22,1,.36,1);}
  .icon-btn:active{transform:scale(.92);}
  .appbar .tt{flex:1;min-width:0;font-size:14px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:8px 0 22px;}
  .scroll::-webkit-scrollbar{width:0;}
  .wrap{padding:0 18px;}

  .hero{margin:6px 0 14px;border-radius:20px;padding:20px 18px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--d1),var(--d2) 55%,var(--d3));color:#fff;}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,var(--glow),transparent 70%);}
  .hero .badges{display:flex;gap:6px;flex-wrap:wrap;position:relative;z-index:1;}
  .hbadge{font-size:8.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:20px;background:rgba(255,255,255,.16);}
  .hero h1{position:relative;z-index:1;font-size:19px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;line-height:1.25;margin-top:10px;}
  .hero .horg{position:relative;z-index:1;font-size:10.5px;color:rgba(255,255,255,.75);margin-top:6px;}

  .sec{margin:20px 0 10px;display:flex;align-items:baseline;justify-content:space-between;}
  .sec h2{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;}
  .card+.card{margin-top:10px;}

  .kv{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);}
  .kv:last-child{border-bottom:none;}
  .kv .ki{width:32px;height:32px;border-radius:9px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:0 0 auto;}
  .kv .ki svg{width:16px;height:16px;}
  .kv .kt{flex:1;min-width:0;} .kv .kt b{font-size:11.5px;font-weight:700;display:block;} .kv .kt span{font-size:9.5px;color:var(--muted);display:block;margin-top:2px;line-height:1.4;}

  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{font-size:10.5px;font-weight:700;color:var(--brand);background:var(--brand-soft);padding:6px 12px;border-radius:20px;}

  .bio{font-size:11.5px;line-height:1.65;color:var(--slate-700);}

  .spk{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--line);}
  .spk:last-child{border-bottom:none;}
  .spk img,.spk .init{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .spk .init{display:grid;place-items:center;background:var(--brand-soft);color:var(--brand);font-size:14px;font-weight:800;font-family:var(--display);}
  .spk .sm{flex:1;min-width:0;} .spk .sm b{font-size:12px;font-weight:800;font-family:var(--display);display:block;}
  .spk .sm .role{font-size:9.5px;color:var(--muted);margin-top:1px;}
  .spk .sm .desc{font-size:10.5px;color:var(--slate-700);margin-top:5px;line-height:1.5;}

  .stat-row{display:flex;gap:9px;}
  .stat{flex:1;background:var(--soft1);border-radius:14px;padding:11px 6px;text-align:center;}
  .stat:nth-child(2n){background:var(--soft2);}
  .stat b{display:block;font-size:16px;font-weight:800;font-family:var(--display);color:var(--brand);}
  .stat span{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;display:block;margin-top:2px;}

  .doc{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .doc:last-child{border-bottom:none;}
  .doc .di{width:32px;height:32px;border-radius:9px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:0 0 auto;}
  .doc .di svg{width:15px;height:15px;}
  .doc .dn{flex:1;min-width:0;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .chap{border-bottom:1px solid var(--line);padding:10px 0;}
  .chap:last-child{border-bottom:none;}
  .chap .ct{display:flex;align-items:center;gap:9px;}
  .chap .cn{width:22px;height:22px;border-radius:7px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;font-size:10px;font-weight:800;flex:0 0 auto;}
  .chap .ctitle{flex:1;min-width:0;font-size:11.5px;font-weight:700;}
  .chap .stamps{margin:7px 0 0 31px;display:flex;flex-direction:column;gap:4px;}
  .chap .stamps .st{font-size:9.5px;color:var(--muted);display:flex;gap:6px;}
  .chap .stamps .st b{color:var(--brand);font-weight:800;}

  .empty{text-align:center;padding:80px 20px;color:var(--muted);}
  .empty svg{width:40px;height:40px;margin:0 auto 12px;opacity:.5;}
  .empty p{font-size:12px;line-height:1.6;}
  .empty .btn{margin-top:16px;}

  .foot{flex:0 0 auto;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--line);}
  .btn{width:100%;min-height:48px;border-radius:13px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;border:none;background:var(--brand);color:#fff;transition:transform .16s cubic-bezier(.22,1,.36,1), background .18s;text-decoration:none;}
  .btn:hover{background:var(--brand-dark);} .btn:active{transform:scale(.98);}

  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;background:var(--ink);opacity:.85;border-radius:3px;}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="appbar">
    <button class="icon-btn" id="back" aria-label="Back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18"/></svg></button>
    <div class="tt">Program details</div>
  </div>

  <div class="scroll" id="scroll"></div>

  <div class="foot" id="foot" hidden>
    <a class="btn" href="my-programs.html">Back to Host CME</a>
  </div>

  <div class="home-ind"></div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  try{ const t=localStorage.getItem('cmeTheme')||'blue'; if(t&&t!=='classical') document.documentElement.setAttribute('data-theme',t); }catch(e){}
  document.getElementById('back').addEventListener('click', ()=>{ history.length>1?history.back():location.href='my-programs.html'; });

  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const pinIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-12a7 7 0 0 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.5"/></svg>';
  const calIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><line x1="3" y1="9" x2="21" y2="9"/></svg>';
  const clockIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>';
  const globeIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.5 3.6 6 3.6 9s-1.1 6.5-3.6 9c-2.5-2.5-3.6-6-3.6-9s1.1-6.5 3.6-9Z"/></svg>';
  const orgIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V5a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v16"/><path d="M15 21V9h3a1 1 0 0 1 1 1v11"/></svg>';
  const seatIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20v-1.5A4.5 4.5 0 0 1 7.5 14h3A4.5 4.5 0 0 1 15 18.5V20"/></svg>';
  const feeIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5c0-1.4 1.2-2.5 2.5-2.5s2.5.9 2.5 2c0 3-5 1.5-5 4.5 0 1.1 1.1 2 2.5 2s2.5-1.1 2.5-2.5"/></svg>';
  const mailIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/><path d="m3 6 9 6 9-6"/></svg>';
  const phoneIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.5 2.1L8 10a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.9.6 2.9.7a2 2 0 0 1 1.7 2Z"/></svg>';
  const userIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20v-1a5.5 5.5 0 0 1 5.5-5.5h4a5.5 5.5 0 0 1 5.5 5.5v1"/></svg>';
  const fileIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
  const imgIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="m4 18 5-5 4 4 3-3 4 4"/></svg>';
  const certIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/><polyline points="9 12 11.5 14.5 15.5 9.5"/></svg>';
  const emptyIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/></svg>';

  function fmtDate(s){
    if(!s) return '';
    const d=new Date(s+'T00:00:00');
    if(isNaN(d)) return s;
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }
  function fmtTime(s){
    if(!s) return '';
    const [h,m]=s.split(':').map(Number);
    const d=new Date(); d.setHours(h,m||0);
    return d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});
  }
  function initials(n){ return (n||'?').replace('Dr. ','').charAt(0).toUpperCase(); }

  function load(id){
    let all=[];
    try{ all=JSON.parse(localStorage.getItem('cmePrograms')||'[]'); }catch(e){}
    return all.find(p=>p.id===id) || null;
  }

  function render(p){
    const scroll=document.getElementById('scroll');
    document.getElementById('foot').hidden=false;
    const isRec = p.format==='Recorded';
    const locLabel = p.format==='Offline' ? 'Venue' : (isRec ? 'Recording link' : 'Meeting link');
    const locIcon = p.format==='Offline' ? pinIco : globeIco;

    let html = `<div class="wrap">
      <div class="hero rise">
        <div class="badges">
          <span class="hbadge">${esc(p.format||'Online')}</span>
          ${p.accredit || p.accrBody ? `<span class="hbadge">Accredited</span>` : ''}
        </div>
        <h1>${esc(p.title || 'Untitled program')}</h1>
        ${p.org ? `<div class="horg">${orgIco} Organized by ${esc(p.org)}</div>` : ''}
      </div>`;

    if(p.specialties && p.specialties.length){
      html += `<div class="sec"><h2>Specialties</h2></div><div class="chips rise">${p.specialties.map(s=>`<span class="chip">${esc(s)}</span>`).join('')}</div>`;
    }

    if(p.description){
      html += `<div class="sec"><h2>About</h2></div><div class="card rise"><p class="bio">${esc(p.description)}</p></div>`;
    }

    if(!isRec){
      html += `<div class="sec"><h2>Schedule</h2></div><div class="card rise">`;
      if(p.eventStartDate) html += `<div class="kv"><span class="ki">${calIco}</span><div class="kt"><b>Event</b><span>${fmtDate(p.eventStartDate)}${p.eventEndDate && p.eventEndDate!==p.eventStartDate ? ' – '+fmtDate(p.eventEndDate) : ''}${p.eventStartTime ? ' · '+fmtTime(p.eventStartTime) : ''}${p.eventEndTime ? ' – '+fmtTime(p.eventEndTime) : ''}</span></div></div>`;
      if(p.regStart || p.regEnd) html += `<div class="kv"><span class="ki">${clockIco}</span><div class="kt"><b>Registration window</b><span>${p.regStart?fmtDate(p.regStart):'Open'} ${p.regEnd?'– '+fmtDate(p.regEnd):''}</span></div></div>`;
      if(p.timezone) html += `<div class="kv"><span class="ki">${globeIco}</span><div class="kt"><b>Timezone</b><span>${esc(p.timezone)}</span></div></div>`;
      if(p.location) html += `<div class="kv"><span class="ki">${locIcon}</span><div class="kt"><b>${locLabel}</b><span>${esc(p.location)}</span></div></div>`;
      html += `</div>`;
    }

    if(p.speakers && p.speakers.length){
      html += `<div class="sec"><h2>Speakers</h2></div><div class="card rise">${p.speakers.map(s=>`
        <div class="spk">
          ${s.img ? `<img src="${s.img}" alt="">` : `<span class="init">${esc(initials(s.n))}</span>`}
          <div class="sm"><b>${esc(s.n)}</b>${s.r?`<div class="role">${esc(s.r)}</div>`:''}${s.desc?`<div class="desc">${esc(s.desc)}</div>`:''}</div>
        </div>`).join('')}</div>`;
    }

    const seatStats=[];
    if(p.seatsLimited){
      if(p.seats) seatStats.push({b:p.seats, l:'Conference'});
      if(p.seatsPre) seatStats.push({b:p.seatsPre, l:'Pre-workshop'});
      if(p.seatsPost) seatStats.push({b:p.seatsPost, l:'Post-workshop'});
    }
    if(seatStats.length || p.paid){
      html += `<div class="sec"><h2>Access</h2></div>`;
      if(seatStats.length) html += `<div class="stat-row rise">${seatStats.map(s=>`<div class="stat"><b>${esc(s.b)}</b><span>${s.l}</span></div>`).join('')}</div>`;
      html += `<div class="card rise" style="margin-top:${seatStats.length?'10px':'0'}">`;
      html += `<div class="kv"><span class="ki">${feeIco}</span><div class="kt"><b>${p.paid?'Paid program':'Free to attend'}</b>${p.paid&&p.fee?`<span>₹${esc(p.fee)} per seat</span>`:''}</div></div>`;
      if(p.earlyBird && p.earlyFee) html += `<div class="kv"><span class="ki">${feeIco}</span><div class="kt"><b>Early bird fee</b><span>₹${esc(p.earlyFee)}${p.earlyDeadline?' · until '+fmtDate(p.earlyDeadline):''}</span></div></div>`;
      html += `</div>`;
    }

    if(p.supportName || p.supportEmail || p.supportPhone){
      html += `<div class="sec"><h2>Support contact</h2></div><div class="card rise">`;
      if(p.supportName) html += `<div class="kv"><span class="ki">${userIco}</span><div class="kt"><b>${esc(p.supportName)}</b></div></div>`;
      if(p.supportEmail) html += `<div class="kv"><span class="ki">${mailIco}</span><div class="kt"><b>${esc(p.supportEmail)}</b></div></div>`;
      if(p.supportPhone) html += `<div class="kv"><span class="ki">${phoneIco}</span><div class="kt"><b>${esc(p.supportPhone)}</b></div></div>`;
      html += `</div>`;
    }

    if(p.tpoOrg || p.tpoContact || p.tpoEmail || p.tpoPhone){
      html += `<div class="sec"><h2>Third-party organizer</h2></div><div class="card rise">`;
      if(p.tpoOrg) html += `<div class="kv"><span class="ki">${orgIco}</span><div class="kt"><b>${esc(p.tpoOrg)}</b></div></div>`;
      if(p.tpoContact) html += `<div class="kv"><span class="ki">${userIco}</span><div class="kt"><b>${esc(p.tpoContact)}</b></div></div>`;
      if(p.tpoEmail) html += `<div class="kv"><span class="ki">${mailIco}</span><div class="kt"><b>${esc(p.tpoEmail)}</b></div></div>`;
      if(p.tpoPhone) html += `<div class="kv"><span class="ki">${phoneIco}</span><div class="kt"><b>${esc(p.tpoPhone)}</b></div></div>`;
      html += `</div>`;
    }

    const docs=[];
    if(p.bannerName) docs.push({n:p.bannerName, i:imgIco});
    if(p.materials && p.materials.length) p.materials.forEach(m=>docs.push({n:m, i:fileIco}));
    if(p.certName) docs.push({n:p.certName, i:certIco});
    if(docs.length){
      html += `<div class="sec"><h2>Documents</h2></div><div class="card rise">${docs.map(d=>`
        <div class="doc"><span class="di">${d.i}</span><div class="dn">${esc(d.n)}</div></div>`).join('')}</div>`;
    }

    if(isRec && p.chapters && p.chapters.length){
      html += `<div class="sec"><h2>Video chapters</h2></div><div class="card rise">${p.chapters.map((c,i)=>`
        <div class="chap">
          <div class="ct"><span class="cn">${i+1}</span><span class="ctitle">${esc(c.title||'Untitled chapter')}</span></div>
          ${c.stamps && c.stamps.length ? `<div class="stamps">${c.stamps.map(s=>`<div class="st">${s.t?`<b>${esc(s.t)}</b>`:''}<span>${esc(s.label||'')}</span></div>`).join('')}</div>` : ''}
        </div>`).join('')}</div>`;
    }

    html += `</div>`;
    scroll.innerHTML = html;
  }

  function renderEmpty(){
    document.getElementById('scroll').innerHTML = `
      <div class="empty rise">
        ${emptyIco}
        <p>We couldn't find details for this program.<br>It may have been removed, or the link is out of date.</p>
      </div>`;
    document.getElementById('foot').hidden=false;
  }

  const id = new URLSearchParams(location.search).get('id');
  const program = id ? load(id) : null;
  if(program){
    document.querySelector('.appbar .tt').textContent = program.title || 'Program details';
    render(program);
  } else {
    renderEmpty();
  }

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
