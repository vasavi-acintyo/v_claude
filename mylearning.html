<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Learning — CME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} .scroll{padding-top:max(10px,env(safe-area-inset-top));} }

  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:6px 18px 16px;}
  .scroll::-webkit-scrollbar{width:0;}

  /* header */
  .htop{display:flex;align-items:flex-start;gap:10px;padding:6px 0 2px;}
  .htop .wm{font-size:9.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .htop h1{font-size:20px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;margin-top:3px;line-height:1.1;}
  .htop .sp{flex:1;}
  .htop .prof{flex:0 0 auto;display:inline-flex;border-radius:50%;transition:transform .18s cubic-bezier(.22,1,.36,1);}
  .htop .prof:active{transform:scale(.94);}
  .htop .prof img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--chip);border:1px solid var(--line);display:block;}

  /* credits hero */
  .hero{display:flex;align-items:center;gap:16px;margin-top:4px;background:var(--soft1);border:1px solid transparent;border-radius:20px;padding:16px;}
  .hero-ring{position:relative;width:76px;height:76px;flex:0 0 auto;}
  .hero-ring svg{width:76px;height:76px;transform:rotate(-90deg);}
  .hr-t{fill:none;stroke:rgba(0,0,0,.08);stroke-width:8;}
  .hr-p{fill:none;stroke:var(--brand);stroke-width:8;stroke-linecap:round;stroke-dasharray:207.3;stroke-dashoffset:207.3;transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1);}
  .hr-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;}
  .hr-c b{font-size:21px;font-weight:800;font-family:var(--display);color:var(--brand);letter-spacing:-.02em;}
  .hr-c span{font-size:7px;font-weight:800;letter-spacing:.12em;color:var(--muted);margin-top:3px;}
  .hero-m{flex:1;min-width:0;}
  .hm-l{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .hm-bar{height:6px;border-radius:6px;background:var(--chip);margin-top:8px;overflow:hidden;position:relative;}
  .hm-bar i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:var(--brand);width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
  .hm-goal{font-size:9.5px;color:var(--muted);margin-top:8px;line-height:1.4;}
  .hm-goal b{color:var(--ink);font-weight:800;}
  .hm-stats{display:flex;align-items:center;gap:10px;margin-top:9px;font-size:10px;color:var(--muted);}
  .hm-stats b{color:var(--brand);font-weight:800;}
  .hm-stats .sep{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.5;}

  /* continue watching */
  .cw{display:flex;gap:13px;align-items:center;margin-top:6px;background:var(--soft2);border:1px solid transparent;border-radius:18px;padding:12px;cursor:pointer;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s;}
  .cw:hover{transform:translateY(-2px);border-color:var(--brand);} .cw:active{transform:scale(.99);}
  .cw-thumb{position:relative;width:80px;height:66px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;color:#fff;background:linear-gradient(140deg,var(--g1),var(--g2));overflow:hidden;}
  .cw-thumb::after{content:"";position:absolute;right:-16px;top:-16px;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.16);}
  .cw-thumb .pl{position:relative;z-index:1;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);color:var(--brand);display:grid;place-items:center;} .cw-thumb .pl svg{width:16px;height:16px;margin-left:2px;}
  .cw-badge{position:absolute;z-index:1;top:6px;left:6px;font-size:7px;font-weight:800;letter-spacing:.06em;color:#fff;background:rgba(0,0,0,.3);padding:3px 6px;border-radius:20px;}
  .cw-b{flex:1;min-width:0;}
  .cw-t{font-size:13px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;line-height:1.25;}
  .cw-m{font-size:9.5px;color:var(--muted);margin-top:3px;}
  .cw-bar{height:5px;border-radius:5px;background:var(--chip);margin-top:9px;overflow:hidden;position:relative;}
  .cw-fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:var(--brand);width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
  .cw-pct{font-size:9px;font-weight:800;color:var(--brand);margin-top:6px;}

  /* section header */
  .sh{display:flex;align-items:baseline;justify-content:space-between;margin:6px 2px 0;}
  .sh h2{font-size:14px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;}

  /* filter tabs — soft pills */
  .filters{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin:6px -2px 0;padding:0 2px;}
  .filters::-webkit-scrollbar{display:none;}
  .filt{flex:0 0 auto;background:var(--soft1);border:1px solid transparent;border-radius:20px;padding:8px 15px;min-height:38px;font-size:11px;font-weight:700;font-family:inherit;color:var(--slate-700);cursor:pointer;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s, color .18s, background .18s;}
  .filt:hover{border-color:var(--brand);} .filt:active{transform:scale(.95);}
  .filt.active{background:var(--brand);color:#fff;border-color:var(--brand);}

  /* learning list */
  .list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
  .ml{background:var(--soft1);border:1px solid transparent;border-radius:16px;padding:13px;cursor:pointer;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s;animation:fadeIn .4s ease both;}
  .ml:hover{transform:translateY(-2px);border-color:var(--brand);} .ml:active{transform:scale(.99);}
  .ml-row{display:flex;gap:12px;align-items:flex-start;}
  .ml-thumb{width:48px;height:48px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;color:var(--brand);background:var(--brand-soft);}
  .ml-thumb svg{width:22px;height:22px;}
  .ml-info{flex:1;min-width:0;}
  .ml-title{font-size:12.5px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;line-height:1.25;}
  .ml-meta{font-size:9.5px;color:var(--muted);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap;}
  .ml-meta span{display:inline-flex;align-items:center;gap:4px;} .ml-meta svg{width:12px;height:12px;flex:0 0 auto;}
  .ml-badge{font-size:8.5px;font-weight:800;letter-spacing:.05em;padding:4px 8px;border-radius:20px;white-space:nowrap;flex:0 0 auto;}
  .b-live{color:#c0464a;background:rgba(224,106,106,.12);display:inline-flex;align-items:center;gap:4px;}
  .b-live .d{width:4px;height:4px;border-radius:50%;background:#e06a6a;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .b-up{background:var(--brand-soft);color:var(--brand);}
  .b-vid{background:var(--card);color:var(--slate-700);}
  .b-done{background:rgba(63,125,78,.15);color:var(--green);}

  .ml-bar{height:5px;border-radius:20px;background:var(--chip);margin-top:11px;overflow:hidden;}
  .ml-bar i{display:block;height:100%;border-radius:20px;background:var(--brand);}
  .ml-foot{display:flex;align-items:center;gap:9px;margin-top:11px;}
  .ml-note{font-size:9.5px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:5px;} .ml-note svg{width:12px;height:12px;}
  .ml-act{margin-left:auto;border:none;font-family:inherit;font-size:10.5px;font-weight:800;padding:8px 15px;min-height:40px;border-radius:11px;cursor:pointer;white-space:nowrap;transition:transform .16s cubic-bezier(.22,1,.36,1), background .16s;}
  .ml-act:active{transform:scale(.96);}
  .a-primary{background:var(--brand);color:#fff;} .a-primary:hover{background:var(--brand-dark);}
  .a-ghost{background:var(--card);color:var(--ink);} .a-ghost:hover{background:var(--chip);}

  /* ---- Certificates ---- */
  .cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .cert{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;box-shadow:0 6px 16px -14px rgba(0,0,0,.16);transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s, box-shadow .18s;animation:fadeIn .35s ease both;}
  .cert:hover{transform:translateY(-3px);border-color:var(--brand);box-shadow:0 12px 24px -14px rgba(0,0,0,.22);}
  .cert .thumb{height:104px;background:var(--brand-soft);display:grid;place-items:center;overflow:hidden;position:relative;}
  .cert .thumb img{width:100%;height:100%;object-fit:cover;}
  .cert .thumb .pdf{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--brand);font-size:9px;font-weight:800;letter-spacing:.05em;}
  .cert .thumb .pdf svg{width:28px;height:28px;}
  .cert .seal{position:absolute;bottom:7px;left:7px;width:24px;height:24px;border-radius:50%;background:var(--card);color:var(--brand);display:grid;place-items:center;box-shadow:0 3px 8px -2px rgba(0,0,0,.3);}
  .cert .seal svg{width:13px;height:13px;}
  .cert .meta{padding:10px 11px 12px;}
  .cert .nm{font-size:11px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cert .row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:6px;}
  .cert .dt{font-size:8.5px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cert .cr{flex:0 0 auto;font-size:8px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:2px 7px;border-radius:20px;}
  .cert .del{position:absolute;top:0;right:0;width:40px;height:40px;padding:6px 6px 0 0;border:none;background:none;color:transparent;font-size:0;line-height:1;display:flex;align-items:flex-start;justify-content:flex-end;cursor:pointer;z-index:2;}
  .cert .del::before{content:"✕";width:22px;height:22px;border-radius:8px;background:rgba(0,0,0,.5);color:#fff;font-size:12px;display:grid;place-items:center;}
  /* full-screen certificate viewer */
  .cert-modal{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:40;display:none;flex-direction:column;padding:16px;}
  .cert-modal.open{display:flex;animation:fadeIn .2s ease;}
  .cm-bar{display:flex;align-items:center;gap:10px;color:#fff;margin-bottom:12px;}
  .cm-bar .t{font-size:12px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cm-bar button{width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:15px;cursor:pointer;flex:0 0 auto;display:grid;place-items:center;}
  .cm-body{flex:1;display:grid;place-items:center;overflow:auto;}
  .cm-body img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 20px 50px -20px rgba(0,0,0,.6);}
  .cm-body iframe{width:100%;height:100%;border:none;background:#fff;border-radius:10px;}

  .navitem{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:48px;font-size:10.5px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:none;}
  .navitem.active{color:var(--brand);font-weight:600;}

  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);z-index:60;background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;max-width:82%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Doxy mascot badge — V Theme only; other themes keep a plain line icon like the rest of the nav */
  .doxy-classic{display:block;}
  .doxy-badge{display:none;}
  [data-theme="vibrant"] .doxy-classic{display:none;}
  [data-theme="vibrant"] .navitem.doxy-tab{position:relative;overflow:visible;z-index:2;}
  [data-theme="vibrant"] .doxy-badge{display:inline-flex;width:44px;height:44px;border-radius:50%;box-shadow:0 0 0 5px rgba(90,209,230,.6), 0 3px 8px -3px rgba(0,0,0,.35);animation:doxyBob 2.4s ease-in-out infinite;margin-top:-18px;}
  .doxy-badge svg{width:44px;height:44px;display:block;}
  @keyframes doxyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .doxy-badge .antenna-tip{animation:doxyGlow 1.8s ease-in-out infinite;}
  @keyframes doxyGlow{0%,100%{opacity:1}50%{opacity:.45}}
  .doxy-badge .eyes{animation:doxyLook 3.2s ease-in-out infinite;}
  @keyframes doxyLook{0%,12%{transform:translateX(0)}35%,48%{transform:translateX(-1.4px)}65%,78%{transform:translateX(1.4px)}100%{transform:translateX(0)}}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}

  /* =============================================================
     V Theme — trendy card style + colorful accents, matching the
     home-page redesign. Classic/Ocean/Forest keep the original look;
     this only applies when [data-theme="vibrant"].
     ============================================================= */
  [data-theme="vibrant"] .hero{background:var(--card);border:1px solid var(--line);box-shadow:0 8px 20px -16px rgba(30,20,60,.18);}
  [data-theme="vibrant"] .cw{background:var(--card);border:1px solid var(--line);box-shadow:0 8px 20px -16px rgba(30,20,60,.18);}
  [data-theme="vibrant"] .cw:hover{box-shadow:0 14px 26px -14px rgba(30,20,60,.24);}

  [data-theme="vibrant"] .sh h2{position:relative;padding-left:12px;}
  [data-theme="vibrant"] .sh h2::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--brand);}

  [data-theme="vibrant"] .ml{background:var(--card);border:1px solid var(--line);box-shadow:0 6px 16px -14px rgba(30,20,60,.16);}
  [data-theme="vibrant"] .ml:hover{box-shadow:0 12px 22px -14px rgba(30,20,60,.22);}
  [data-theme="vibrant"] .ml[data-thumb="radio"] .ml-thumb{color:#2563eb;background:#dbeafe;}
  [data-theme="vibrant"] .ml[data-thumb="cal"] .ml-thumb{color:#7c3aed;background:#ede9fe;}
  [data-theme="vibrant"] .ml[data-thumb="play"] .ml-thumb{color:#d97706;background:#fef3c7;}
  [data-theme="vibrant"] .ml[data-thumb="award"] .ml-thumb{color:#16a34a;background:#dcfce7;}

  [data-theme="vibrant"] .cert:nth-child(4n+1) .thumb{background:#dbeafe;}
  [data-theme="vibrant"] .cert:nth-child(4n+1) .thumb .pdf{color:#2563eb;}
  [data-theme="vibrant"] .cert:nth-child(4n+2) .thumb{background:#ede9fe;}
  [data-theme="vibrant"] .cert:nth-child(4n+2) .thumb .pdf{color:#7c3aed;}
  [data-theme="vibrant"] .cert:nth-child(4n+3) .thumb{background:#fef3c7;}
  [data-theme="vibrant"] .cert:nth-child(4n+3) .thumb .pdf{color:#d97706;}
  [data-theme="vibrant"] .cert:nth-child(4n) .thumb{background:#dcfce7;}
  [data-theme="vibrant"] .cert:nth-child(4n) .thumb .pdf{color:#16a34a;}
</style>
  <link rel="stylesheet" href="global.css?v=10">
</head>

</div>

<script>
  (function(){
    const ua = navigator.userAgent || '';
    const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isAndroid = /Android/.test(ua);
    document.documentElement.setAttribute('data-os', isIOS ? 'ios' : isAndroid ? 'android' : 'other');
  })();
  try{ const t = localStorage.getItem('cmeTheme') || 'blue'; if(t!=='classical') document.documentElement.setAttribute('data-theme', t); }catch(e){}

  const ic = {
    radio:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4.9 4.9a10 10 0 0 0 0 14.2M19.1 4.9a10 10 0 0 1 0 14.2M7.8 7.8a6 6 0 0 0 0 8.4M16.2 7.8a6 6 0 0 1 0 8.4"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></svg>',
    play:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="7 5 19 12 7 19"/></svg>',
    cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><line x1="3" y1="9" x2="21" y2="9"/></svg>',
    check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg>',
    clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>',
    pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-12a7 7 0 0 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.5"/></svg>',
    wifi:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M5 12.5a10 10 0 0 1 14 0"/><path d="M8.5 16a5 5 0 0 1 7 0"/><circle cx="12" cy="19" r="1" fill="currentColor" stroke="none"/></svg>',
    award:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8.5 12.5 7 21l5-2.5L17 21l-1.5-8.5"/></svg>'
  };

  // status: live | upcoming | video | completed ; mode: online | offline
  const items = [
    { title:'Cardiometabolic Update 2025', status:'live', mode:'online', meta:'Now · 1,240 watching', credits:'2 CME', thumb:'radio' },
    { title:'Diabetes & Kidney Summit', status:'upcoming', mode:'offline', venue:'Taj Lands End, Mumbai', meta:'Starts in 3 days · 02 Jun', credits:'2 CME', thumb:'cal' },
    { title:'GLP-1 Agonists Deep Dive', status:'video', meta:'On-demand · 40 min', credits:'1.5 CME', progress:45, thumb:'play' },
    { title:'CGM in Clinical Practice', status:'video', meta:'On-demand · 30 min', credits:'1 CME', progress:20, thumb:'play' },
    { title:'Hypertension Masterclass', status:'upcoming', mode:'online', meta:'Starts in 6 days · 14 Jun', credits:'1.5 CME', thumb:'cal' },
    { title:'Lipid Management Update', status:'completed', meta:'Completed 15 Dec 2024', credits:'1.5 CME', score:92, thumb:'award' },
    { title:'Obesity & Metabolic Health', status:'completed', meta:'Completed 22 Nov 2024', credits:'2 CME', score:78, thumb:'award' }
  ];

  const filters = [
    {k:'all', n:'All'},{k:'live', n:'Live'},{k:'upcoming', n:'Upcoming'},{k:'video', n:'Videos'},{k:'completed', n:'Completed'}
  ];
  let active = 'all';
  document.getElementById('filters').innerHTML = filters.map(f=>`<button class="filt${f.k==='all'?' active':''}" data-k="${f.k}">${f.n}</button>`).join('');

  function badge(it){
    if(it.status==='live') return '<span class="ml-badge b-live"><span class="d"></span>LIVE</span>';
    if(it.status==='upcoming') return '<span class="ml-badge b-up">UPCOMING</span>';
    if(it.status==='video') return '<span class="ml-badge b-vid">VIDEO</span>';
    return '<span class="ml-badge b-done">COMPLETED</span>';
  }
  function footer(it){
    if(it.status==='live'){
      const note = it.mode==='online'
        ? `<span class="ml-note">${ic.wifi} Online session</span>`
        : `<span class="ml-note">${ic.pin} ${it.venue||'In-person'}</span>`;
      return `${note}<button class="ml-act a-primary" onclick="event.stopPropagation();location.href='speakers.html?type=course&title=${encodeURIComponent(it.title)}&sub=${encodeURIComponent(it.mode==='online'?'Join':'View venue')}'">${it.mode==='online'?'Join online':'View venue'}</button>`;
    }
    if(it.status==='upcoming'){
      const note = it.mode==='offline'
        ? `<span class="ml-note">${ic.pin} ${it.venue}</span>`
        : `<span class="ml-note">${ic.wifi} Online</span>`;
      return note;
    }
    if(it.status==='video'){
      return `<span class="ml-note">${it.progress}% watched</span><button class="ml-act a-primary" onclick="event.stopPropagation();location.href='cme-sessions.html?title=${encodeURIComponent(it.title)}'">${it.progress?'Resume':'Start'}</button>`;
    }
    return `<span class="ml-note">${ic.award} Score ${it.score}%</span><button class="ml-act a-ghost" onclick="event.stopPropagation();viewCmeCertificate('${it.title.replace(/'/g,"\\'")}',${it.score})">Certificate</button>`;
  }

  /* lightweight bottom-center toast (~1.4s) */
  function toast(msg){
    let t = document.getElementById('toast');
    if(!t){ t = document.createElement('div'); t.id='toast'; t.className='toast'; document.querySelector('.phone').appendChild(t); }
    t.textContent = msg; void t.offsetWidth; t.classList.add('show');
    clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 1400);
  }

  /* "Certificate" — reuse the certificate viewer modal with a generated certificate */
  function viewCmeCertificate(title, score){
    document.getElementById('cmTitle').textContent = title + ' — Certificate';
    document.getElementById('cmBody').innerHTML =
      `<div style="background:#fff;color:#2a2320;max-width:300px;width:100%;padding:28px 22px;border-radius:12px;text-align:center;font-family:Georgia,serif;border:2px solid #b0894f;box-shadow:0 20px 50px -20px rgba(0,0,0,.6)">
         <div style="font-size:9px;letter-spacing:.18em;color:#b0894f;font-weight:700">CERTIFICATE OF COMPLETION</div>
         <div style="font-family:var(--display);font-size:18px;font-weight:800;margin:16px 0 8px;line-height:1.25">${title}</div>
         <div style="font-size:10px;color:#8a7f77">Awarded to Dr. Priya Sharma</div>
         <div style="font-size:10px;color:#8a7f77;margin-top:4px">Assessment score: ${score}%</div>
         <div style="margin-top:18px;font-size:8px;letter-spacing:.12em;color:#b0894f;font-weight:700">CME ACCREDITED</div>
       </div>`;
    document.getElementById('certModal').classList.add('open');
  }

  function render(){
    const list = items.filter(i=> active==='all' || i.status===active);
    const el = document.getElementById('list');
    if(!list.length){ el.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:11px;padding:30px 10px">Nothing here yet.</div>`; return; }
    el.innerHTML = list.map((it,idx)=>`
      <div class="ml" data-thumb="${it.thumb}" style="animation-delay:${idx*60}ms" onclick="location.href='${it.status==='video' ? 'cme-sessions.html?title='+encodeURIComponent(it.title) : 'speakers.html?type=course&title='+encodeURIComponent(it.title)}'">
        <div class="ml-row">
          <div class="ml-thumb">${ic[it.thumb]}</div>
          <div class="ml-info">
            <div class="ml-title">${it.title}</div>
            <div class="ml-meta"><span>${ic.clock}${it.meta}</span><span>${ic.award}${it.credits}</span></div>
          </div>
          ${badge(it)}
        </div>
        ${it.status==='video' ? `<div class="ml-bar"><i style="width:${it.progress}%"></i></div>` : ''}
        <div class="ml-foot">${footer(it)}</div>
      </div>`).join('');
  }

  document.querySelectorAll('.filt').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.filt').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); active=b.dataset.k; render();
  }));

  render();
  // animate hero ring + bars (14.5 of 25 CME = 58%)
  requestAnimationFrame(()=>{
    document.getElementById('cwFill').style.width='45%';
    document.getElementById('heroBar').style.width='58%';
    const C=207.3; document.getElementById('heroRing').style.strokeDashoffset=(C*(1-0.58)).toFixed(1);
  });

  /* ---- Certificates: upload, store (localStorage), view, delete ---- */
  const CERT_KEY = 'cmeCerts';
  const grid = document.getElementById('certGrid');
  const modal = document.getElementById('certModal');
  const pdfIco = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
  const sealIco = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/><polyline points="9 12 11.5 14.5 15.5 9.5"/></svg>';

  let certs = [];
  try{ certs = JSON.parse(localStorage.getItem(CERT_KEY) || '[]'); }catch(e){ certs = []; }

  function saveCerts(){
    try{ localStorage.setItem(CERT_KEY, JSON.stringify(certs)); }
    catch(e){ alert('Could not save — local storage is full.'); }
  }
  function renderCerts(){
    const cards = certs.map((c,i)=>`
      <div class="cert" data-i="${i}">
        <div class="thumb">${c.type && c.type.indexOf('image')===0 ? `<img src="${c.data}" alt="">` : `<div class="pdf">${pdfIco}PDF</div>`}<span class="seal">${sealIco}</span></div>
        <button class="del" data-del="${i}" aria-label="Delete">✕</button>
        <div class="meta">
          <div class="nm">${c.name}</div>
          <div class="row"><span class="dt">${c.date}</span>${c.cr?`<span class="cr">${c.cr}</span>`:''}</div>
        </div>
      </div>`).join('');
    grid.innerHTML = cards || `<div style="text-align:center;color:var(--muted);font-size:11px;padding:30px 10px;grid-column:1/-1">No certificates yet.</div>`;
  }

  grid.addEventListener('click', e=>{
    const del = e.target.closest('[data-del]');
    if(del){ e.stopPropagation(); if(confirm('Remove this certificate?')){ certs.splice(+del.dataset.del,1); saveCerts(); renderCerts(); } return; }
    const card = e.target.closest('.cert');
    if(card){ openCert(certs[+card.dataset.i]); }
  });

  function openCert(c){
    document.getElementById('cmTitle').textContent = c.name;
    document.getElementById('cmBody').innerHTML = c.type && c.type.indexOf('image')===0
      ? `<img src="${c.data}" alt="${c.name}">`
      : `<iframe src="${c.data}" title="${c.name}"></iframe>`;
    modal.classList.add('open');
  }
  document.getElementById('cmClose').addEventListener('click', ()=>modal.classList.remove('open'));
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.classList.remove('open'); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') modal.classList.remove('open'); });

  renderCerts();
</script>
<script>
  (function(){
    var p=document.querySelector('.phone'), BASE=390;
    function fit(){
      if(window.innerWidth<=600){
        var s=window.innerWidth/BASE;
        p.style.width=BASE+'px'; p.style.height=(window.innerHeight/s)+'px'; p.style.transform='scale('+s+')';
      } else { p.style.transform=''; p.style.width=''; p.style.height=''; }
    }
    fit(); window.addEventListener('resize',fit); window.addEventListener('orientationchange',fit);
  })();
</script>
</body>
</html>
