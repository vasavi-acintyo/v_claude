<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Accreditation Request</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  [hidden]{display:none !important;}
  :root{
    --brand:#7d2c3b; --brand-dark:#5e2029; --brand-soft:#f4e7e9; --gold:#b0894f;
    --ink:#2a2320; --slate-700:#514842; --muted:#71665d;
    --line:#e7e0d4; --chip:#f4f0e8; --green:#3f7d4e;
    --surface:#faf6ee; --card:#ffffff; --page:#d8d0c2;
    --g1:#9c4453; --g2:#7d2c3b; --d1:#2b191c; --d2:#5e2029; --d3:#7d2c3b; --glow:rgba(176,137,79,.45);
    --soft1:#f7ede1; --soft2:#f4e7e9; --onGold:#e6cd93;
    --display:'Poppins', sans-serif;
    --ui:'Inter', sans-serif;
  }
  [data-theme="blue"]{--brand:#1e5fbf;--brand-dark:#164a99;--brand-soft:#e7effc;--gold:#b0894f;--ink:#0f2438;--slate-700:#31465e;--muted:#546a80;--line:#e1e9f3;--chip:#eef4fb;--green:#1f9d6b;--surface:#f7fafd;--card:#ffffff;--page:#cdd8e6;--g1:#4f8be8;--g2:#1e5fbf;--d1:#0b2545;--d2:#123a72;--d3:#1e5fbf;--glow:rgba(56,189,248,.42);--soft1:#e9f1ff;--soft2:#eaf3ff;--onGold:#9bdcfa;}
  [data-theme="green"]{--brand:#0f7a5a;--brand-dark:#0b5c44;--brand-soft:#e2f5ee;--gold:#b08631;--ink:#12271f;--slate-700:#33473f;--muted:#6f867d;--line:#dbe9e2;--chip:#eef6f2;--green:#0f7a5a;--surface:#f6fbf8;--card:#ffffff;--page:#cfe0d8;--g1:#2aa578;--g2:#0f7a5a;--d1:#0a2b20;--d2:#0e5540;--d3:#0f7a5a;--glow:rgba(201,162,39,.4);--soft1:#e6f5ee;--soft2:#e9f5e6;--onGold:#e6cf7a;}
  [data-theme="indigo"]{--brand:#5b3df5;--brand-dark:#4c2fe0;--brand-soft:#efeaff;--gold:#a97636;--ink:#181633;--slate-700:#3a3752;--muted:#787593;--line:#e9e7f3;--chip:#f1eefb;--green:#16a34a;--surface:#faf9ff;--card:#ffffff;--page:#d5d2e6;--g1:#7c6cf5;--g2:#5b3df5;--d1:#141233;--d2:#241a54;--d3:#3a2b8f;--glow:rgba(124,108,245,.45);--soft1:#efebff;--soft2:#e7edff;--onGold:#fbbf6b;}
  [data-theme="dark"]{--brand:#8b7bff;--brand-dark:#a99bff;--brand-soft:#241f3d;--gold:#e0b769;--ink:#eef0f6;--slate-700:#c3c7d4;--muted:#8b8fa3;--line:#2a2c3a;--chip:#22242f;--green:#4ade80;--surface:#14151d;--card:#1b1d27;--page:#0a0b0f;--g1:#8b7bff;--g2:#6d5cf0;--d1:#1b1d27;--d2:#23263a;--d3:#2e2b52;--glow:rgba(139,123,255,.4);--soft1:#20222e;--soft2:#242233;--onGold:#e0b769;}
  :root{color-scheme:light;} [data-theme="dark"]{color-scheme:dark;}

  html,body{background:var(--page);font-family:var(--ui);color:var(--ink);-webkit-font-smoothing:antialiased;}
  body{display:flex;justify-content:center;padding:18px;}
  svg{display:block;}

  .phone{width:390px;height:844px;background:var(--surface);border-radius:44px;box-shadow:0 30px 70px -20px rgba(0,0,0,.45);overflow:hidden;position:relative;display:flex;flex-direction:column;}
  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} }

  .statusbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .topbar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--line);}
  .topbar .bk{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;}
  .topbar .bk:active{transform:scale(.94);}
  .topbar .tt{flex:1;min-width:0;font-size:16px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:16px 18px 22px;}
  .scroll::-webkit-scrollbar{width:0;}

  .field{margin-top:15px;}
  .field:first-child{margin-top:0;}
  .field>label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--slate-700);margin-bottom:7px;}
  .field .req{color:var(--brand);}
  .field .hint{font-size:9.5px;color:var(--muted);font-weight:600;margin-left:auto;}
  .inp{width:100%;min-height:46px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:12.5px;font-family:inherit;color:var(--ink);}
  .inp::placeholder{color:var(--muted);}
  .inp:focus{outline:none;border-color:var(--brand);}
  .row2{display:flex;gap:11px;} .row2>*{flex:1;min-width:0;}
  .sublabel{display:block;font-size:9.5px;font-weight:700;color:var(--muted);margin-bottom:5px;}
  .cc{font-size:9.5px;color:var(--muted);font-weight:600;text-align:right;margin-top:5px;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:inline-flex;align-items:center;min-height:38px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:8px 13px;font-size:11px;font-weight:700;color:var(--ink);cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1), border-color .16s, color .16s, background .16s;}
  .chip:active{transform:scale(.95);}
  .chip.sel{border-color:var(--brand);color:var(--brand);background:var(--brand-soft);}

  .up{display:flex;align-items:center;gap:10px;border:1.5px dashed var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:border-color .16s,background .16s;}
  .up:hover{border-color:var(--brand);}
  .up.has{border-style:solid;border-color:var(--brand);background:var(--brand-soft);}
  .up input[type=file]{display:none;}
  .up .ui{width:32px;height:32px;border-radius:9px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:0 0 auto;}
  .up .ui svg{width:16px;height:16px;}
  .up .ut{flex:1;min-width:0;font-size:11px;font-weight:700;color:var(--slate-700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .foot{flex:0 0 auto;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--line);}
  .btn{width:100%;min-height:50px;border-radius:13px;font-family:inherit;font-size:13.5px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;border:none;background:var(--brand);color:#fff;transition:transform .16s cubic-bezier(.22,1,.36,1), background .18s;}
  .btn:hover{background:var(--brand-dark);} .btn:active{transform:scale(.98);}
  .btn svg{width:18px;height:18px;}

  .done{position:absolute;inset:0;z-index:80;background:var(--surface);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 34px;}
  .done.show{display:flex;}
  .done .check{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;color:#fff;background:var(--brand);box-shadow:0 18px 40px -14px var(--brand);}
  .done .check svg{width:44px;height:44px;fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
  .done h3{font-size:21px;font-weight:800;font-family:var(--display);margin-top:20px;letter-spacing:-.02em;}
  .done p{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;max-width:260px;}
  .done .acts{margin-top:26px;width:100%;display:flex;flex-direction:column;gap:10px;}
  .done .acts .btn{width:100%;}
  .done .acts .ghost{background:none;color:var(--brand);border:1.5px solid var(--line);}

  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;background:var(--ink);opacity:.85;border-radius:3px;}
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <button class="bk" id="back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="tt">New accreditation request</span>
  </div>

  <div class="scroll" id="scroll">
    <div class="field">
      <label>Organization name <span class="req">*</span></label>
      <input class="inp" id="fOrg" placeholder="e.g. Cardiological Society of India">
    </div>

    <div class="field">
      <label>Event type</label>
      <div class="chips" id="eventTypes"></div>
    </div>

    <div class="field">
      <label>Topic <span class="req">*</span></label>
      <input class="inp" id="fTopic" maxlength="80" placeholder="e.g. Advances in Heart Failure Management" oninput="cc(this,'ccTopic')">
      <div class="cc"><span id="ccTopic">0</span>/80</div>
    </div>

    <div class="field">
      <label>Event dates <span class="req">*</span></label>
      <div class="row2">
        <div class="subfield"><span class="sublabel">Start</span><input class="inp" id="fEventStart" type="date"></div>
        <div class="subfield"><span class="sublabel">End · optional</span><input class="inp" id="fEventEnd" type="date"></div>
      </div>
    </div>

    <div class="field">
      <label>Venue</label>
      <input class="inp" id="fVenue" placeholder="e.g. Taj Lands End, Mumbai — or a meeting link">
    </div>

    <div class="field">
      <label>Brochure <span class="req">*</span></label>
      <label class="up" id="brochureUp">
        <input type="file" id="fBrochure" accept="application/pdf,image/*">
        <span class="ui"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg></span>
        <span class="ut" id="brochureUt">Upload brochure · PDF or image</span>
      </label>
    </div>
  </div>

  <div class="foot">
    <button class="btn" id="submitBtn">Submit request
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <div class="done" id="done">
    <div class="check"><svg viewBox="0 0 24 24"><polyline points="4 12.5 10 18.5 20 6.5"/></svg></div>
    <h3>Request submitted</h3>
    <p id="doneMsg">Your accreditation request is now pending review by the board.</p>
    <div class="acts">
      <button class="btn" onclick="location.href='accreditation-requests.html'">View requests</button>
      <button class="btn ghost" onclick="location.href='my-programs.html'">Done</button>
    </div>
  </div>

  <div class="home-ind"></div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  try{ const t=localStorage.getItem('cmeTheme')||'blue'; if(t&&t!=='classical') document.documentElement.setAttribute('data-theme',t); }catch(e){}
  function toast(m){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.querySelector('.phone').appendChild(t); } t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1400); }
  function cc(el,id){ document.getElementById(id).textContent=el.value.length; }
  document.getElementById('back').addEventListener('click', ()=>{ history.length>1?history.back():location.href='accreditation-requests.html'; });

  // event type — single select
  const EVENT_TYPES=['Conference','Workshop','Webinar','Symposium','Seminar','Other'];
  let eventType=EVENT_TYPES[0];
  const etEl=document.getElementById('eventTypes');
  function renderEventTypes(){
    etEl.innerHTML = EVENT_TYPES.map(t=>`<button type="button" class="chip${t===eventType?' sel':''}" data-t="${t}">${t}</button>`).join('');
  }
  etEl.addEventListener('click', e=>{
    const b=e.target.closest('.chip'); if(!b) return;
    eventType=b.dataset.t; renderEventTypes();
  });
  renderEventTypes();

  // brochure upload
  const brInput=document.getElementById('fBrochure'), brUp=document.getElementById('brochureUp'), brUt=document.getElementById('brochureUt');
  brInput.addEventListener('change', ()=>{
    const f=brInput.files&&brInput.files[0]; if(!f) return;
    brUt.textContent=f.name; brUp.classList.add('has');
  });

  document.getElementById('submitBtn').addEventListener('click', ()=>{
    const org=document.getElementById('fOrg').value.trim();
    const topic=document.getElementById('fTopic').value.trim();
    const eventStart=document.getElementById('fEventStart').value;
    const eventEnd=document.getElementById('fEventEnd').value;
    const venue=document.getElementById('fVenue').value.trim();
    const brochureFile=brInput.files&&brInput.files[0];

    if(!org){ toast('Add the organization name'); document.getElementById('fOrg').focus(); return; }
    if(!topic){ toast('Add the event topic'); document.getElementById('fTopic').focus(); return; }
    if(!eventStart){ toast('Add the event start date'); document.getElementById('fEventStart').focus(); return; }
    if(!brochureFile){ toast('Upload a brochure first'); brUp.scrollIntoView({behavior:'smooth', block:'center'}); return; }

    const req={
      title: topic,
      board: org,
      eventType: eventType,
      venue: venue,
      eventStart: eventStart,
      eventEnd: eventEnd || eventStart,
      brochureName: brochureFile.name,
      date: 'Submitted '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}),
      status: 'pending'
    };
    let reqs=[]; try{ reqs=JSON.parse(localStorage.getItem('accreditationRequests')||'[]'); }catch(e){}
    reqs.unshift(req);
    try{ localStorage.setItem('accreditationRequests', JSON.stringify(reqs)); }catch(e){}

    document.getElementById('doneMsg').textContent = '“'+topic+'” has been submitted to '+org+' for accreditation review.';
    document.getElementById('done').classList.add('show');
  });

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
