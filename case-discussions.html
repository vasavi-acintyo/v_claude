<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case discussions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>

  .statusbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .topbar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:8px 16px 10px;border-bottom:1px solid var(--line);}
  .back{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;transition:transform .18s cubic-bezier(.22,1,.36,1);text-decoration:none;}
  .back:active{transform:scale(.92);} .back svg{width:19px;height:19px;}
  .topbar h1{font-size:16px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;flex:1;min-width:0;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:14px 18px 20px;} .scroll::-webkit-scrollbar{width:0;}
  .intro{font-size:11px;color:var(--muted);line-height:1.5;margin:0 2px 14px;}

  /* case cards */
  .clist{display:flex;flex-direction:column;gap:11px;}
  .ccard{background:var(--soft1);border:1px solid transparent;border-radius:16px;padding:14px;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s;}
  .ccard:hover{transform:translateY(-2px);border-color:var(--brand);} .ccard:active{transform:scale(.99);}
  .ctag{display:inline-flex;align-items:center;font-size:8.5px;font-weight:800;letter-spacing:.03em;color:var(--brand);background:var(--brand-soft);padding:3px 9px;border-radius:20px;text-transform:uppercase;}
  .ctime{font-size:9px;color:var(--muted);font-weight:600;float:right;margin-top:3px;}
  .ctitle{font-size:13.5px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;line-height:1.25;margin:9px 0 4px;}
  .cq{font-size:10.5px;color:var(--slate-700);line-height:1.45;}
  .cfoot{display:flex;align-items:center;gap:9px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);}
  .avs{display:flex;} .avs img{width:24px;height:24px;border-radius:50%;border:2px solid var(--soft1);margin-left:-8px;object-fit:cover;background:var(--chip);} .avs img:first-child{margin-left:0;}
  .cn{font-size:10px;color:var(--muted);font-weight:700;}
  .aibadge{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:5px 10px;border-radius:20px;} .aibadge svg{width:12px;height:12px;}

  .empty{text-align:center;padding:44px 20px;color:var(--muted);}
  .empty svg{width:40px;height:40px;margin:0 auto 12px;opacity:.4;}
  .empty b{display:block;font-size:13px;font-weight:800;font-family:var(--display);color:var(--ink);}
  .empty span{font-size:10.5px;display:block;margin-top:4px;line-height:1.5;}

  /* detail sheet */
  .backdrop{position:absolute;inset:0;background:rgba(15,15,35,.45);backdrop-filter:blur(2px);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;z-index:30;}
  .backdrop.open{opacity:1;visibility:visible;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:31;background:var(--card);border-radius:22px 22px 0 0;display:flex;flex-direction:column;max-height:92%;
    transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.3,.5,1);box-shadow:0 -12px 40px -12px rgba(0,0,0,.4);}
  .sheet.open{transform:translateY(0);}
  .grab{width:38px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 4px;flex:0 0 auto;}
  .sh-body{overflow-y:auto;padding:6px 18px calc(16px + env(safe-area-inset-bottom));scrollbar-width:none;} .sh-body::-webkit-scrollbar{display:none;}

  .d-tag{display:inline-flex;font-size:8.5px;font-weight:800;letter-spacing:.03em;color:var(--brand);background:var(--brand-soft);padding:3px 9px;border-radius:20px;text-transform:uppercase;}
  .d-title{font-size:17px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;line-height:1.25;margin:9px 0 5px;}
  .d-meta{font-size:10px;color:var(--muted);}
  .d-q{background:var(--soft1);border-radius:12px;padding:11px 12px;margin-top:12px;font-size:11px;line-height:1.55;color:var(--slate-700);}
  .d-q b{color:var(--brand);font-weight:800;}

  /* AI summary card */
  .ai{margin-top:16px;border-radius:16px;overflow:hidden;background:linear-gradient(140deg,var(--d1),var(--d2) 60%,var(--d3));color:#fff;position:relative;}
  .ai::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--glow),transparent 70%);}
  .ai-in{position:relative;padding:15px 16px;}
  .ai-hd{display:flex;align-items:center;gap:9px;}
  .ai-ic{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.16);display:grid;place-items:center;flex:0 0 auto;} .ai-ic svg{width:17px;height:17px;}
  .ai-hd .t{font-size:12.5px;font-weight:800;font-family:var(--display);} .ai-hd .s{font-size:9px;opacity:.8;margin-top:1px;}
  .ai-regen{margin-left:auto;background:rgba(255,255,255,.16);border:none;color:#fff;font-family:inherit;font-size:9.5px;font-weight:700;padding:6px 11px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .18s, transform .18s;} .ai-regen:active{transform:scale(.94);} .ai-regen svg{width:12px;height:12px;}
  .ai-body{margin-top:13px;}
  .ai-consensus{font-size:12px;line-height:1.6;font-weight:600;}
  .ai-sub{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin:14px 0 7px;}
  .ai-pts{list-style:none;display:flex;flex-direction:column;gap:8px;}
  .ai-pts li{font-size:11px;line-height:1.5;display:flex;gap:9px;opacity:.96;}
  .ai-pts li .b{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;font-size:8.5px;font-weight:800;display:grid;place-items:center;flex:0 0 auto;margin-top:1px;}
  .ai-next{margin-top:14px;background:rgba(255,255,255,.12);border-radius:11px;padding:11px;font-size:10.5px;line-height:1.5;display:flex;gap:9px;} .ai-next svg{width:15px;height:15px;flex:0 0 auto;color:var(--onGold);margin-top:1px;}
  .ai-next b{color:var(--onGold);}
  .ai-disc{font-size:8.5px;opacity:.6;margin-top:11px;line-height:1.4;}
  /* loading */
  .ai-load{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
  .ai-load .ln{height:11px;border-radius:6px;background:linear-gradient(90deg,rgba(255,255,255,.1),rgba(255,255,255,.28),rgba(255,255,255,.1));background-size:400px 100%;animation:shimmer 1.1s infinite linear;}
  .ai-load .ln:nth-child(2){width:88%} .ai-load .ln:nth-child(3){width:70%}
  .ai-load .wait{display:flex;align-items:center;gap:8px;font-size:10px;opacity:.85;} .ai-load .sp{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}

  /* opinions */
  .op-hd{font-size:9.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:20px 2px 11px;}
  .op{display:flex;gap:11px;padding:12px 0;border-bottom:1px solid var(--line);}
  .op:last-child{border-bottom:none;}
  .op img{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .op .m{flex:1;min-width:0;}
  .op .nm{font-size:11.5px;font-weight:800;} .op .sp{font-size:9px;color:var(--muted);margin-top:1px;}
  .op .tx{font-size:11px;line-height:1.55;color:var(--slate-700);margin-top:6px;}
  .op .ft{display:flex;align-items:center;gap:14px;margin-top:7px;} .op .ft span{font-size:9px;color:var(--muted);font-weight:700;display:inline-flex;align-items:center;gap:4px;} .op .ft svg{width:12px;height:12px;}

  .openfeed{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:46px;margin-top:16px;border:1.5px solid var(--line);border-radius:13px;background:var(--card);color:var(--ink);font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;text-decoration:none;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s;}
  .openfeed:active{transform:scale(.98);} .openfeed:hover{border-color:var(--brand);} .openfeed svg{width:16px;height:16px;color:var(--brand);}

  .toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);z-index:60;background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;max-width:82%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}
</style>
  <link rel="stylesheet" href="global.css?v=8">
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <a class="back" href="referral.html" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18"/></svg></a>
    <h1>Case discussions</h1>
  </div>

  <div class="scroll">
    <div class="intro rise">Opinions your network shared on cases you posted — with an AI summary of the discussion.</div>
    <div class="clist rise" id="list"></div>
  </div>

  <!-- detail sheet -->
  <div class="backdrop" id="dBackdrop"></div>
  <div class="sheet" id="dSheet">
    <div class="grab"></div>
    <div class="sh-body" id="dBody"></div>
  </div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  try{ const t=localStorage.getItem('cmeTheme')||'blue'; if(t&&t!=='classical') document.documentElement.setAttribute('data-theme',t); }catch(e){}

  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const specOf = c => (c.caseMeta&&c.caseMeta.spec) || ((c.tag||'').split('·')[1]||'').trim() || 'General';

  const heartIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.5 3-3.4 3-5.5A4.5 4.5 0 0 0 12 5 4.5 4.5 0 0 0 2 8.5C2 12 5 15 12 21c2-1.7 3.7-3.2 5-4.5"/></svg>';
  const sparkIc='<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l1.6 5L19 8.5l-4.4 2.9L16 17l-4-3.2L8 17l1.4-5.6L5 8.5 10.4 7z"/><circle cx="19" cy="4" r="1.4"/><circle cx="5" cy="19" r="1.2"/></svg>';
  const nextIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>';
  const regenIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v5h-5"/></svg>';
  const feedIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>';
  const emptyIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>';

  const IMG = {
    rohan:'https://randomuser.me/api/portraits/men/45.jpg', arvind:'https://randomuser.me/api/portraits/men/32.jpg',
    meera:'https://randomuser.me/api/portraits/women/68.jpg', priya:'https://randomuser.me/api/portraits/women/44.jpg',
    vijay:'https://randomuser.me/api/portraits/men/76.jpg', kavya:'https://randomuser.me/api/portraits/women/65.jpg'
  };

  // simulated network opinions per specialty (used when a case has no live comments yet)
  const OPINIONS = {
    Nephrology:[
      {name:'Dr. Rohan Sinha', sp:'Nephrology · Manipal', img:IMG.rohan, tx:'Stage it first — eGFR + urine ACR. If eGFR ~40 with proteinuria, start an ACEi/ARB and add an SGLT2 inhibitor, then recheck K⁺ and creatinine in 10–14 days.', likes:14, time:'3h'},
      {name:'Dr. Priya Nair', sp:'Internal Medicine · Tata', img:IMG.priya, tx:'Rule out reversible causes before labelling CKD — NSAIDs, dehydration, obstruction. A renal ultrasound is quick and worthwhile.', likes:9, time:'2h'},
      {name:'Dr. Arvind Kumar', sp:'Cardiology · Fortis', img:IMG.arvind, tx:'Get BP under 130/80. Watch closely for hyperkalaemia once you start the ACEi/ARB.', likes:6, time:'1h'},
      {name:'Dr. Meera Iyer', sp:'Endocrinology · Apollo', img:IMG.meera, tx:'If diabetic, the SGLT2i gives real cardio-renal benefit — good add-on once the eGFR threshold is met.', likes:5, time:'44m'}
    ],
    Cardiology:[
      {name:'Dr. Arvind Kumar', sp:'Cardiology · Fortis', img:IMG.arvind, tx:'Ongoing pain with ST-T changes — treat as ACS: serial troponins, aspirin and admit for monitoring. Don’t wait.', likes:18, time:'2h'},
      {name:'Dr. Rohan Sinha', sp:'Nephrology · Manipal', img:IMG.rohan, tx:'If troponin-negative and clinically low-risk, a TMT or CT coronary angiogram can risk-stratify as an outpatient.', likes:8, time:'1h'},
      {name:'Dr. Meera Iyer', sp:'Endocrinology · Apollo', img:IMG.meera, tx:'Consider non-cardiac mimics (GERD, anxiety) — but only after ACS is excluded.', likes:4, time:'50m'}
    ],
    Endocrinology:[
      {name:'Dr. Meera Iyer', sp:'Endocrinology · Apollo', img:IMG.meera, tx:'With HbA1c ~9.8% and CKD, I’d add basal insulin and an SGLT2 inhibitor for renoprotection, and reinforce lifestyle.', likes:12, time:'2h'},
      {name:'Dr. Rohan Sinha', sp:'Nephrology · Manipal', img:IMG.rohan, tx:'Agree on SGLT2i — just confirm eGFR is above the initiation threshold and monitor renal function.', likes:7, time:'1h'},
      {name:'Dr. Vijay Menon', sp:'Diabetology · KMC', img:IMG.vijay, tx:'A GLP-1 RA is worth considering too if weight and CV risk are concerns.', likes:5, time:'30m'}
    ],
    General:[
      {name:'Dr. Priya Nair', sp:'Internal Medicine · Tata', img:IMG.priya, tx:'Thanks for sharing — could you add the latest labs and current medications? That would sharpen the advice.', likes:4, time:'1h'},
      {name:'Dr. Kavya Reddy', sp:'Gastroenterology · AIIMS', img:IMG.kavya, tx:'Happy to review if you want a formal opinion — feel free to send a referral.', likes:3, time:'40m'}
    ]
  };

  // curated AI summaries per specialty
  const AISUM = {
    Nephrology:{ consensus:'The clear consensus is to confirm CKD stage (eGFR + urine ACR, renal ultrasound), then start an ACEi/ARB with an SGLT2 inhibitor for renoprotection — while excluding reversible causes and monitoring potassium.',
      points:['Stage the disease: repeat eGFR, urine ACR and a renal ultrasound.','Exclude reversible causes — NSAIDs, dehydration, obstruction.','Start ACEi/ARB + SGLT2 inhibitor; recheck K⁺ and creatinine at 1–2 weeks.','Target BP < 130/80 and review nephrotoxic drugs.'],
      next:'Repeat labs in 1–2 weeks and book a nephrology review if eGFR < 30 or declining.' },
    Cardiology:{ consensus:'Colleagues agree on excluding acute coronary syndrome first — serial troponins and ECG with admission if pain is ongoing — then risk-stratifying with a stress test or CT coronary angiogram.',
      points:['Treat as ACS until excluded: serial troponin + ECG, aspirin, monitoring.','If troponin-negative and low-risk → outpatient TMT or CT coronary angiogram.','Optimise risk factors; consider non-cardiac causes only after ACS is ruled out.'],
      next:'Admit for serial troponins; arrange functional or anatomical testing based on results.' },
    Endocrinology:{ consensus:'Opinions converge on intensifying therapy with basal insulin plus an SGLT2 inhibitor for combined glycaemic and cardio-renal benefit, once eGFR allows, alongside lifestyle reinforcement.',
      points:['Add basal insulin for glycaemic control at HbA1c ~9.8%.','Start an SGLT2 inhibitor for cardio-renal protection if eGFR permits.','Consider a GLP-1 RA where weight or CV risk is a concern.','Monitor renal function after initiation.'],
      next:'Start the combination, reinforce lifestyle, and review HbA1c in 3 months.' },
    General:{ consensus:'Colleagues are broadly supportive and are asking for a little more data — recent labs and current medications — before giving specific guidance; a formal referral was also offered.',
      points:['Share the latest investigations and current drug list.','Clarify the specific clinical question you want answered.','A formal referral is available if you want a detailed opinion.'],
      next:'Add the missing details to the post, or send a referral to the offering specialist.' }
  };

  // ---- read the live feed (shared with post.html) for real comments ----
  const IDB_KEY='posts3';
  function idbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open('medhubFeed',1); r.onupgradeneeded=()=>r.result.createObjectStore('kv'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
  function idbGet(k){ return new Promise(res=>{ idbOpen().then(db=>{ const tx=db.transaction('kv','readonly'); const q=tx.objectStore('kv').get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>res(undefined); }).catch(()=>res(undefined)); }); }

  // demo case always present so the feature is visible before you post one
  const DEMO = { id:'demo-c1', tag:'Case · Cardiology', time:'5h',
    caseMeta:{ spec:'Cardiology', age:'45', sex:'Female', cond:'Atypical chest pain with ST-T changes', details:'45F, exertional chest discomfort for 2 weeks, ST-T changes on ECG, troponin pending.', question:'Admit and treat as ACS, or risk-stratify as outpatient?' },
    _demo:true };

  let ALL = [];
  const listEl = document.getElementById('list');

  function opinionsFor(c){
    if(c._live && c._live.length){ return c._live; }
    return OPINIONS[specOf(c)] || OPINIONS.General;
  }
  function summaryFor(c){ return AISUM[specOf(c)] || AISUM.General; }

  async function loadCases(){
    let mine=[]; try{ mine = JSON.parse(localStorage.getItem('casePosts')||'[]'); }catch(e){}
    // enrich mine with live comments from the feed
    let feed=null; try{ const s=await idbGet(IDB_KEY); if(s&&Array.isArray(s.posts)) feed=s.posts; }catch(e){}
    mine.forEach(c=>{
      if(feed){ const live=feed.find(p=>p.id==c.id); if(live && live.comments && live.comments.length){
        c._live = live.comments.map(cm=>({name:cm.name, sp:cm.spec||'Colleague', img:cm.img, tx:cm.text, likes:cm.likes||0, time:cm.time||'now'}));
      }}
    });
    ALL = mine.concat([DEMO]);
    render();
  }

  function cardHtml(c){
    const ops = opinionsFor(c);
    const spec = specOf(c);
    const q = (c.caseMeta&&c.caseMeta.question) || (c.caseMeta&&c.caseMeta.cond) || 'Tap to view the discussion.';
    const avs = ops.slice(0,3).map(o=>'<img src="'+o.img+'" alt="" onerror="this.style.visibility=\'hidden\'">').join('');
    return '<button class="ccard" data-id="'+esc(c.id)+'">'+
      '<span class="ctag">Case · '+esc(spec)+'</span><span class="ctime">'+esc(c.time||'now')+'</span>'+
      '<div class="ctitle">'+esc((c.caseMeta&&c.caseMeta.cond)||'Case for opinion')+'</div>'+
      '<div class="cq">'+esc(q)+'</div>'+
      '<div class="cfoot"><div class="avs">'+avs+'</div><span class="cn">'+ops.length+' opinion'+(ops.length!==1?'s':'')+'</span>'+
        '<span class="aibadge">'+sparkIc+'AI summary</span></div>'+
    '</button>';
  }

  function render(){
    if(!ALL.length){ listEl.innerHTML='<div class="empty">'+emptyIc+'<b>No case discussions yet</b><span>Post a case from a referral to get opinions from your network.</span></div>'; return; }
    listEl.innerHTML = ALL.map(cardHtml).join('');
  }

  // ---- detail + AI summary ----
  const dBackdrop=document.getElementById('dBackdrop'), dSheet=document.getElementById('dSheet'), dBody=document.getElementById('dBody');
  let openId=null;

  function opHtml(o){
    return '<div class="op"><img src="'+o.img+'" alt="" onerror="this.style.visibility=\'hidden\'"><div class="m">'+
      '<div class="nm">'+esc(o.name)+'</div><div class="sp">'+esc(o.sp)+' · '+esc(o.time)+'</div>'+
      '<div class="tx">'+esc(o.tx)+'</div>'+
      '<div class="ft"><span>'+heartIc+esc(o.likes)+'</span><span>Reply</span></div></div></div>';
  }
  function summaryHtml(s){
    return '<div class="ai-consensus">'+esc(s.consensus)+'</div>'+
      '<div class="ai-sub">Key points</div>'+
      '<ul class="ai-pts">'+s.points.map((p,i)=>'<li><span class="b">'+(i+1)+'</span><span>'+esc(p)+'</span></li>').join('')+'</ul>'+
      '<div class="ai-next">'+nextIc+'<div><b>Suggested next step:</b> '+esc(s.next)+'</div></div>'+
      '<div class="ai-disc">AI-generated from your network’s opinions. Verify against guidelines and your clinical judgement.</div>';
  }
  const loadingHtml = '<div class="ai-load"><div class="wait"><span class="sp"></span>Summarising the discussion…</div><div class="ln"></div><div class="ln"></div><div class="ln"></div></div>';

  function detailHtml(c){
    const ops=opinionsFor(c), spec=specOf(c), m=c.caseMeta||{};
    const line=[m.age?m.age+' y':'', m.sex].filter(Boolean).join(' · ');
    return '<span class="d-tag">Case · '+esc(spec)+'</span>'+
      '<div class="d-title">'+esc(m.cond||'Case for opinion')+'</div>'+
      '<div class="d-meta">'+(line?esc(line)+' · ':'')+'Posted '+esc(c.time||'now')+' · '+ops.length+' opinion'+(ops.length!==1?'s':'')+'</div>'+
      (m.question?'<div class="d-q"><b>Your question:</b> '+esc(m.question)+'</div>':'')+

      '<div class="ai"><div class="ai-in"><div class="ai-hd"><span class="ai-ic">'+sparkIc+'</span>'+
        '<div><div class="t">AI summary of opinions</div><div class="s">Synthesised from '+ops.length+' network repl'+(ops.length!==1?'ies':'y')+'</div></div>'+
        '<button class="ai-regen" id="regen">'+regenIc+'Regenerate</button></div>'+
        '<div class="ai-body" id="aiBody">'+loadingHtml+'</div></div></div>'+

      '<div class="op-hd">Opinions ('+ops.length+')</div>'+
      ops.map(opHtml).join('')+
      '<a class="openfeed" href="post.html">'+feedIc+'Open discussion in feed</a>';
  }

  function runSummary(c){
    const body=document.getElementById('aiBody'); if(!body) return;
    body.innerHTML=loadingHtml;
    setTimeout(()=>{ const body2=document.getElementById('aiBody'); if(body2) body2.innerHTML=summaryHtml(summaryFor(c)); }, 850);
  }
  function openCase(id){
    const c=ALL.find(x=>x.id==id); if(!c) return;
    openId=id; dBody.innerHTML=detailHtml(c); dBody.scrollTop=0;
    dBackdrop.classList.add('open'); dSheet.classList.add('open');
    runSummary(c);
  }
  function closeCase(){ dBackdrop.classList.remove('open'); dSheet.classList.remove('open'); openId=null; }

  listEl.addEventListener('click', e=>{ const b=e.target.closest('.ccard'); if(b) openCase(b.dataset.id); });
  dBackdrop.addEventListener('click', closeCase);
  dBody.addEventListener('click', e=>{ if(e.target.closest('#regen')){ const c=ALL.find(x=>x.id==openId); if(c) runSummary(c); } });

  loadCases();

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
