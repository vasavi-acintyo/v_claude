<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore — CME Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>

  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} .scroll{padding-top:max(10px,env(safe-area-inset-top));} }

  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:6px 18px 16px;}
  .scroll::-webkit-scrollbar{width:0;}

  /* header */
  .ptop{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0 2px;}
  .ptop .wm{font-size:9.5px;color:var(--muted);font-weight:700;letter-spacing:.16em;text-transform:uppercase;}
  .ptop h1{font-size:20px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;margin-top:2px;}
  .icon-btn{width:44px;height:44px;min-width:44px;min-height:44px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);transition:transform .18s cubic-bezier(.22,1,.36,1), opacity .18s;}
  .icon-btn:active{transform:scale(.94);}

  /* search */
  .search{position:relative;margin-top:4px;}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--muted);}
  .search input{width:100%;min-height:34px;height:34px;background:var(--chip);border:1px solid transparent;border-radius:17px;padding:0 12px 0 33px;font-size:11px;font-family:inherit;color:var(--ink);}
  .search input::placeholder{color:var(--muted);}
  .search input:focus{outline:none;border-color:var(--brand);}

  /* section header */
  .sec{display:flex;align-items:baseline;justify-content:space-between;margin:4px 0 4px;}
  .sec h2{font-size:15px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;}
  .sec a{font-size:10px;font-weight:700;color:var(--brand);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;transition:transform .18s cubic-bezier(.22,1,.36,1), opacity .18s;}
  .sec a:active{transform:scale(.94);opacity:.7;}

  /* format filter chips */
  .formats{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin:4px -2px 0;padding:0 2px;}
  .formats::-webkit-scrollbar{display:none;}
  .fmt{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;min-height:44px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px 13px;font-size:11.5px;font-weight:700;color:var(--ink);cursor:pointer;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s, color .18s, background .18s;}
  .fmt:hover{border-color:var(--brand);}
  .fmt:active{transform:scale(.96);}
  .fmt.active{border-color:var(--brand);color:var(--brand);background:var(--brand-soft);}
  .fmt svg{width:15px;height:15px;color:var(--brand);}
  .fmt.active svg{color:var(--brand);}

  /* specialty grid — calm soft cards */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .gcard{position:relative;display:flex;flex-direction:column;gap:8px;background:var(--soft1);border:1px solid transparent;border-radius:14px;padding:11px;min-height:68px;text-decoration:none;color:inherit;cursor:pointer;
    transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s;}
  .gcard:nth-child(4n+2),.gcard:nth-child(4n+3){background:var(--soft2);}
  .gcard:hover{transform:translateY(-3px);border-color:var(--brand);}
  .gcard:active{transform:scale(.985);}
  .gcard .gi{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--brand);background:rgba(255,255,255,.55);}
  [data-theme="dark"] .gcard .gi{background:rgba(255,255,255,.08);}
  .gcard .gi svg{width:17px;height:17px;}
  .gcard .gn{font-size:12px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;line-height:1.15;}
  .gcard .gc{font-size:9px;color:var(--muted);margin-top:2px;}
  .gcard .garw{position:absolute;bottom:11px;right:10px;color:var(--muted);opacity:0;transition:opacity .18s, transform .18s;}
  .gcard:hover .garw{opacity:1;transform:translateX(2px);}

  /* trending — vertical list */
  .trow{display:flex;flex-direction:column;gap:8px;}
  .tcard{position:relative;background:var(--soft1);border:1px solid transparent;border-radius:16px;padding:14px;cursor:pointer;transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .18s;}
  .tcard:hover{transform:translateY(-3px);border-color:var(--brand);}
  .tcard:active{transform:scale(.985);}
  .tcard .ttop{display:flex;align-items:center;gap:8px;}
  .tcard .rank{font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:4px 9px;border-radius:20px;}
  .tcard .live{display:inline-flex;align-items:center;gap:5px;font-size:8.5px;font-weight:800;letter-spacing:.05em;color:#c0464a;background:rgba(224,106,106,.12);border:1px solid rgba(224,106,106,.28);padding:3px 8px;border-radius:20px;}
  .tcard .live .d{width:5px;height:5px;border-radius:50%;background:#e06a6a;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .tcard .tt{font-size:12.5px;font-weight:800;font-family:var(--display);line-height:1.25;letter-spacing:-.01em;margin-top:11px;}
  .tcard .tm{font-size:10px;color:var(--muted);margin-top:7px;display:flex;gap:9px;}
  .tcard .tm span{display:inline-flex;align-items:center;gap:5px;}
  .tcard .tm svg{width:12px;height:12px;flex:0 0 auto;}
  .tcard .torg{font-size:9.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:5px;}
  .tcard .torg svg{width:12px;height:12px;flex:0 0 auto;}
  .tsave{position:absolute;top:4px;right:4px;z-index:3;width:40px;height:40px;padding:8px;border:none;background:transparent;display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:transform .18s cubic-bezier(.22,1,.36,1);}
  .tsave svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .tsave.saved{color:var(--brand);}
  .tsave.saved svg{fill:currentColor;}
  .tsave:active{transform:scale(.9);}
  .ptag{display:inline-flex;align-items:center;font-size:8.5px;font-weight:800;letter-spacing:.04em;padding:3px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
  .ptag.free{color:#15803d;background:#dcfce7;}
  .ptag.paid{color:var(--brand);background:var(--brand-soft);}
  [data-theme="dark"] .ptag.free{color:#86efac;background:rgba(34,197,94,.16);}

  /* bottom nav */
  .navitem{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:48px;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:none;transition:transform .18s cubic-bezier(.22,1,.36,1), opacity .18s, color .18s;}
  .navitem.active{color:var(--brand);font-weight:600;}
  .navitem:active{transform:scale(.9);opacity:.7;}

  /* toast */
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);z-index:40;
    background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;font-family:inherit;
    padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;transition:opacity .22s, transform .22s;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Doxy mascot badge — V Theme only; other themes keep a plain line icon like the rest of the nav */
  .doxy-classic{display:block;}
  .doxy-badge{display:none;}
  [data-theme="vibrant"] .doxy-classic{display:none;}
  [data-theme="vibrant"] .navitem.doxy-tab{position:relative;overflow:visible;z-index:2;}
  [data-theme="vibrant"] .doxy-badge{display:inline-flex;width:44px;height:44px;border-radius:50%;box-shadow:0 0 0 5px rgba(90,209,230,.6), 0 3px 8px -3px rgba(0,0,0,.35);animation:doxyBob 2.4s ease-in-out infinite;margin-top:-18px;}
  .doxy-badge svg{width:44px;height:44px;display:block;}
  @keyframes doxyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .doxy-badge .antenna-tip{animation:doxyGlow 1.8s ease-in-out infinite;}
  @keyframes doxyGlow{0%,100%{opacity:1}50%{opacity:.45}}
  .doxy-badge .eyes{animation:doxyLook 3.2s ease-in-out infinite;}
  @keyframes doxyLook{0%,12%{transform:translateX(0)}35%,48%{transform:translateX(-1.4px)}65%,78%{transform:translateX(1.4px)}100%{transform:translateX(0)}}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}

  /* =============================================================
     V Theme — trendy card style + colorful accents, matching the
     home-page redesign. Classic/Ocean/Forest keep the original look;
     this only applies when [data-theme="vibrant"].
     ============================================================= */
  [data-theme="vibrant"] .sec h2{position:relative;padding-left:12px;}
  [data-theme="vibrant"] .sec h2::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--brand);}

  [data-theme="vibrant"] .fmt:nth-child(1) svg{color:#2563eb;}
  [data-theme="vibrant"] .fmt:nth-child(2) svg{color:#e11d48;}
  [data-theme="vibrant"] .fmt:nth-child(3) svg{color:#7c3aed;}
  [data-theme="vibrant"] .fmt:nth-child(4) svg{color:#d97706;}
  [data-theme="vibrant"] .fmt:nth-child(5) svg{color:#0d9488;}

  [data-theme="vibrant"] .gcard{background:var(--card);border:1px solid var(--line);box-shadow:0 6px 16px -14px rgba(30,20,60,.16);}
  [data-theme="vibrant"] .gcard:nth-child(4n+2),[data-theme="vibrant"] .gcard:nth-child(4n+3){background:var(--card);}
  [data-theme="vibrant"] .gcard:nth-child(1) .gi{color:#e11d48;background:#ffe4e6;}
  [data-theme="vibrant"] .gcard:nth-child(2) .gi{color:#2563eb;background:#dbeafe;}
  [data-theme="vibrant"] .gcard:nth-child(3) .gi{color:#d97706;background:#fef3c7;}
  [data-theme="vibrant"] .gcard:nth-child(4) .gi{color:#7c3aed;background:#ede9fe;}
  [data-theme="vibrant"] .gcard:nth-child(5) .gi{color:#0d9488;background:#ccfbf1;}
  [data-theme="vibrant"] .gcard:nth-child(6) .gi{color:#0891b2;background:#cffafe;}

  [data-theme="vibrant"] .tcard{background:var(--card);border:1px solid var(--line);box-shadow:0 8px 20px -16px rgba(30,20,60,.18);}
  [data-theme="vibrant"] .tcard:hover{box-shadow:0 14px 26px -14px rgba(30,20,60,.24);}
</style>

<script>
  // ---- Native device font: pick platform font at startup (APK / TestFlight webview) ----
  (function(){
    const ua = navigator.userAgent || '';
    const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isAndroid = /Android/.test(ua);
    document.documentElement.setAttribute('data-os', isIOS ? 'ios' : isAndroid ? 'android' : 'other');
  })();

  // ---- Theme: apply saved choice on load (shared across pages) ----
  try{ const t = localStorage.getItem('cmeTheme') || 'blue'; if(t && t!=='classical') document.documentElement.setAttribute('data-theme', t); }catch(e){}

  const ic = {
    heart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.5 3-3.4 3-5.5A4.5 4.5 0 0 0 12 5 4.5 4.5 0 0 0 2 8.5C2 12 5 15 12 21c2-1.7 3.7-3.2 5-4.5"/></svg>',
    drop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3s6 6 6 11a6 6 0 0 1-12 0c0-5 6-11 6-11Z"/></svg>',
    activity:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 12 8 12 10 6 14 18 16 12 21 12"/></svg>',

    lungs:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v10"/><path d="M9 13c0 4-1 7-4 7-2 0-3-2-3-5 0-4 2-7 4-8"/><path d="M15 13c0 4 1 7 4 7 2 0 3-2 3-5 0-4-2-7-4-8"/></svg>',
    bone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6a2 2 0 1 0-2 2l6 6a2 2 0 1 0 2 2l6-6a2 2 0 1 0-2-2 2 2 0 1 0-2-2l-4 4-4-4a2 2 0 1 0 0 0Z"/></svg>',
    radio:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4.9 4.9a10 10 0 0 0 0 14.2M19.1 4.9a10 10 0 0 1 0 14.2"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></svg>',
    play:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="7 5 19 12 7 19"/></svg>',
    users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20v-1.5A4.5 4.5 0 0 1 7.5 14h3A4.5 4.5 0 0 1 15 18.5V20"/></svg>',
    clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>',
    org:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V5a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v16"/><path d="M15 21V9h3a1 1 0 0 1 1 1v11"/><path d="M8 8h2M8 12h2M8 16h2"/></svg>'
  };

  const formats = [{n:'All', i:'radio', a:true},{n:'Live', i:'radio'},{n:'On-demand', i:'play'},{n:'Workshops', i:'users'},{n:'Grand Rounds', i:'brain'}];
  document.getElementById('formats').innerHTML = formats.map(f=>`<button class="fmt${f.a?' active':''}">${ic[f.i]}${f.n}</button>`).join('');
  document.querySelectorAll('.fmt').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fmt').forEach(x=>x.classList.remove('active'));b.classList.add('active');}));

  const specs = [
    {n:'Cardiology', c:'128 CMEs', i:'heart'},
    {n:'Endocrinology', c:'94 CMEs', i:'drop'},
    {n:'Diabetes', c:'112 CMEs', i:'activity'},
    {n:'Neurology', c:'76 CMEs', i:'brain'},
    {n:'Pulmonology', c:'58 CMEs', i:'lungs'},
    {n:'Rheumatology', c:'41 CMEs', i:'bone'}
  ];
  const arw = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';
  document.getElementById('grid').innerHTML = specs.map(s=>`
    <a class="gcard" href="speakers.html?type=specialty&specialty=${encodeURIComponent(s.n)}">
      <span class="gi">${ic[s.i]}</span>
      <div><div class="gn">${s.n}</div><div class="gc">${s.c}</div></div>
      <span class="garw">${arw}</span>
    </a>`).join('');

  const trending = [
    {t:'Cardiometabolic Update 2025', m:'2 CME · 4.5h', org:'Cardiological Society of India', mode:'online', free:false, price:'₹499', live:true, rank:'#1'},
    {t:'GLP-1 Agonists Deep Dive', m:'1.5 CME · 40m', org:'RSSDI', mode:'recorded', free:true, rank:'#2'},
    {t:'Resistant Hypertension', m:'1 CME · 30m', org:'Association of Physicians of India', mode:'offline', free:false, price:'₹1,999', rank:'#3'}
  ];
  const pTag = (f,price) => f ? '<span class="ptag free">Free</span>' : '<span class="ptag paid">'+(price||'Paid')+'</span>';
  const bookmarkSvg = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z"/></svg>';
  function loadSaved(){ try{ return JSON.parse(localStorage.getItem('savedCMEs')||'[]'); }catch(e){ return []; } }
  function isSaved(title){ return loadSaved().some(s=>s.title===title); }
  document.getElementById('trending').innerHTML = trending.map(t=>{
    const saved = isSaved(t.t);
    return `
    <div class="tcard" onclick="location.href='speakers.html?type=course&title='+encodeURIComponent('${t.t.replace(/'/g,"\\'")}')+'&mode=${t.mode}&free=${t.free?1:0}'">
      <button class="tsave${saved?' saved':''}" aria-label="Save to My Learning" aria-pressed="${saved}"
        data-title="${t.t.replace(/"/g,'&quot;')}" data-meta="${t.org}" data-credits="${t.m}" data-mode="${t.mode}">${bookmarkSvg}</button>
      <div class="ttop"><span class="rank">🔥 ${t.rank}</span>${t.live?'<span class="live"><span class="d"></span>LIVE</span>':''}${pTag(t.free,t.price)}</div>
      <div class="tt">${t.t}</div>
      <div class="tm"><span>${ic.clock}${t.m}</span></div>
      <div class="torg">${ic.org}Organized by ${t.org}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.tsave').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const title = btn.dataset.title;
      let saved = loadSaved();
      const idx = saved.findIndex(s=>s.title===title);
      let on;
      if(idx>-1){ saved.splice(idx,1); on=false; }
      else { saved.unshift({ title:title, meta:btn.dataset.meta||'', credits:btn.dataset.credits||'', mode:btn.dataset.mode||'', thumb:'award', savedAt:Date.now() }); on=true; }
      try{ localStorage.setItem('savedCMEs', JSON.stringify(saved)); }catch(err){}
      btn.classList.toggle('saved', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      toast(on ? 'Saved to My Learning' : 'Removed from saved');
    });
  });

  // Toast helper (fixed bottom-center pill, ~1.4s)
  var toastEl = document.getElementById('toast'), toastTimer;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 1400);
  }

  // Wire filter icon button
  document.getElementById('filterBtn').addEventListener('click', function(){ toast('Filters coming soon'); });
  document.getElementById('back').addEventListener('click', function(){ history.length>1?history.back():location.href='cme.html'; });
</script>
<script>
  (function(){
    var p=document.querySelector('.phone'), BASE=390;
    function fit(){
      if(window.innerWidth<=600){
        var s=window.innerWidth/BASE;
        p.style.width=BASE+'px'; p.style.height=(window.innerHeight/s)+'px'; p.style.transform='scale('+s+')';
      } else { p.style.transform=''; p.style.width=''; p.style.height=''; }
    }
    fit(); window.addEventListener('resize',fit); window.addEventListener('orientationchange',fit);
  })();
</script>
</body>
</html>
