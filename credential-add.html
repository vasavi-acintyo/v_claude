<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add credential — DocSynapse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>

  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} .topbar{padding-top:max(6px,env(safe-area-inset-top));} }

  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--line);}
  .topbar .bk{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;transition:transform .18s cubic-bezier(.22,1,.36,1);}
  .topbar .bk:active{transform:scale(.94);}
  .topbar .tt{font-size:16px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:18px 18px 20px;}
  .scroll::-webkit-scrollbar{width:0;}

  .lbl{font-size:11px;font-weight:800;color:var(--slate-700);margin:0 2px 9px;}
  .lbl.mt{margin-top:20px;}

  /* credential type chips */
  .types{display:flex;flex-wrap:wrap;gap:9px;}
  .type{display:inline-flex;align-items:center;gap:7px;min-height:40px;padding:9px 14px;border-radius:22px;background:var(--card);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--slate-700);cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1), border-color .16s, color .16s, background .16s;}
  .type svg{width:15px;height:15px;flex:0 0 auto;}
  .type:active{transform:scale(.95);}
  .type.sel{background:var(--brand-soft);border-color:var(--brand);color:var(--brand);}

  .field input{width:100%;background:var(--chip);border:1px solid transparent;border-radius:11px;padding:13px 13px;font-size:12px;font-family:inherit;color:var(--ink);}
  .field input::placeholder{color:var(--muted);}
  .field input:focus{outline:none;border-color:var(--brand);background:var(--card);}
  .frow{display:flex;gap:11px;}
  .frow .fcol{flex:1;min-width:0;}

  .uploader{display:block;border:1.5px dashed var(--line);border-radius:14px;padding:22px 14px;text-align:center;cursor:pointer;background:var(--chip);transition:border-color .18s, background .18s;}
  .uploader:hover{border-color:var(--brand);}
  .uploader.has{border-style:solid;border-color:var(--brand);background:var(--brand-soft);}
  .uploader input[type=file]{display:none;}
  .uploader .ui{width:38px;height:38px;border-radius:50%;background:var(--card);color:var(--brand);display:grid;place-items:center;margin:0 auto 9px;}
  .uploader .ui svg{width:19px;height:19px;}
  .uploader .ut{font-size:12.5px;font-weight:800;font-family:var(--display);word-break:break-word;}
  .uploader .us{font-size:9.5px;color:var(--muted);margin-top:3px;}

  .note{display:flex;gap:9px;margin-top:16px;background:rgba(176,137,79,.14);border-radius:12px;padding:12px 13px;font-size:10px;line-height:1.55;color:var(--slate-700);}
  .note svg{width:15px;height:15px;color:var(--gold);flex:0 0 auto;margin-top:1px;}
  .note b{font-weight:800;}

  .footbar{flex:0 0 auto;padding:12px 16px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--surface);}
  .submit{width:100%;min-height:50px;border:none;border-radius:13px;background:var(--brand);color:#fff;font-family:inherit;font-size:13.5px;font-weight:800;cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1), background .16s;}
  .submit:active{transform:scale(.98);}
  .submit:disabled{background:var(--chip);color:var(--muted);cursor:default;}

  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;font-family:inherit;padding:10px 18px;border-radius:22px;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}
</style>
  <link rel="stylesheet" href="global.css?v=8">
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <button class="bk" id="back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="tt">Add credential</span>
  </div>

  <div class="scroll">
    <div class="lbl">Credential type</div>
    <div class="types" id="types"></div>

    <div class="field"><div class="lbl mt">Qualification</div><input id="qual" placeholder="e.g. MD Internal Medicine"></div>
    <div class="field"><div class="lbl mt">Issuing institution</div><input id="inst" placeholder="e.g. NIMS, Hyderabad"></div>

    <div class="frow">
      <div class="fcol field"><div class="lbl mt">Year of issue</div><input id="year" placeholder="2016" inputmode="numeric"></div>
      <div class="fcol field"><div class="lbl mt">Credential ID (optional)</div><input id="cid" placeholder="Reg / cert no."></div>
    </div>

    <div class="lbl mt">Supporting document</div>
    <label class="uploader" id="uploader" for="docFile">
      <input type="file" id="docFile" accept="image/*,.pdf">
      <span class="ui"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg></span>
      <div class="ut" id="upTitle">Upload certificate</div>
      <div class="us" id="upSub">PDF or image · checked against the issuer</div>
    </label>

    <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg><div>After you submit, this goes to verification. It stays <b>In review</b> until the issuing institution confirms it, then appears as <b>Verified</b>.</div></div>
  </div>

  <div class="footbar">
    <button class="submit" id="submit" disabled>Submit for verification</button>
  </div>

  <div class="home-ind"></div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  function applyTheme(t){ if(!t||t==='classical') document.documentElement.removeAttribute('data-theme'); else document.documentElement.setAttribute('data-theme',t); }
  try{ applyTheme(localStorage.getItem('cmeTheme')||'blue'); }catch(e){}
  function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; (document.querySelector('.phone')||document.body).appendChild(t); } t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1400); }

  const IC={
    degree:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>',
    fellowship:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="5"/><path d="M8.5 13 7 22l5-3 5 3-1.5-9"/></svg>',
    diploma:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>',
    certificate:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>',
    registration:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="12" r="2"/><path d="M14 10h4M14 14h4"/></svg>'
  };
  const TYPES=[['degree','Degree'],['fellowship','Fellowship'],['diploma','Diploma'],['certificate','Certificate'],['registration','Registration']];
  let selType='degree';
  document.getElementById('types').innerHTML = TYPES.map(([k,l])=>`<button class="type${k===selType?' sel':''}" data-k="${k}" type="button">${IC[k]}${l}</button>`).join('');
  document.getElementById('types').addEventListener('click', e=>{ const b=e.target.closest('.type'); if(!b) return; selType=b.dataset.k; document.querySelectorAll('#types .type').forEach(x=>x.classList.toggle('sel',x===b)); });

  const qual=document.getElementById('qual'), inst=document.getElementById('inst'), year=document.getElementById('year'), cid=document.getElementById('cid'), submit=document.getElementById('submit');
  function validate(){ submit.disabled = !(qual.value.trim() && inst.value.trim() && year.value.trim()); }
  [qual,inst,year].forEach(el=>el.addEventListener('input', validate));

  const fileIn=document.getElementById('docFile'), uploader=document.getElementById('uploader');
  fileIn.addEventListener('change', ()=>{ const f=fileIn.files&&fileIn.files[0]; if(f){ uploader.classList.add('has'); document.getElementById('upTitle').textContent=f.name; document.getElementById('upSub').textContent='Attached · tap to change'; } });

  submit.addEventListener('click', ()=>{
    if(submit.disabled) return;
    const cred={ title:qual.value.trim(), inst:inst.value.trim(), year:year.value.trim(), id:cid.value.trim(), type:selType, status:'review' };
    const DEFAULT=[
      {title:'MBBS', inst:'Osmania Medical College', year:'2012', type:'degree', status:'verified'},
      {title:'MD Internal Medicine', inst:'NIMS', year:'2016', type:'degree', status:'verified'},
      {title:'FRCP (Edinburgh)', inst:'', year:'2020', type:'fellowship', status:'verified'},
      {title:'ACLS provider certification', inst:'', year:'2024', type:'certificate', status:'verified'},
      {title:'Diploma in Diabetology — IDF', inst:'', year:'2018', type:'diploma', status:'verified'},
      {title:'BLS instructor', inst:'', year:'2023', type:'certificate', status:'review'}
    ];
    let items; try{ const s=JSON.parse(localStorage.getItem('credentials')||'null'); items = Array.isArray(s)&&s.length ? s : DEFAULT.slice(); }catch(e){ items = DEFAULT.slice(); }
    items.unshift(cred);
    try{ localStorage.setItem('credentials', JSON.stringify(items)); }catch(e){}
    toast('Submitted for verification');
    setTimeout(()=>location.href='credentials.html', 800);
  });

  document.getElementById('back').addEventListener('click', ()=>{ if(history.length>1) history.back(); else location.href='credentials.html'; });
  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
