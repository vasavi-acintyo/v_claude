<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accreditation requests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  [hidden]{display:none !important;}
  :root{
    --brand:#7d2c3b; --brand-dark:#5e2029; --brand-soft:#f4e7e9; --gold:#b0894f;
    --ink:#2a2320; --slate-700:#514842; --muted:#71665d;
    --line:#e7e0d4; --chip:#f4f0e8; --green:#3f7d4e;
    --surface:#faf6ee; --card:#ffffff; --page:#d8d0c2;
    --g1:#9c4453; --g2:#7d2c3b; --d1:#2b191c; --d2:#5e2029; --d3:#7d2c3b; --glow:rgba(176,137,79,.45);
    --soft1:#f7ede1; --soft2:#f4e7e9; --onGold:#e6cd93;
    --display:'Poppins', sans-serif;
    --ui:'Inter', sans-serif;
  }
  [data-theme="blue"]{--brand:#1e5fbf;--brand-dark:#164a99;--brand-soft:#e7effc;--gold:#b0894f;--ink:#0f2438;--slate-700:#31465e;--muted:#546a80;--line:#e1e9f3;--chip:#eef4fb;--green:#1f9d6b;--surface:#f7fafd;--card:#ffffff;--page:#cdd8e6;--g1:#4f8be8;--g2:#1e5fbf;--d1:#0b2545;--d2:#123a72;--d3:#1e5fbf;--glow:rgba(56,189,248,.42);--soft1:#e9f1ff;--soft2:#eaf3ff;--onGold:#9bdcfa;}
  [data-theme="green"]{--brand:#0f7a5a;--brand-dark:#0b5c44;--brand-soft:#e2f5ee;--gold:#b08631;--ink:#12271f;--slate-700:#33473f;--muted:#6f867d;--line:#dbe9e2;--chip:#eef6f2;--green:#0f7a5a;--surface:#f6fbf8;--card:#ffffff;--page:#cfe0d8;--g1:#2aa578;--g2:#0f7a5a;--d1:#0a2b20;--d2:#0e5540;--d3:#0f7a5a;--glow:rgba(201,162,39,.4);--soft1:#e6f5ee;--soft2:#e9f5e6;--onGold:#e6cf7a;}
  [data-theme="indigo"]{--brand:#5b3df5;--brand-dark:#4c2fe0;--brand-soft:#efeaff;--gold:#a97636;--ink:#181633;--slate-700:#3a3752;--muted:#787593;--line:#e9e7f3;--chip:#f1eefb;--green:#16a34a;--surface:#faf9ff;--card:#ffffff;--page:#d5d2e6;--g1:#7c6cf5;--g2:#5b3df5;--d1:#141233;--d2:#241a54;--d3:#3a2b8f;--glow:rgba(124,108,245,.45);--soft1:#efebff;--soft2:#e7edff;--onGold:#fbbf6b;}
  [data-theme="dark"]{--brand:#8b7bff;--brand-dark:#a99bff;--brand-soft:#241f3d;--gold:#e0b769;--ink:#eef0f6;--slate-700:#c3c7d4;--muted:#8b8fa3;--line:#2a2c3a;--chip:#22242f;--green:#4ade80;--surface:#14151d;--card:#1b1d27;--page:#0a0b0f;--g1:#8b7bff;--g2:#6d5cf0;--d1:#1b1d27;--d2:#23263a;--d3:#2e2b52;--glow:rgba(139,123,255,.4);--soft1:#20222e;--soft2:#242233;--onGold:#e0b769;}
  :root{color-scheme:light;} [data-theme="dark"]{color-scheme:dark;}

  html,body{background:var(--page);font-family:var(--ui);color:var(--ink);-webkit-font-smoothing:antialiased;}
  body{display:flex;justify-content:center;padding:18px;}
  svg{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}} .rise{animation:rise .5s cubic-bezier(.22,1,.36,1) both;}

  .phone{width:390px;height:844px;background:var(--surface);border-radius:44px;box-shadow:0 30px 70px -20px rgba(0,0,0,.45);overflow:hidden;position:relative;display:flex;flex-direction:column;}
  @media (max-width:600px){ body{padding:0;overflow:hidden;justify-content:flex-start;} .phone{border-radius:0;box-shadow:none;transform-origin:top left;} .home-ind{display:none;} .statusbar{display:none;} }

  .statusbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .topbar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--line);}
  .topbar .bk{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;}
  .topbar .bk:active{transform:scale(.94);}
  .topbar .tt{flex:1;min-width:0;font-size:16px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;}
  .topbar .plus{width:34px;height:34px;border-radius:50%;background:var(--brand);border:none;display:grid;place-items:center;cursor:pointer;color:#fff;flex:0 0 auto;}
  .topbar .plus:active{transform:scale(.9);} .topbar .plus svg{width:16px;height:16px;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:16px 18px 22px;}
  .scroll::-webkit-scrollbar{width:0;}

  .banner{display:flex;gap:10px;background:var(--soft1);border-radius:13px;padding:12px 14px;font-size:10.5px;line-height:1.55;color:var(--slate-700);}
  .banner svg{width:17px;height:17px;color:var(--brand);flex:0 0 auto;margin-top:1px;}

  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px;}
  .tile{background:var(--soft1);border:1px solid transparent;border-radius:14px;padding:12px 6px;text-align:center;}
  .tile:nth-child(2){background:var(--soft2);}
  .tile b{display:block;font-size:19px;font-weight:800;font-family:var(--display);letter-spacing:-.02em;}
  .tile.p b{color:var(--gold);} .tile.a b{color:var(--green);} .tile.r b{color:#c0464a;}
  .tile span{font-size:8.5px;font-weight:700;color:var(--muted);margin-top:2px;display:block;text-transform:uppercase;letter-spacing:.03em;}

  .list{margin-top:16px;display:flex;flex-direction:column;gap:11px;}
  .req{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;}
  .rtop{display:flex;align-items:center;gap:8px;}
  .status{display:inline-flex;align-items:center;gap:5px;font-size:8.5px;font-weight:800;letter-spacing:.03em;padding:4px 9px;border-radius:20px;text-transform:uppercase;}
  .status svg{width:11px;height:11px;}
  .status.pending{color:var(--gold);background:rgba(176,137,79,.16);}
  .status.approved{color:var(--green);background:rgba(34,197,94,.14);}
  .status.changes{color:#b4791f;background:rgba(245,158,11,.16);}
  .status.rejected{color:#c0464a;background:rgba(224,106,106,.14);}
  .board{margin-left:auto;font-size:9px;font-weight:800;color:var(--slate-700);background:var(--chip);padding:4px 9px;border-radius:20px;white-space:nowrap;}
  .req .rt{font-size:13.5px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;margin-top:9px;line-height:1.25;}
  .req .rm{font-size:10px;color:var(--muted);margin-top:6px;}
  .req .note{display:flex;gap:8px;margin-top:11px;background:var(--soft1);border-radius:11px;padding:10px 11px;font-size:10px;line-height:1.5;color:var(--slate-700);}
  .req .note svg{width:14px;height:14px;flex:0 0 auto;margin-top:1px;color:var(--gold);}
  .req .acts{display:flex;gap:9px;margin-top:12px;}
  .req .acts button{border:none;font-family:inherit;font-size:11px;font-weight:800;padding:9px 14px;min-height:38px;border-radius:11px;cursor:pointer;}
  .req .acts .pri{background:var(--brand);color:#fff;} .req .acts .sec{background:var(--chip);color:var(--ink);}
  .req .acts button:active{transform:scale(.95);}

  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;background:var(--ink);opacity:.85;border-radius:3px;}
  .toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <button class="bk" id="back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="tt">Accreditation requests</span>
    <button class="plus" onclick="location.href='create-accreditation-request.html'" aria-label="New accreditation request"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  </div>

  <div class="scroll">
    <div class="banner rise">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/><polyline points="9 12 11.5 14.5 15.5 9.5"/></svg>
      <div>Programs submitted for CME credit are reviewed by the accreditation body. Credits stay <b>pending</b> until the board approves — you'll be notified of the outcome.</div>
    </div>

    <div class="tiles rise" id="tiles"></div>
    <div class="list rise" id="list"></div>
  </div>

  <div class="home-ind"></div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  try{ const t=localStorage.getItem('cmeTheme')||'blue'; if(t&&t!=='classical') document.documentElement.setAttribute('data-theme',t); }catch(e){}
  function toast(m){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.querySelector('.phone').appendChild(t); } t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1400); }
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  document.getElementById('back').addEventListener('click', ()=>{ history.length>1?history.back():location.href='my-programs.html'; });

  const clockIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 9 16 9"/></svg>';
  const checkIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg>';
  const editIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h13a2 2 0 0 0 2-2v-6"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>';
  const xIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  const STAT={ pending:{l:'Pending review',i:clockIco}, approved:{l:'Approved',i:checkIco}, changes:{l:'Changes requested',i:editIco}, rejected:{l:'Rejected',i:xIco} };

  const SEED=[
    {title:'Diabetes & Kidney Summit', board:'Indian Society of Nephrology', credits:'2 CME', fmt:'Offline', date:'Submitted 02 May 2025', status:'pending'},
    {title:'GLP-1 Agonists — Recorded Series', board:'RSSDI', credits:'1.5 CME', fmt:'Recorded', date:'Submitted 28 Apr 2025', status:'changes', note:'Add faculty disclosure forms for 2 speakers and re-submit chapter 3.'},
    {title:'Cardiometabolic Update 2025', board:'Maharashtra Medical Council (MMC)', credits:'2 CME', fmt:'Online', date:'Approved 14 Apr 2025', status:'approved', note:'Accreditation ID · MMC-2025-4471'},
    {title:'Hypertension Masterclass', board:'Association of Physicians of India', credits:'1.5 CME', fmt:'Online', date:'Approved 20 Feb 2025', status:'approved', note:'Accreditation ID · API-2025-1180'},
    {title:'Obesity & Metabolic Forum 2024', board:'Maharashtra Medical Council (MMC)', credits:'1 CME', fmt:'Offline', date:'Reviewed 30 Nov 2024', status:'rejected', note:'CME hours below the credit threshold for this tier.'}
  ];
  let extra=[]; try{ extra=JSON.parse(localStorage.getItem('accreditationRequests')||'[]'); }catch(e){}
  const REQS=extra.concat(SEED);

  // tiles
  const count=s=>REQS.filter(r=>r.status===s).length;
  const pend=count('pending')+count('changes');
  document.getElementById('tiles').innerHTML =
    `<div class="tile p"><b>${pend}</b><span>Pending</span></div>`+
    `<div class="tile a"><b>${count('approved')}</b><span>Approved</span></div>`+
    `<div class="tile r"><b>${count('rejected')}</b><span>Rejected</span></div>`;

  // list
  function fmtDateShort(s){
    if(!s) return '';
    const d=new Date(s+'T00:00:00'); if(isNaN(d)) return s;
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }
  function metaLine(r){
    const parts=[r.credits, r.eventType, r.fmt, r.venue, r.date].filter(Boolean).map(esc);
    return parts.join(' · ');
  }
  document.getElementById('list').innerHTML = REQS.map((r,i)=>{
    const st=STAT[r.status]||STAT.pending;
    const note = r.note ? `<div class="note">${r.status==='approved'?checkIcoSmall():st.i? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r=".6" fill="currentColor"/></svg>':''}<div>${esc(r.note)}</div></div>` : '';
    const eventLine = r.eventStart ? `<div class="rm">Event: ${fmtDateShort(r.eventStart)}${r.eventEnd && r.eventEnd!==r.eventStart ? ' – '+fmtDateShort(r.eventEnd) : ''}</div>` : '';
    let acts='';
    if(r.status==='changes') acts=`<div class="acts"><button class="pri" data-fix="${i}">Update & re-submit</button></div>`;
    else if(r.status==='rejected') acts=`<div class="acts"><button class="sec" data-appeal="${i}">Appeal</button></div>`;
    else if(r.status==='pending') acts=`<div class="acts"><button class="sec" data-withdraw="${i}">Withdraw</button></div>`;
    return `<div class="req">
      <div class="rtop"><span class="status ${r.status}">${st.i}${st.l}</span><span class="board">${esc((r.board||'').replace(/\s*\(.*\)/,''))}</span></div>
      <div class="rt">${esc(r.title)}</div>
      <div class="rm">${metaLine(r)}</div>
      ${eventLine}
      ${note}${acts}
    </div>`;
  }).join('');
  function checkIcoSmall(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="color:var(--green)"><polyline points="5 12 10 17 19 7"/></svg>'; }

  document.getElementById('list').addEventListener('click', e=>{
    if(e.target.closest('[data-fix]')) toast('Opening program to update…');
    else if(e.target.closest('[data-appeal]')) toast('Appeal submitted to the board');
    else if(e.target.closest('[data-withdraw]')) toast('Request withdrawn');
  });

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
