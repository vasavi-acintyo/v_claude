<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group — MedHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .statusbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:15px;font-weight:700;color:var(--ink);}
  .statusbar .sys{display:flex;align-items:center;gap:7px;} .statusbar svg{fill:currentColor;stroke:currentColor;}

  .topbar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:8px 16px;}
  .topbar .bk{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:0 0 auto;}
  .topbar .bk:active{transform:scale(.94);}
  .topbar .tt{flex:1;min-width:0;font-size:14px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .dots{width:38px;height:38px;border-radius:50%;background:none;border:none;color:var(--muted);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .topbar .dots:hover{background:var(--chip);color:var(--brand);}
  .topbar .dots svg{width:18px;height:18px;}

  .scroll{flex:1 1 auto;overflow-y:auto;padding:2px 18px 22px;}
  .scroll::-webkit-scrollbar{width:0;}

  .hero{border-radius:18px;padding:20px 16px 16px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--d1),var(--d2) 55%,var(--d3));color:#fff;text-align:center;}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,var(--glow),transparent 70%);}
  .hero .gi{width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.16);display:grid;place-items:center;margin:0 auto;position:relative;z-index:1;}
  .hero .gi svg{width:32px;height:32px;stroke:#fff;}
  .hero h1{position:relative;z-index:1;font-size:17px;font-weight:800;font-family:var(--display);letter-spacing:-.01em;margin-top:12px;line-height:1.25;}
  .hero .meta{position:relative;z-index:1;font-size:10px;color:rgba(255,255,255,.75);margin-top:5px;}
  .hero .jbtn{position:relative;z-index:1;margin-top:14px;min-height:38px;padding:9px 22px;border-radius:20px;border:none;font-family:inherit;font-size:11.5px;font-weight:800;cursor:pointer;background:#fff;color:var(--brand);transition:transform .16s cubic-bezier(.22,1,.36,1);}
  .hero .jbtn:active{transform:scale(.95);}
  .hero .jbtn.joined{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);}
  .hero .jbtn.pending{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);}

  .sec{margin:20px 0 10px;display:flex;align-items:center;gap:8px;justify-content:space-between;}
  .sec h2{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .sec .cnt{font-size:9px;font-weight:800;color:var(--brand);background:var(--brand-soft);padding:3px 8px;border-radius:20px;}

  /* join requests (admin view) */
  .reqs{display:flex;flex-direction:column;gap:8px;}
  .req{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 11px;transition:opacity .3s ease, transform .3s ease;}
  .req img{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .req .m{flex:1;min-width:0;}
  .req .nm{font-size:11.5px;font-weight:800;font-family:var(--display);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .req .sp{font-size:9px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .req .acts{display:flex;gap:6px;flex:0 0 auto;}
  .req .acc,.req .ign{border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;}
  .req .acc svg,.req .ign svg{width:15px;height:15px;}
  .req .acc{background:var(--brand);color:#fff;}
  .req .acc:hover{background:var(--brand-dark);}
  .req .ign{background:var(--chip);color:var(--muted);}
  .req .ign:hover{color:var(--ink);background:var(--line);}
  .req.gone{opacity:0;transform:translateX(30px);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;}
  .about-bio{font-size:11.5px;line-height:1.65;color:var(--slate-700);}
  .about-kv{display:flex;gap:10px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
  .about-kv:first-child{margin-top:0;padding-top:0;border-top:none;}
  .about-kv svg{width:15px;height:15px;color:var(--brand);flex:0 0 auto;margin-top:1px;}
  .about-kv span{font-size:10.5px;color:var(--slate-700);line-height:1.5;}

  .composer{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 13px;cursor:pointer;transition:border-color .16s;}
  .composer:hover{border-color:var(--brand);}
  .composer img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .composer .cbox{flex:1;font-size:11px;color:var(--muted);}

  .feed{display:flex;flex-direction:column;gap:12px;margin-top:12px;}
  .post{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;}
  .post-h{display:flex;align-items:center;gap:10px;}
  .post-h img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--chip);flex:0 0 auto;}
  .post-h .nm{font-size:11.5px;font-weight:800;}
  .post-h .sp{font-size:9px;color:var(--muted);margin-top:1px;}
  .post-h .t{margin-left:auto;font-size:8.5px;color:var(--muted);font-weight:600;}
  .post-b{font-size:11px;line-height:1.6;color:var(--slate-700);margin-top:10px;}
  .post-f{display:flex;gap:8px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line);}
  .post-f button{display:inline-flex;align-items:center;gap:5px;background:none;border:none;font-family:inherit;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;padding:5px 8px;border-radius:8px;}
  .post-f button:hover{background:var(--chip);}
  .post-f button.liked{color:var(--brand);}
  .post-f button.liked svg{fill:var(--brand);}
  .post-f svg{width:14px;height:14px;}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty svg{width:36px;height:36px;margin:0 auto 12px;opacity:.5;}
  .empty p{font-size:12px;line-height:1.6;}

  .toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--surface);font-size:11.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---- options bottom sheet ---- */
  .backdrop{position:absolute;inset:0;background:rgba(15,15,35,.45);opacity:0;visibility:hidden;transition:opacity .3s, visibility .3s;z-index:30;}
  .backdrop.open{opacity:1;visibility:visible;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:31;background:var(--card);border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.3,.5,1);box-shadow:0 -12px 40px -12px rgba(0,0,0,.4);max-height:82%;overflow-y:auto;}
  .sheet::-webkit-scrollbar{width:0;}
  .sheet.open{transform:translateY(0);}
  .grab{width:38px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 4px;position:sticky;top:0;}
  .sheet-body{padding:0 18px calc(20px + env(safe-area-inset-bottom));}
  .opt-item{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink);padding:14px 4px;cursor:pointer;border-bottom:1px solid var(--line);text-align:left;}
  .opt-item:last-child{border-bottom:none;}
  .opt-item svg{width:19px;height:19px;color:var(--muted);flex:0 0 auto;}
  .opt-item.danger{color:#ef4444;} .opt-item.danger svg{color:#ef4444;}
  .sheet-title{padding:2px 2px 8px;}
  .sheet-title b{font-size:15px;font-weight:800;font-family:var(--display);}
  .sheet-title span{font-size:10.5px;color:var(--muted);display:block;margin-top:3px;}
  .inv-search{position:relative;margin-bottom:10px;}
  .inv-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);}
  .inv-search input{width:100%;min-height:40px;background:var(--chip);border:1px solid transparent;border-radius:20px;padding:0 14px 0 34px;font-size:12px;font-family:inherit;color:var(--ink);}
  .inv-search input:focus{outline:none;border-color:var(--brand);}
  .req .acc:disabled{opacity:.6;cursor:default;}

  /* hide-mock-statusbar */ .statusbar{display:none !important;}
</style>
  <link rel="stylesheet" href="global.css?v=10">
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <div class="sys">
      <svg width="17" height="13" viewBox="0 0 20 14"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
      <svg width="17" height="13" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 4.5C5.5 .5 12.5 .5 17 4.5"/><path d="M4 7.5C6.8 5 11.2 5 14 7.5"/><path d="M7 10.5C8.2 9.4 9.8 9.4 11 10.5"/><circle cx="9" cy="13" r=".6" fill="currentColor" stroke="none"/></svg>
      <svg width="26" height="14" viewBox="0 0 26 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="10" rx="2.2" fill="currentColor"/><rect x="23.5" y="4.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <button class="bk" id="back" aria-label="Back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18"/></svg></button>
    <div class="tt" id="topTitle">Group</div>
    <button class="dots" id="moreBtn" aria-label="More"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg></button>
  </div>

  <div class="scroll" id="scroll"></div>

  <!-- Options sheet -->
  <div class="backdrop" id="optBackdrop"></div>
  <div class="sheet" id="optSheet">
    <div class="grab"></div>
    <div class="sheet-body" id="optBody"></div>
  </div>

  <div class="home-ind"></div>
</div>

<script>
  (function(){ const ua=navigator.userAgent||''; const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const isAndroid=/Android/.test(ua); document.documentElement.setAttribute('data-os', isIOS?'ios':isAndroid?'android':'other'); })();
  try{ const t=localStorage.getItem('cmeTheme')||'blue'; if(t&&t!=='classical') document.documentElement.setAttribute('data-theme',t); }catch(e){}
  function toast(m){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.querySelector('.phone').appendChild(t); } t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1400); }
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  document.getElementById('back').addEventListener('click', ()=>{ history.length>1?history.back():location.href='network.html'; });

  const editIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
  const inviteIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20v-1.5a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4V20"/><circle cx="8" cy="7" r="3.2"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>';
  const trashIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
  const plusIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  const leaveIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>';

  const grpIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20v-1.5A4.5 4.5 0 0 1 7.5 14h3A4.5 4.5 0 0 1 15 18.5V20"/><circle cx="17.5" cy="8.5" r="2.5"/><path d="M21 20v-1a4 4 0 0 0-3-3.8"/></svg>';
  const likeIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-1 9v11h9.3a2 2 0 0 0 2-1.7l1.4-8a2 2 0 0 0-2-2.3H14Z"/><path d="M7 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h3"/></svg>';
  const cmtIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>';
  const shareIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><line x1="8.3" y1="10.7" x2="15.7" y2="6.3"/><line x1="8.3" y1="13.3" x2="15.7" y2="17.7"/></svg>';
  const calIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><line x1="3" y1="9" x2="21" y2="9"/></svg>';
  const shieldIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/></svg>';
  const emptyIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20v-1.5A4.5 4.5 0 0 1 7.5 14h3A4.5 4.5 0 0 1 15 18.5V20"/></svg>';
  const checkIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const xIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

  const GROUPS = {
    'Indian Diabetes Forum': { members:'12.4k', created:'Est. 2016', admin:'Dr. Meera Iyer', status:'member',
      bio:'A community for endocrinologists and physicians managing diabetes across India — sharing guidelines, case discussions and the latest in CGM and insulin therapy.',
      posts:[
        {n:'Dr. Meera Iyer', img:'https://randomuser.me/api/portraits/women/68.jpg', t:'2h', b:'New ADA 2025 guideline summary is up in files — key changes to GLP-1 first-line recommendations for T2DM with CVD risk.', likes:34, cmts:8},
        {n:'Dr. Vijay Menon', img:'https://randomuser.me/api/portraits/men/76.jpg', t:'1d', b:'Case: 52F with brittle T1DM on hybrid closed-loop, recurring nocturnal hypos. Anyone tried adjusting active insulin time vs target glucose first?', likes:19, cmts:12}
      ]},
    'City Cardiology Society': { members:'3.2k', created:'Est. 2019', admin:'Dr. Arvind Kumar', status:'member',
      bio:'Regional cardiology society for case discussions, journal clubs and CME announcements across the city\'s hospital network.',
      posts:[
        {n:'Dr. Arvind Kumar', img:'https://randomuser.me/api/portraits/men/32.jpg', t:'5h', b:'Reminder: journal club this Friday covering the new resistant-hypertension trial data. Venue details pinned.', likes:22, cmts:4}
      ]},
    'Young Physicians Network': { members:'8.7k', created:'Est. 2021', admin:'Dr. Rohan Sinha', status:'member',
      bio:'For residents and early-career physicians — mentorship, career advice and peer support.',
      posts:[
        {n:'Dr. Rohan Sinha', img:'https://randomuser.me/api/portraits/men/45.jpg', t:'3h', b:'Hot take: the hardest part of residency isn\'t the hours, it\'s learning to say "I don\'t know, let me check" out loud. Anyone else?', likes:61, cmts:23},
        {n:'Dr. Priya Nair', img:'https://randomuser.me/api/portraits/women/44.jpg', t:'2d', b:'Sharing my note-taking system for ward rounds — happy to walk anyone through it if useful.', likes:15, cmts:6}
      ]},
    'Endocrine Society of India': { members:'22.1k', created:'Est. 2010', admin:'Dr. Kavya Reddy', status:'none',
      bio:'National society for endocrinologists — accredited CME, annual conference updates and specialty guidelines.',
      posts:[
        {n:'Dr. Kavya Reddy', img:'https://randomuser.me/api/portraits/women/65.jpg', t:'1d', b:'Registrations for the annual conference open next week. Early bird pricing for society members.', likes:48, cmts:9}
      ]},
    'Clinical Cardiology Hub': { members:'15.8k', created:'Est. 2014', admin:'Dr. Sameer Shah', status:'none',
      bio:'Clinical discussion hub for interventional and non-interventional cardiologists — case reviews and guideline updates.',
      posts:[
        {n:'Dr. Sameer Shah', img:'https://randomuser.me/api/portraits/men/52.jpg', t:'6h', b:'Interesting ECG from clinic today — happy to share for a group read if useful for teaching.', likes:27, cmts:11}
      ]},
    'Nephrology Connect': { members:'6.4k', created:'Est. 2018', admin:'Dr. Imran Khan', status:'none',
      bio:'Connecting nephrologists for CKD management discussions, dialysis case reviews and transplant updates.',
      posts:[
        {n:'Dr. Imran Khan', img:'https://randomuser.me/api/portraits/men/61.jpg', t:'4h', b:'Anyone using the new eGFR calculator in practice yet? Curious how it\'s changing referral timing.', likes:14, cmts:5}
      ]},
    'Interventional Cardiology India': { members:'9.1k', created:'Est. 2017', admin:'Dr. Anjali Desai', status:'pending',
      bio:'For interventional cardiologists — procedural case discussions, device updates and fellowship opportunities.',
      posts:[]},
    'Women in Medicine Network': { members:'14.3k', created:'Est. 2015', admin:'Dr. Ananya Ghosh', status:'pending',
      bio:'A supportive community for women in medicine — mentorship, work-life balance and career growth.',
      posts:[]}
  };

  function loadMyGroups(){ try{ return JSON.parse(localStorage.getItem('myGroups')||'[]'); }catch(e){ return []; } }

  let curG=null, curCustom=false, curName='';

  function render(name){
    let g = GROUPS[name];
    let custom=false;
    if(!g){
      const mine=loadMyGroups().find(x=>x.name===name);
      if(mine){ g=mine; custom=true; }
    }
    const scroll = document.getElementById('scroll');
    if(!g){
      document.getElementById('topTitle').textContent = 'Group';
      scroll.innerHTML = `<div class="empty rise">${emptyIco}<p>We couldn't find this group.<br>It may have been removed or renamed.</p></div>`;
      curG=null; curCustom=false; curName=name;
      return;
    }
    curG=g; curCustom=custom; curName=name;
    document.getElementById('topTitle').textContent = name;
    const btnLabel = g.status==='member' ? 'Joined' : g.status==='pending' ? 'Pending' : 'Join';
    const btnClass = g.status==='member' ? 'joined' : g.status==='pending' ? 'pending' : '';
    const memberLine = custom ? esc(g.members) : `${g.members} members`;
    const heroStyle = custom && g.cover ? ` style="background-image:linear-gradient(rgba(20,10,15,.45),rgba(20,10,15,.45)),url('${g.cover}');background-size:cover;background-position:center;"` : '';

    scroll.innerHTML = `
      <div class="hero rise"${heroStyle}>
        <div class="gi">${custom && g.avatar ? `<img src="${g.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:18px">` : grpIco}</div>
        <h1>${esc(name)}</h1>
        <div class="meta">${memberLine} · ${esc(g.created)}</div>
        <button type="button" class="jbtn ${btnClass}" id="joinBtn">${btnLabel}</button>
      </div>

      <div class="sec"><h2>About</h2></div>
      <div class="card rise">
        <p class="about-bio">${esc(g.bio)}</p>
        <div class="about-kv"><span>${calIco}</span><span>${esc(g.created)}</span></div>
        <div class="about-kv"><span>${shieldIco}</span><span>Admin · ${esc(g.admin)}</span></div>
        ${g.type ? `<div class="about-kv"><span>${shieldIco}</span><span>${esc(g.type)} group</span></div>` : ''}
      </div>

      ${(custom && g.admin==='You' && g.joinRequests && g.joinRequests.length) ? `
      <div class="sec"><h2>Requests to join</h2><span class="cnt">${g.joinRequests.length}</span></div>
      <div class="reqs" id="reqs">
        ${g.joinRequests.map((r,i)=>`
          <div class="req rise" data-i="${i}">
            <img src="${r.img}" alt="">
            <div class="m"><div class="nm">${esc(r.name)}</div><div class="sp">${esc(r.spec)} · ${esc(r.t)}</div></div>
            <div class="acts">
              <button type="button" class="acc" data-acc="${i}" aria-label="Accept">${checkIco}</button>
              <button type="button" class="ign" data-ign="${i}" aria-label="Decline">${xIco}</button>
            </div>
          </div>`).join('')}
      </div>` : ''}

      <div class="sec"><h2>Feed</h2></div>
      ${g.status==='member' ? `
      <div class="composer rise" id="composer">
        <img src="https://randomuser.me/api/portraits/women/79.jpg" alt="">
        <div class="cbox">Share something with ${esc(name)}…</div>
      </div>` : ''}
      <div class="feed" id="feed">
        ${g.posts.length ? g.posts.map((p,i)=>`
          <div class="post rise">
            <div class="post-h"><img src="${p.img}" alt=""><div><div class="nm">${esc(p.n)}</div><div class="sp">${esc(name)}</div></div><span class="t">${esc(p.t)}</span></div>
            <div class="post-b">${esc(p.b)}</div>
            <div class="post-f">
              <button type="button" class="like" data-i="${i}">${likeIco}<span class="lc">${p.likes}</span></button>
              <button type="button">${cmtIco}${p.cmts}</button>
              <button type="button" class="share">${shareIco}Share</button>
            </div>
          </div>`).join('') : `<div class="empty rise" style="padding:40px 20px">${emptyIco}<p>No posts yet in this group.</p></div>`}
      </div>
    `;

    document.getElementById('joinBtn').addEventListener('click', ()=>{
      if(g.status==='member') return;
      if(g.status==='pending'){ g.status='none'; toast('Request withdrawn'); }
      else { g.status='pending'; toast('Request sent to join '+name); }
      render(name);
    });
    const reqsEl = document.getElementById('reqs');
    if(reqsEl){
      reqsEl.addEventListener('click', e=>{
        const acc=e.target.closest('[data-acc]'), ign=e.target.closest('[data-ign]');
        if(!acc && !ign) return;
        const i = +(acc||ign).dataset[acc?'acc':'ign'];
        const req = g.joinRequests[i];
        const mine = loadMyGroups();
        const idx = mine.findIndex(x=>x.name===name);
        if(idx>-1){
          mine[idx].joinRequests = (mine[idx].joinRequests||[]).filter((_,ri)=>ri!==i);
          if(acc){
            const n = (parseInt(String(mine[idx].members).replace(/\D/g,''),10)||1) + 1;
            mine[idx].members = n+' member'+(n>1?'s':'');
          }
          try{ localStorage.setItem('myGroups', JSON.stringify(mine)); }catch(e){}
        }
        toast(acc ? esc(req.name)+' added to '+name : 'Request declined');
        const row = reqsEl.querySelector(`.req[data-i="${i}"]`);
        if(row){ row.classList.add('gone'); setTimeout(()=>render(name), 280); } else render(name);
      });
    }
    const composer=document.getElementById('composer');
    if(composer) composer.addEventListener('click', ()=>toast('Post composer coming soon'));
    document.getElementById('feed').addEventListener('click', e=>{
      const share=e.target.closest('.share'); if(share){ toast('Link copied'); return; }
      const like=e.target.closest('.like'); if(!like) return;
      const p=g.posts[+like.dataset.i];
      const liked=like.classList.toggle('liked');
      p.likes += liked ? 1 : -1;
      like.querySelector('.lc').textContent=p.likes;
    });
  }

  // ---- options sheet (⋮) ----
  const INVITE_POOL=[
    {n:'Dr. Meera Iyer', spec:'Endocrinology · Apollo Hospitals', img:'https://randomuser.me/api/portraits/women/68.jpg'},
    {n:'Dr. Arvind Kumar', spec:'Cardiology · Fortis Heart Institute', img:'https://randomuser.me/api/portraits/men/32.jpg'},
    {n:'Dr. Rohan Sinha', spec:'Nephrology · Manipal Hospitals', img:'https://randomuser.me/api/portraits/men/45.jpg'},
    {n:'Dr. Priya Nair', spec:'Oncology · Tata Memorial', img:'https://randomuser.me/api/portraits/women/44.jpg'},
    {n:'Dr. Vijay Menon', spec:'Neurology · NIMHANS', img:'https://randomuser.me/api/portraits/men/76.jpg'},
    {n:'Dr. Sara Iyer', spec:'Dermatology · Manipal Hospitals', img:'https://randomuser.me/api/portraits/women/12.jpg'}
  ];
  let invited=new Set();
  const optBackdrop=document.getElementById('optBackdrop'), optSheet=document.getElementById('optSheet'), optBody=document.getElementById('optBody');

  function renderInviteRows(q){
    q=(q||'').toLowerCase();
    const list=INVITE_POOL.filter(d=>!q || (d.n+' '+d.spec).toLowerCase().includes(q));
    return list.map(d=>{
      const done=invited.has(d.n);
      return `<div class="req">
        <img src="${d.img}" alt="">
        <div class="m"><div class="nm">${esc(d.n)}</div><div class="sp">${esc(d.spec)}</div></div>
        <div class="acts"><button type="button" class="acc" data-invite="${esc(d.n)}" ${done?'disabled':''} aria-label="${done?'Invited':'Invite '+esc(d.n)}">${done?checkIco:plusIco}</button></div>
      </div>`;
    }).join('') || `<div class="empty" style="padding:30px 10px">${emptyIco}<p>No doctors match your search.</p></div>`;
  }

  function openInvite(){
    invited=new Set();
    optBody.innerHTML = `
      <div class="sheet-title"><b>Invite doctors</b><span>Adds them straight to ${esc(curName)} — no approval needed.</span></div>
      <div class="inv-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.7" y2="16.7"/></svg><input id="inviteSearch2" placeholder="Search doctors…"></div>
      <div class="reqs" id="inviteResults2">${renderInviteRows('')}</div>
    `;
  }

  function openOpts(){
    if(!curG) return;
    const isOwner = curCustom && curG.admin==='You';
    optBody.innerHTML = isOwner ? `
      <button type="button" class="opt-item" data-opt="edit">${editIco}Edit group</button>
      <button type="button" class="opt-item" data-opt="invite">${inviteIco}Invite doctors</button>
      <button type="button" class="opt-item" data-opt="share">${shareIco}Share group</button>
      <button type="button" class="opt-item danger" data-opt="delete">${trashIco}Delete group</button>
    ` : `
      <button type="button" class="opt-item" data-opt="share">${shareIco}Share group</button>
      ${curG.status==='member' ? `<button type="button" class="opt-item danger" data-opt="leave">${leaveIco}Leave group</button>` : ''}
    `;
    optBackdrop.classList.add('open'); optSheet.classList.add('open');
  }
  function closeOpts(){ optBackdrop.classList.remove('open'); optSheet.classList.remove('open'); }
  document.getElementById('moreBtn').addEventListener('click', openOpts);
  optBackdrop.addEventListener('click', closeOpts);
  optBody.addEventListener('click', e=>{
    const inv=e.target.closest('[data-invite]');
    if(inv){
      const n=inv.dataset.invite;
      if(invited.has(n)) return;
      invited.add(n);
      const mine=loadMyGroups(); const idx=mine.findIndex(x=>x.name===curName);
      if(idx>-1){
        const cnt=(parseInt(String(mine[idx].members).replace(/\D/g,''),10)||1)+1;
        mine[idx].members = cnt+' member'+(cnt>1?'s':'');
        try{ localStorage.setItem('myGroups', JSON.stringify(mine)); }catch(e){}
      }
      toast(n+' invited to '+curName);
      const results=document.getElementById('inviteResults2');
      if(results) results.innerHTML = renderInviteRows(document.getElementById('inviteSearch2').value);
      return;
    }
    const b=e.target.closest('[data-opt]'); if(!b) return;
    const opt=b.dataset.opt;
    if(opt==='share'){ toast('Link copied for '+curName); closeOpts(); return; }
    if(opt==='edit'){ location.href='create-group.html?edit='+encodeURIComponent(curName); return; }
    if(opt==='invite'){ openInvite(); return; }
    if(opt==='delete'){
      if(confirm('Delete "'+curName+'"? This can\'t be undone.')){
        let mine=loadMyGroups(); mine=mine.filter(x=>x.name!==curName);
        try{ localStorage.setItem('myGroups', JSON.stringify(mine)); }catch(e){}
        closeOpts();
        toast('Group deleted');
        setTimeout(()=>location.href='network.html', 400);
      }
      return;
    }
    if(opt==='leave'){
      curG.status='none'; toast('Left '+curName); closeOpts(); render(curName);
    }
  });
  optBody.addEventListener('input', e=>{
    if(e.target.id==='inviteSearch2'){
      document.getElementById('inviteResults2').innerHTML = renderInviteRows(e.target.value);
    }
  });

  const name = new URLSearchParams(location.search).get('name') || '';
  render(name);

  (function(){ var p=document.querySelector('.phone'),B=390; function f(){ if(innerWidth<=600){ var s=innerWidth/B; p.style.width=B+'px'; p.style.height=(innerHeight/s)+'px'; p.style.transform='scale('+s+')'; } else { p.style.transform=''; p.style.width=''; p.style.height=''; } } f(); addEventListener('resize',f); addEventListener('orientationchange',f); })();
</script>
</body>
</html>
